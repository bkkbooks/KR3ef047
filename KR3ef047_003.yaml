body:
  text: 卷三無汗傷寒論無汗者九不得汗者四不汗出者一明理論陶氏書惟寒邪一條失之太簡以無汗為表症居多則可以無汗為止是寒邪則不可傷寒論太陽症無汗發熱身痛手足冷脈浮緊冬用麻黃湯太陽中風脈浮緊無汗而煩躁乃營衛兩傷冬用大青龍湯陽明症頭痛鼻乾脈浮無汗而喘冬用乾葛湯此皆是寒邪在表而無汗用發表者若陽明症無汗身必發黃茵陳梔子豆豉湯陽明無汗渴欲飲水無表症者白虎湯此皆熱邪在裡而無汗用清裡者又云結胸症但頭汗用大陷胸湯但頭汗身發黃用茵陳湯心中懊憹但頭汗梔子豆豉湯此水飲內結而無汗也又云脈浮而遲遲為無陽不能作汗身必癢此陽虛人外冒表邪不能作汗外解用扶元發汗者以上皆傷寒門無汗之症也今有嘔吐噁心胸膈滿悶無汗喘急脈滑不數此痰結無汗用二陳湯導痰湯有飽悶噯氣發熱無汗右關滑大此食滯中焦胃陽不得敷布而無汗用平胃保和散等又有發熱惡寒無汗脈不出此表邪內伏用升陽散火湯又有發熱無汗寒涼抑遏而用溫中升散者凡此皆不得已而推廣治法也然無汗之症到底用發散者多例如脈伏無汗用升發正也脈大無汗而用升發無得也即脈細用升發寒涼抑遏用升發痰凝食滯用升發皆無礙也至如雙解散小柴胡湯梔子豆豉湯治表有邪里有熱之無汗者若治脈伏無汗則內有一半寒藥而礙表邪若治胸滿痰結寒凝食滯則內有一半寒藥而犯凝滯又如白虎湯陽明和解發汗者也而條下注明表汗未出表症尚在者未可服唇口乾渴不能消水脈不數大亦未可服夫石膏湯尚如此則黃連大黃更不宜矣惟熱鬱火閉之無汗不忌寒涼耳然無汗症第一在脈上消息經云熱病脈躁盛不得汗陽脈之極也死又云陽病而見陰脈者死今細詳陽脈躁盛無汗一條後來不論生死原能作汗外出若戰栗而出汗後氣和者生若不戰栗洋洋汗出氣粗口張隨汗而死若陽症脈陰無汗一條則胃陽不足津液內涸到底無汗而死者多大凡發熱無汗之症必得汗多則身熱方解以其熱在皮膚無汗則熱邪何處發泄故治無汗發熱不論日數須善為發汗要知麻黃桂枝但發冬月未鬱熱之寒邪無汗不可用於三時熱令羌活湯乾葛柴胡湯能發在表無汗不能發在裡火閉無汗滑石石膏能發在裡火閉無汗不能發在表無汗淡豆豉白豆蔻能辛散中焦抑遏無汗不能發皮毛閉郁無汗枳殼木通能發大小便下竅不通無汗不能發在外表邪無汗桑白皮地骨皮桔梗能發肺氣壅遏皮毛無汗不能發他經閉郁無汗仲景發表加杏仁妙以開潤肺之皮毛亦發汗良法是以發汗亦有理肺氣而出者然治無汗必要互看頭汗條者桂枝湯本為解肌若其人脈浮緊發熱汗不出者不可與也當須識此勿令誤也此以下五節皆寒邪在表無汗北方冬月用麻黃以發汗故曰桂枝湯不可與也太陽病頭痛發熱身疼腰痛骨節疼惡風無汗而喘者麻黃湯主之此條申明上章發熱無汗之症不可與桂枝湯宜麻黃湯詳注惡寒頭痛太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之此條申明營衛兩傷不可與麻黃湯宜用大青龍湯詳注煩躁太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗服藥已微除其人發煩熱目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之此條詳注衄血麻黃湯主之一句在當發其汗下太陽病脈浮緊發熱身無汗自衄者愈太陽病脈浮緊發熱無汗當用麻黃湯因其人正氣旺未服麻黃湯而自衄出病愈此申明上章太陽無汗症若自衄乃解不必再用麻黃湯也傷寒脈浮發熱無汗其表不解不可與白虎湯若渴欲飲水無表症者白虎加人參湯上半節言無汗之症宜發汗戒用白虎下半節言渴欲飲水無表症者忌發汗宜用白虎陽明病無汗小便不利心中懊憹者身必發黃陽明病無汗小便又不利則溫熱抑遏不得發泄故心中煩悶懊憹濕熱久郁身必發黃此條不立一方而暗示陽明無汗四條治法無汗表熱乾葛防風湯發表一法也無汗小便不利豬苓湯清利一法也無汗心中懊憹梔子豆豉湯治煩一法也無汗身發黃茵陳湯治黃一法也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從耳目出名下厥上竭為難治此條少陰傳經裡熱症醫見其手足冷而無汗絶似傷寒表邪未伸誤用麻黃桂枝辛溫強散其汗則血得熱而妄行或從口鼻耳目而出大青龍湯見煩躁乾葛湯見似瘧茵陳梔子豆豉湯三味此陽明熱瘀在內蒸發黃家祕加乾葛防風兼散表郁則全內外分消之治白虎湯見潮熱小青龍湯見咳嗽補中益氣湯人參白朮當歸黃耆陳皮柴胡升麻甘草表邪閉鬱而無汗純用發表中氣虛微不能作汗則用此方家祕加荊芥防風治勞力感冒二陳湯導痰湯二方見似瘧平胃散見譫語升陽散火湯升麻葛根獨活羌活人參柴胡防風甘草白芍表邪內伏寒冷抑遏發熱無汗手足反冷此邪熱不得發越故用火鬱發之消滯升陽湯厚朴半夏枳殼廣皮升麻葛根陽明無汗胸前飽悶必是胃家有痰飲食滯故用半夏枳朴以消胃滯再加升葛宣發表邪雙解散見發狂純是表邪無汗則用發表若表有邪里有熱則用此方雙解小柴胡湯見惡寒頭痛三陽表有邪里有熱者用前方雙解少陽表有邪里有熱則用此方理肺發表湯家祕治肺氣抑遏發熱無汗羌活獨活柴胡乾葛枳桔桑皮平胃發表湯家祕治胃氣抑遏發熱無汗羌活獨活柴胡乾葛枳朴半夏仲景首條立麻黃湯治無汗發熱氣逆喘滿用杏仁默示肺主皮毛肺氣壅遏則喘逆無汗開發潤肺氣為發汗之真訣又桂枝湯下云服藥後食稀粥以助藥力此默示發熱有汗必是胃無凝滯故可食稀粥以助藥力散邪若發熱無汗必是胃有凝結不能作汗故開發胃主肌肉疏利胃陽為發汗真訣又於頭汗條中申明但頭有汗遍身無汗皆系水飲淤熱凝結中焦隔絶周身之道路治宜宣發胃氣疏通經絡細玩麻桂宜北不宜南故家祕化立敗毒散方法加枳桔桑皮名理肺發表湯治風寒壅肺發熱喘逆無汗之症此從麻黃杏仁方中化出治法又以敗毒散方加枳朴半夏蒼朮名平胃發表湯治痰涎食滯胸滿發熱頭痛身痛無汗之症此從太陽病有表症心下有水飲用小青龍湯辛散水飲敷布胃中則內伏之水飲作汗而出外冒之表邪隨汗而解此一舉兩解化法用方之妙悟也自汗太陽症自汗出發熱不解惡風脈浮緩此風傷衛宜解肌仲景用桂枝湯家祕用羌活防風湯若太陽發熱自汗口渴小便不利此熱結膀胱仲景用五苓散家祕用羌活木通湯若太陽表邪已解自汗發熱口渴不惡寒此陽明裡熱自汗宜用涼膈散三黃石膏湯導赤各半湯若大便不通腹脹多汗脈沉而數此乃下症自汗也宜用三承氣湯仲景下法獨詳自汗條內者以下法最怕表症不散今自汗則表邪多解以上論冬令傷寒然亦可參治四時者外有汗自出身仍發熱之冬溫有自汗出發熱不惡寒而渴之溫病有發汗已身灼熱之風溫有汗出身熱口燥渴之暑病有自汗出身灼熱煩悶口渴長幼相似之溫疫此皆四時有汗之寒熱病而非冬月傷寒自汗症也傷寒初起里未鬱熱用辛溫散表若三時寒熱病里先有熱後感風寒在表者用麻桂則礙裡熱故化立辛涼散表和解表裡兩法發散太陽羌獨敗毒散和解太陽羌活沖和湯發散陽明升麻乾葛湯和解陽明乾葛石膏湯發散少陽柴胡防風湯和解少陽小柴胡湯若表散裡熱仍照傷寒清裡之法太陽病欲解時從巳至未止此言太陽時候也巳午主太陽故太陽病多發辰巳時太陽病欲解必過辰巳午時至未方解也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也此明太陽病欲解當必其脈浮先煩知其汗出而解太陽病發熱汗出惡風脈浮者名為中風此條言發熱汗出脈浮緩乃是風傷衛之中風症以無汗有汗分別中風傷寒太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之申明太陽中風因衛之陽分有邪故脈浮緩營之陰分無邪故不緊而弱衛陽有邪則發熱營弱無邪則不閉鬱而汗自出言翕翕發熱形容表邪拘緊之象鼻鳴喘逆表邪氣粗也乾嘔者表邪嘔惡也故用桂枝湯急解風邪太陽病頭痛發熱汗出惡風者桂枝湯主之此申明頭痛發熱自汗之中風宜桂枝湯者病人臟無他病時發熱自汗出而不愈者此為衛氣不和也先其時發汗則愈宜桂枝湯主之臟無他病言無里症但時有發熱自汗表症此衛氣有病當未發作時先服桂枝湯發汗則愈病嘗自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故耳以營行脈中衛行脈外復發其汗營衛和則愈此重明自汗出之病營分本無病因衛外之衛氣不諧和於營氣服桂枝湯以和諧營氣則病愈發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之發汗後飲水多者必喘以水灌之亦喘大凡汗出而喘似太陽中風桂枝湯症深恐誤用桂枝故曰若發汗後不可更行桂枝即自汗喘熱之表症若身無大熱但可用麻黃杏仁甘草石膏湯蓋麻黃與石膏同用化辛溫而為辛涼麻黃同石膏不惟散表兼能清肺定喘石膏得麻黃杏仁不惟清肺兼能散表又云發汗後飲水多必水寒射肺而喘若水灌之則外閉毛竅亦必喘下後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯前條發汗後汗出而喘無大熱不可更用桂枝此條下後汗出而喘無大熱亦不可更行桂枝亦可與麻黃杏仁甘草石膏湯兩條汗下不同然汗出而喘無大熱則同傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之發熱汗出不解心下痞硬下利此邪走腸胃宜用下法然發熱嘔吐尚非承氣症故用大柴胡湯陽明病脈遲出汗多微惡寒者表未解也可發汗宜桂枝湯此申明陽明病亦有自汗發熱惡風寒中風者但以脈遲不浮緩別陽明也陽明病脈浮無汗而喘者發汗則愈宜麻黃湯此申明陽明病亦有無汗寒傷營症但脈不緊別陽明也非教人必服麻桂當比例用方可也問曰陽明病外症云何答云身熱自汗出不惡寒反惡熱也此申明陽明病裡熱外症形象身熱自汗出不惡寒反惡熱者陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗此大便已硬也大承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄此申明上章自汗出不惡寒反惡熱脈象症形分詳里症之大下未可下微和胃氣之次第輕重陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也此言汗多而渴宜生津退熱不可用豬苓湯病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯此一日一發似瘧之症言病人煩熱汗出而解至明日日晡又見先寒後熱此陽明經似瘧脈實多汗便結腹脹宜承氣湯下之如尚有頭痛惡寒發熱表症而見浮緩虛脈尚宜桂枝湯汗之傷寒發熱無汗嘔而不能食而反汗出濈然者是轉屬陽明也傷寒轉系陽明者其人濈濈微汗出也發熱無汗太陽症今有汗出而至濈然者轉屬陽明矣故轉屬陽明必濈濈常有微汗出而不幹然雖屬陽明未見熱結在裡故不用下法太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之汗出熱不解蒸蒸常有汗者屬胃家裡熱故與調胃承氣湯上條但濈濈微汗不幹此條蒸蒸時汗外達邪已入里故立調胃承氣湯以示微下之意陽明病其人多汗汗以液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服較上章多譫語大便硬二症故用小承氣湯但清胃熱譫語一止莫再服不服恐熱氣不清多服恐無燥糞汗出譫語者以有燥糞在胃中此為風也須下之過經乃可下若下之太早語言必亂以表虛里實故也下之則愈宜大承氣湯上章多汗亡津腸中乾結內熱譫語未必燥屎故用小承氣湯此章汗出譫語且有燥屎在腸胃之中乃是陽明風熱消津結硬蒸其胃汁外騰陰血陽津有立盡之勢則須下之以表虛無邪裡實有熱下之則愈宜大承氣湯然立大下之法又恐後人下早故先戒曰過經表散乃可下之若下之太早則表邪內攻語言必亂而死矣前四句立大下法門中三句關防下早變症末三句繳前應下方法失下恐津液立盡早下恐變症不測仲景豈以未過經而下早變出內亂神明危惡之症反輕言下之則愈復立大承氣大下危法於後陽明病發熱汗多者急下之宜大承氣湯言陽明病則無太陽少陽表症言汗多則陽明表邪盡解仍發熱乃是裡熱蒸汗盡出故用急下前條言濈濈蒸蒸汗出初入陽明裡症用調胃承氣清胃熱中條言汗多津液竭大便硬可用小承氣微下後條言譫語有燥屎當用大承氣大下此條總結上文發熱汗多表解譫語大便硬有燥屎已過經下症當用急下大下之法太陽病項背強𠘧𠘧反汗出惡風者桂枝葛根湯太陽病項背強𠘧𠘧無汗惡寒當用麻黃湯太陽病項背強𠘧𠘧反汗出惡風當用桂枝湯今用桂枝葛根湯必汗出惡風又兼見陽明症三陽合病脈浮大上關上但欲眠睡目合則汗三陽合病脈浮大表脈也上關上少陽也肝膽主目合目則汗盜汗也雖不立方然宜用小柴胡症三陽合病腹滿身重難以轉側口不仁而面垢譫語遺屎發汗則譫語下之則額生汗手足逆冷若自汗出者白虎湯主之前條三陽合病發明脈浮大上關上目合則汗以示少陽和解主治此條三陽合病發明腹滿身重口不仁面垢譫語遺屎之裡症以示陽明清裡主治非表症故發汗則譫語非下症故下之則額生汗因手足冷復戒之曰自汗出者可用白虎湯桂枝湯見惡寒羌活防風湯見項強涼膈散見發狂三黃石膏湯黃連黃芩黃柏石膏上焦肺胃有熱蒸汗外出用前方涼膈散若二焦皆熱則用此方兼治三焦導赤各半湯見腹滿痛敗毒散見發狂羌活沖和湯見發熱升麻乾葛湯乾葛石膏湯俱見寒熱柴胡防風湯柴胡防風荊芥前胡少陽自汗亦有表裡二條若少陽表症多宜散少陽表邪當用此方小柴胡湯見寒熱頭眩少陽表裡皆熱而自汗不可單解表宜用此方以柴胡散少陽之表黃芩清少陽之裡知母石膏湯知母石膏麥門冬粳米陽明純表邪症則用升麻乾葛湯表有邪里有熱則用乾葛石膏湯若表邪已解裡熱自汗則以此方單清裡熱三黃解毒湯見發狂三乙承氣湯見便結葛根黃連黃芩湯葛根黃連黃芩甘草陽明裡有燥熱而自汗用乾葛石膏湯陽明裡有溫熱而自汗下利則用葛根黃連湯陽明受熱肺受火制則用乾葛芩連湯兼清肺胃然又有熱在氣分而多汗則用乾葛知母石膏湯熱在血分而多汗又用升麻清胃湯十棗湯見結胸麻黃杏仁甘草石膏湯麻黃杏仁甘草石膏汗出而喘身無大熱且見於汗下後乃是肺家內有積熱外冒寒邪內有積熱外攻皮毛故汗出外有表邪故發喘此方妙在杏仁利肺氣借麻黃以散外寒借石膏以清內熱從越婢湯中化出辛溫變辛涼之法並開後人雙解肺經表裡之法也大柴胡湯見潮熱甘草附子湯見身痛甘草乾薑湯見煩躁芍藥甘草湯見煩躁桂枝葛根湯桂枝葛根白芍藥甘草大棗太陽發熱項背強𠘧𠘧反汗出惡風者當用桂枝湯今加入乾葛者以項強自汗兼見陽明耳頭汗外感發熱必得遍身汗出方得邪氣外解然所以致其汗出者皆賴胃陽敷布而能升降陰陽發越毛竅者也故凡中焦無病則上下通達遍身汗出而解若中焦痞塞則熱結水結寒結痰結氣滯夾食蓄血皆能壅滯經絡但頭有汗遍身無汗邪氣不能外解是以頭汗非輕症也然亦有各條分別外邪傳入少陽結於胸脅上薰於頭則心煩懊憹而頭汗小柴胡湯合梔子豆豉湯陽明煩渴多飲溫熱不得發越上衝頭角而發黃頭汗者神術乾葛湯若見背強身痛不能轉側惡寒而頭汗者當治太陽用羌活勝濕湯水飲蓄結中焦怔忡上攻但結胸無發熱但頭微汗無表症者半夏茯苓湯甚者陷胸湯若瘀血在上紅花桃仁湯若瘀血在下小便利大便黑小腹硬而頭汗者桃仁承氣湯若熱入血室迫血妄行下血譫語而頭汗者歸芍柴胡湯甚則刺期門以瀉血室之熱中焦痞結子和每用吐法痰飲食積凝結中焦但頭有汗遍身無汗家祕用乾葛柴胡防風三味煎湯調保和散頻服神效若有燥火沖葡萄汁竹瀝若裡熱火閉無汗用山梔豆豉蔥頭滑石夫柴胡乾葛羌活防風但能發在表無汗不能發在裡火閉無汗梔子豆豉滑石蔥白但能發在裡火閉無汗不能發在表無汗麻黃桂枝但能發寒邪外束內無積熱無汗不能發風熱外閉內有積熱之無汗涼膈瀉心湯但能發熱結腸胃無汗不能發在表風寒閉郁之無汗是以外有表邪內有積熱妙在雙解表裡胸前凝塞胃陽不能敷布而無汗者妙在開發胸前升揚胃氣是以治頭汗之症必要互參無汗條傷寒十餘日熱結在裡復往來寒熱大柴胡湯若但結胸無大熱者此水結胸脅也但頭微汗大陷胸湯詳注結胸條傷寒五六日頭汗微惡寒手足冷心下滿口不欲食大便硬脈細者與夫傷寒五六日已汗復下胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此未解也宜柴胡桂桂乾薑湯此申明頭汗症之未解者頭汗微惡寒手足冷表症也心下滿口不欲食大便硬里症也表裡兩見之症若脈數大可以雙解今脈細則未能解又傷寒五六日已汗復下反見胸脅滿微結小便不利渴而不嘔但頭汗遍身無汗又寒熱心煩少陽太陽表症未解也故宜此湯太陽中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛弱身體則枯燥但頭汗出劑頸而還腹滿而喘口燥咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者可治太陽中風陽邪也以火劫之血氣沸騰灼其身發黃火傷陽分上衝作衄火傷陰分小便遂難陰陽俱傷身枯燥但頭汗火傷脾肺則腹滿而喘口乾咽爛大便不行久則譫語甚者至噦手足擾亂此時惟賴小便利者津液尚存尚可救太陽病脈浮動數頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃此條詳注結胸陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗小便不利渴飲水漿此為淤熱在裡身必發黃茵陳湯主之又云陽明病被火額上微汗出小便不利必發黃此二條反復明頭汗身無汗濕熱不得內外分消必發黃而小便不利陽明病下之其外有熱手足溫者不結胸心中懊憹飢不能食但頭汗出梔子豉湯此言陽明病下後外有熱手足溫則表邪尚未內陷當解表今因心中懊憹但頭汗故用梔子去煩滌熱豆豉宣散胃陽敷布作汗外解陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而泄之濈然汗出而愈陽明有熱深入藏血藏魂之所火擾神明則下血譫語如見鬼狀熱邪閉而不宣故但頭汗刺期門則營衛得通遍身汗出而愈可見小柴胡湯治熱入血室不從少陽起見乃清解厥陰邪熱小柴胡湯治往來寒熱不從厥陰起見清解少陽邪熱也小柴胡湯見惡寒頭眩梔子豆豉湯見懊憹乾葛神術湯乾葛蒼朮防風石膏陽明濕熱閉郁中焦胃陽不能敷布但頭汗周身無汗故以此方宣發胃氣羌活勝濕湯見身重陽明頭汗用前乾葛神術湯太陽頭汗當用此方半夏茯苓湯熟半夏白茯苓中焦閉塞則周身不能敷布但頭有汗逐胃家水飲則胃氣清和而濈濈汗出紅花桃仁湯血瘀上焦常有發黃頭汗者此方瘀血散則汗出而邪散桃仁承氣湯見蓄血血瘀上部前方紅花桃仁湯若血瘀下部頭汗而臍腹硬滿者當用此方歸芍柴胡湯柴胡黃芩廣皮甘草當歸白芍藥牡丹皮地骨皮熱入血室但頭汗出仲景以小柴胡湯治之家祕重加當歸白芍藥則功力愈專加二皮則身熱易退大柴胡湯見潮熱大陷胸湯見結胸茵陳湯見發黃發黃頭汗症皆系濕熱治分發表清裡二條前方乾葛神術湯發表之法此方清裡之法也盜汗盜汗者睡中乃出醒則止矣雜症門責之血虛有火故用當歸六黃湯等補血涼血外感盜汗是邪熱在半表半裡之間故用小柴胡湯然不獨少陽一經有盜汗三陽三陰皆有盜汗也三陽盜汗皆邪熱未盡三陰盜汗皆熱伏血分故盜汗之症有熱無寒者也治太陽盜汗羌活沖和湯陽明盜汗乾葛石膏湯少陽盜汗小柴胡湯三陰盜汗當歸六黃湯在厥陰倍生地白芍藥在少陰者倍生地黃柏黃連在太陰者倍當歸黃芩仲景論中但有三陽盜汗無三陰盜汗以盜汗皆表症耳今見熱邪傳入三陰亦有盜汗者太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣煩躁心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出劑頸而還小便不利身必發黃詳注結胸宜參看陽明病脈浮而緊必潮熱發作有時但浮者必盜汗出前條申明太陽脈浮動數盜汗症表邪未解誤下而變結胸發黃此條申明陽明脈浮而緊潮熱發作有時症表邪未散亦不可下即脈之但浮不緊亦必見盜汗之表症詳注潮熱三陽合病脈浮大上關上但欲眠睡合目則汗脈浮太陽也脈大陽明也上關上少陽也欲眠睡合目則盜汗此熱在膽也用小柴胡湯瀉心湯今余推廣清膽湯重加柴胡黃芩互注合病互參看羌活沖和湯見發熱仲景治盜汗惟以小柴胡湯主治盜汗尚見太陽表症者家祕用此湯治之乾葛石膏湯見寒熱盜汗而見太陽表症用羌活沖和湯盜汗而見陽明表症化立此方太陽不用敗毒散用沖和湯陽明不用幹葛湯用此方以盜汗表裡症宜和解耳小柴胡湯見寒熱頭眩當歸六黃湯當歸地黃黃耆黃連黃芩黃柏此治血中伏火內傷盜汗家祕去黃耆加柴胡白芍藥治外感盜汗再加牡丹皮其方更專大陷胸湯見結胸盜汗本非此方治者因下後心下直至小腹硬痛故以此方治結胸為急清膽湯柴胡黃芩竹茹厚朴廣皮甘草合目則汗膽經火旺故用此方若左寸脈大是膽涎沃心家祕加陳膽星川黃連兼小便不利合導赤各半湯左關數大合龍膽瀉肝湯加歸芍山梔牡丹皮懊憹傷寒論言懊憹惟太陽陽明發汗吐下後有此症則知是三陽經陽邪內陷鬱結心胸而為半表半裡之症非三陰症故仲景雖立大陷胸湯人參白虎湯豬苓湯等然於懊憹條歸重於梔子豆豉湯今余分各經見症施治如太陽表邪用羌活湯合梔子豆豉湯陽明表症用葛根湯合梔子豆豉湯少陽見症以小柴胡湯合梔子豆豉湯不見表症而有熱邪內結則以清裡藥合梔子豆豉湯若食滯中焦梔子豆豉湯加陳枳實兼有痰凝小陷胸湯合梔子豆豉湯此余推廣之法也太陽病脈浮動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心內因硬則為結胸大陷胸湯主之此條因結胸症兼懊憹故治結胸詳注結胸頭汗發黃門傷寒五六日大下之後身熱不去心中結痛者病欲解也梔子豆豉湯主之發汗若下之而煩熱胸中窒者梔子豆豉湯主之發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹者梔子豆豉湯治之首條言傷寒五六日大下之身熱尚在心中結痛病未解也故用梔子豆豉湯第二條言若發汗又下之胸中煩熱窒塞者允宜梔子豆豉湯第三條言發汗又吐又下後其人虛煩直至不得眠若更劇者必反復顛倒心中懊憹較之前兩條雖甚然不脫梔子豆豉湯者以懊憹惟此為正法耳陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則燥心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上白苔者梔子豆豉湯若渴欲飲水口乾舌燥者人參白虎湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之此章先分發汗燒針下之三條誤治後立三方治法心中懊憹舌上白苔故用梔子豆豉湯若渴欲飲水口乾舌燥白虎加人參湯主之若脈浮渴欲飲水小便不利豬苓湯主之陽明病下之其外有熱手足溫者不結胸心中懊憹飢不能食但頭汗出者梔子豆豉湯主之此申明表邪誤下身熱仍在陽邪未內陷不作結胸但成心中懊憹飢不能食但頭汗出必宜以梔子豆豉湯治之互注頭汗條參看陽明病下之心中懊憹而煩胃中有燥屎者可攻之腹微滿初頭硬後必溏不可攻之陽明下後懊憹煩躁有可攻不可攻若果有燥屎可攻之若腹微滿而不大滿肛門初頭之屎雖硬後必溏薄不可攻之梔子豆豉湯梔子豆豉此仲景治懊憹原方也以懊憹症心下煩熱致病故以梔子豆豉湯主治然表邪不散亦有煩熱懊憹者家祕故有三陽表藥加入之法如羌活梔子豆豉湯即前方加羌活以宣發太陽乾葛梔子豆豉湯即前方加乾葛以宣發陽明柴胡梔子豆豉湯即前方加柴胡以宣發少陽梔子豆豉枳實湯懊憹熱而無滯止須原方若有食滯當加枳實此開消導之法非止用枳實一味也梔子豆豉陷胸湯梔子豆豉半夏川連栝蔞霜因結胸以致懊憹故有大陷胸湯治法若痛而不實當以梔子豆豉湯合小陷胸湯大陷胸湯見結胸人參白虎湯人參石膏知母甘草粳米懊憹症渴能消水則陽明裡熱故以此方清陽明豬苓湯見小便不利懊憹症宜治上焦今以小便不利則利小便為急不用五苓散者因陽明裡熱耳不得臥不得臥雜症多屬內火傷寒則有有表熱裡熱熱在半表半裡熱在氣分血分有汗下太過虛煩不得眠有瘥後餘熱未盡不得臥如脈浮數身發熱疼痛無汗不眠者太陽表症宜羌活湯若發熱多汗口渴小便不利不得眠者太陽熱結膀胱五苓散陽明目痛鼻乾不得眠身熱脈長陽明表症也乾葛湯若煩渴消水舌燥唇焦脈長而數陽明裡症也人參白虎湯若小便不利豬苓湯若蒸蒸發熱手足多汗大便硬有下症者承氣湯下之若少陽膽熱脈弦而緊小柴胡湯加羌活防風若脈弦而數梔連柴胡湯加竹茹若表邪已解肝膽裡熱龍膽瀉肝湯有下症者大柴胡湯若熱病初愈食谷太早日暮微煩減其飲食梔子豆豉湯加枳實若熱病後火旺煩躁黃連瀉心湯若汗下太過虛煩不得眠祕旨安神丸若膽涎沃心膽火成痰家祕膽星丸準繩云不得眠皆是熱症表有邪者邪擾經絡宜發表里有邪者火擾於內宜清裡半表半裡有邪膽經有火宜清少陽若陽明有熱而胃不和宜徹熱和胃餘熱未除而煩躁熱耗真陰宜養陰清火汗下虛煩而神氣不足宜養陰補虛太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與之令胃氣和則愈此因大汗亡津胃中干煩躁不得眠渴欲飲水故與水以濟胃干則煩躁止而安臥太陽病二三日不得臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日後下之此作協熱利也太陽病二三日不得臥不過經絡不寧何至但欲起必有痰涎結在心下若其脈微弱此本是有寒結非熱結反下之則邪不下行而作結胸若利未止邪已下行四日後當作協熱下利發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豆豉湯主之發汗吐下後虛煩不得眠應補者多今反復顛倒心中懊憹尚是熱邪結於胸中故用此湯治懊憹病人小便不利大便乍難乍易時有微熱喘冒不得臥者有燥屎也宜大承氣湯小便不利裡熱互詞大便乍難乍易裡熱互詞時有微熱潮熱互詞喘冒不得臥下大實大滿互詞故曰有燥屎宜大下少陰病傳之二三日以上心中煩不得臥黃連阿膠湯主之少陰病曰傳之此陽邪內傳也二三日以上心中煩不得臥此手少陰心火旺故用此方少陰病下利六七日咳而嘔渴心煩不得眠者豬膚湯主之少陰下利熱傳下焦者多今咳而嘔渴心煩不得眠者此上焦手少陰燥火傷陰致是羌活湯見惡寒表熱不臥以此方散表五苓散見小便不利小便不利不得臥用此方乾葛湯見似瘧陽明表熱不得臥當散表若口渴唇焦消水加知母石膏人參白虎湯見潮熱陽明表熱不得臥用前乾葛湯裡熱不得臥則用此方大承氣湯見大便結熱結腸胃腹脹便結不得臥故用此方梔連柴胡湯柴胡黃芩廣皮甘草竹茹半夏梔子川連少陽邪熱不得臥則用此方龍膽瀉肝湯龍膽草柴胡黃芩川黃連麥門冬陳膽星知母甘草真青黛山梔肝膽有火則目不能合膽涎沃心則目不得瞑故以此方加膽星青黛化膽經之痰大柴胡湯見潮熱少陽症不得臥又見下症者用此方梔子豆豉枳實湯見懊憹熱病初愈食谷太早日暮微煩夜不安臥用此方再加消導之藥黃連瀉心湯黃連麥門冬赤茯苓甘草木通內傷不得臥有心氣不足則以棗仁湯溫藥以補心氣若心血不足者則硃砂安神丸天王補心丹補心血涼心火今熱病門故用此方硃砂安神丸黃連白茯神麥門冬生地棗仁心火旺心血未虛者以黃連瀉心湯主治心血虛者以安神丸治之家祕膽星丸陳膽星青黛海石龍膽草甘草膽火旺不得臥當用黃連柴胡湯龍膽瀉肝湯若膽火成痰膽涎沃心則用此方發黃內經發黃分上中下三條有謂目黃曰黃疸有謂黃疸暴病久逆之所生者及少陰厥陰司天之政溽暑皆發黃疸悉是上焦濕熱也宜用一清飲等宣發有謂食已如飢曰胃疸與脾風發痹腹中熱出黃者有脾脈搏堅而長其色黃者靈樞謂脾所生病皆中焦濕熱也梔連茵陳湯治者有謂溺黃赤安臥者必黃疸及腎脈搏堅而長其色黃靈樞謂腎生病皆下焦濕熱也梔子柏皮湯治者仲景依此諸條發明黃疸於金匱門復發明發黃於傷寒論或以表邪未解下之太早熱邪內陷而發黃或以血蓄下焦小腹硬滿其人如狂而發黃或以火劫汗兩陽相薰而發黃或渴飲水漿濕熱浸淫而發黃另有發汗已熱氣已泄反發黃者非瘀熱發黃當於寒濕中求之然則金匱疸黃與傷寒熱病發黃又有分別夫發黃之症通用茵陳湯如小便不利煩躁而渴五苓散合茵陳二苓湯發黃煩躁嘔而不渴茵陳平胃散熱重凝結有下症者梔子大黃湯大黃硝石湯酒積積熱喘嘔而渴者濟生葛根湯若傷寒發黃身熱無汗表症不解脈浮而緊冬月仲景用麻黃湯今家祕用羌活防風湯若表解裡熱者寶鑑黃連散以上皆濕熱發黃也另有身不發熱冷汗自出脈沉而遲乃太陰經陰黃也內間有身痛亦發熱者然脈必沉遲色必熏黃而晦口必干不飲水與陽明濕熱發黃脈數消水色如橘黃大相異傷寒病遇寒水濕土司天往往變成陰黃治陰黃之症小便利者朮附湯小便不利者五苓散遍身手足逆冷冷汗自汗茵陳湯加薑附脈弱氣虛者理中湯重加茵陳以上皆陰黃也至淤熱發黃與淤血發黃又宜細辨如頭汗出遍身無汗腹微滿小便不利渴欲飲水為淤熱發黃若小腹硬滿小便不利大便或結或黑如狂喜忘渴不飲水為淤血發黃此症之分別也淤熱發黃脈必數大沉實淤血發黃脈見沉細芤結此脈之分別也白虎症煩渴飲水不發黃者遍身多汗濕熱發泄若但頭汗身上汗少邪熱不得外泄故發黃余按發黃症惟陽明太陰脾胃二經者多以黃色屬土土中濕熱則發黃色至陰黃乃內傷寒濕症也太陽病脈浮動數頭痛發熱微盜汗出反惡寒表未解也醫反下之陽氣內陷若不結胸但頭汗出小便不利身必發黃脈浮動數之表症反下之熱邪內陷應變結胸若不結胸但頭有汗小便不利瘀熱無從出路身必黃詳注頭汗結胸太陽病身黃脈沉結小腹硬小便自利其人如狂者血也抵當湯太陽病身黃脈當數大今沉結小腹硬實如狂小便自利此非熱結膀胱的是蓄血發黃太陽中風以火劫汗邪風被火熱血氣流溢兩陽相薰灼其身發黃陽盛欲衄陰虛小便難陰陽俱虛身體枯燥但頭汗出中風乃陽邪以火劫汗兩陽相薰灼而身發黃火傷上陽分熱盛故欲衄火傷下陰分受熱故小便難氣血兩傷則津液竭血燥而身體枯燥詳注頭汗若發汗已身灼熱者名風溫脈陰陽俱浮自汗身重多眠睡鼻必鼾語言難出若被火者微發黃色風溫即春令發熱不惡寒而渴之溫病復以火劫汗必發黃陽明病發熱汗出者此為熱越不能發黃但頭汗出小便不利渴飲水漿此瘀熱在裡身必發黃茵陳蒿湯傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯陽明發熱本汗出今頭上出余處無汗則熱邪不得外解且渴飲水漿小便不利則濕熱不得下泄而身黃又云傷寒七八日身黃如橘色小便不利腹微滿亦是濕熱發黃故二條同欲茵陳湯陽明病無汗小便不利心中懊憹身必發黃陽明之熱外不得汗解內不得小便泄故懊憹身黃雖不立方然梔子豆豉加茵陳症也陽明中風脈弦浮大而短氣腹滿脅下及心痛鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之瘥病過十日脈續浮者與小柴胡湯脈但浮無餘症者與麻黃湯若不屎腹滿加噦者不治此條詳注厄逆陽明病面合赤色不可攻必發熱色黃者小便不利也陽明病合面皆赤色此表症不可攻若誤攻之則表汗不出必見黃色淤熱內結而小便不利也陽明病被火額上微汗小便不利者必發黃陽明病畏火今反以火熏灼上攻頭額止得額上微汗則熱邪外不得汗泄下不得便出而必發黃此條不立方然豬苓茵陳湯症也傷寒發汗已身目為黃所以然者以寒濕在裡不解故也不可下於寒濕中求之傷寒汗不得出發黃今發汗已身目反黃此非淤熱乃陰黃病當於寒濕門求治一清飲柴胡赤茯苓桑白皮黃芩川芎甘草治發黃症一惟清濕熱故以柴胡川芎清表邪桑白皮黃芩清肺氣赤茯苓清小便梔連茵陳湯梔子川連茵陳一清飲雙解表裡濕熱者此方清在裡濕熱者故曰濕熱內結分利甚捷梔子柏皮湯梔子柏皮甘草濕熱在表用一清飲濕熱在裡用梔連茵陳湯濕熱在下焦故以山梔黃柏佐甘草緩肝急而專施泄茵陳湯茵陳梔子大黃濕熱症宜利小便仲景妙在大黃與茵陳同用則大黃不出大便隨茵陳山梔徑從膀胱而出故曰當驗其黃從小便而出色如皂莢汁是也五苓散豬苓白茯苓白朮澤瀉桂枝茵陳五苓散止利水濕今加茵陳並利濕熱矣茵陳二苓湯茵陳梔子大黃茯苓豬苓茵陳山梔大黃湯仲景使黃從小便而出後人善體仲景故用二苓專走小便茵陳平胃散即平胃散加茵陳一味食滯發黃名谷疸故以平胃散散濕熱加茵陳則清熱散黃若食重不消加白豆蔻萊蔔子神麯枳實梔子大黃湯梔子豆豉枳實大黃茵陳仲景治懊憹用梔子豆豉湯治心下熱痛用大黃枳實今以懊憹又兼心下熱痛故以四味合治今家祕加入茵陳者以其散濕熱能治黃耳濟生葛根湯葛根梔子豆豉枳實甘草酒濕之熱積於腸胃必發黃發熱此方以梔子豆豉湯加枳實乾葛則宣發陽明濕熱從表而散羌活防風湯羌活防風白芷蒼朮川芎甘草風濕傷太陽發熱發黃脈浮無汗仲景用麻黃湯後人恐南方辛熱故以此方代之寶鑑黃連散黃連黃芩大黃甘草濕熱在表發黃用前方散表濕熱在裡發黃又當用此方加生甘草瀉心火制苦寒金匱大黃硝石湯大黃黃柏硝石梔子同一清熱治黃前方梔子大黃湯加豆豉枳實治懊憹熱結在上者此方加黃柏硝石治熱結在下者蓋大黃得硝石則直走大腸茵陳大黃湯內無枳實如調胃承氣梔子大黃湯加枳實如小承氣大黃硝石湯如大承氣湯立此三法無太過不及朮附湯熟附子白朮陰症發黃皆是太陰寒濕此方補土中之火面赤色傷寒面赤色雖有表熱裡熱之分然表症居多故身熱少汗六脈浮數發汗乃解若太陽見症無汗脈浮緊者加減羌活湯有汗脈浮緩加減防風湯陽明見症無汗發熱脈浮緊者葛根湯有汗脈洪長者乾葛石膏湯少陽見症無汗惡寒脈浮緊羌活柴胡湯有汗脈弦小柴胡湯若裡熱面赤汗多不惡寒渴而飲水六脈沉數知母石膏湯涼膈散陽明裡熱面赤大便實者涼膈散加酒蒸大黃以清血分之熱失用大黃有衄血之患若風溫症有汗發熱面赤色宜防風乾葛石膏湯若初起不發熱口不渴唇不焦脈沉遲面赤色即陰極發躁等症另用四逆湯太陽病得之八九日如瘧狀發熱惡寒熱多寒少其不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能小汗出身必癢宜桂枝麻黃各半湯此條表邪面赤熱詳注似瘧又云太陽病脈浮而遲面熱赤而戰栗者六七日當汗出而解反發熱者瘥遲為無陽不能作汗其身必癢此陽微難作汗故面熱赤至六七日作汗之期若戰栗當汗出而解發熱者則陽氣復而症瘥若因脈遲無陽不能戰惕發熱作汗其身必癢陽明病合面赤色不可攻攻之必發熱色黃小便不利也面合赤色此表邪作汗之徵若誤攻下則表熱不散熱瘀於上必蒸黃色於皮毛熱瘀於下必熱結膀胱而小便不利此條不立方法既曰陽明病當用防風乾葛湯解在表發熱之黃既曰小便不利當用豬苓湯分利下焦並病篇曰二陽合病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知其汗出不徹以脈澀故知也曰太陽初得病時發其汗不徹因轉屬陽明雖名合併病實病也然必得表邪盡解方可下若太陽症未罷下之則為逆如此尚可小發其汗設若面色連連赤色此是邪汗未出則非小發汗急當以藥解表以湯熏汗若汗原不透徹語言不能完全此陽邪不得發越其人必煩躁呻吟叫痛乍云在腹乍云四肢按之不得痛處其人喘逆短氣但當坐以汗出不徹更出汗則愈何以知汗出不徹以其脈澀滯模糊尚是表汗未出少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之其脈即出者愈厥陰下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱而冒汗出而解病人必微厥所以然者其人面戴陽下虛故也又曰下利清穀裡寒外熱汗出而厥者通脈四逆湯主之以上二條皆陰症似陽之面赤故皆用四逆湯金匱云病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也若發其汗者寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇此痙病門面赤色仲景論痙專主血虛液燥故即身熱足寒頸項強急惡寒面赤尚禁發汗詳痙病加減羌活湯羌活獨活防風荊芥柴胡乾葛廣皮甘草色赤表熱欲汗之候又見浮大急數之表脈故用此方加減防風湯見頭痛面赤自汗身熱不減脈見浮緩者以此方治之葛根湯見惡寒陽明病禁用麻桂今以無汗脈浮緊故用此方然亦北方冬月治法乾葛石膏湯見寒熱同一陽明面赤前條無汗脈浮緊則用乾葛湯今有汗脈洪長則用此方柴胡羌活湯即小柴胡湯加羌活面赤之症不特太陽陽明即少陽表邪不散亦有故以柴胡湯加羌活防風小柴胡湯見寒熱前方治少陽太陽表邪者此方治少陽表裡兼見者知母石膏湯知母石膏門冬竹葉粳米仲景面色赤皆以表邪主治然亦有陽明裡熱上衝頭面汗多口渴而面赤者故以此方治之涼膈散見發狂陽明裡熱口渴消水之面赤則用知母石膏湯若胃熱上衝而刑肺金則用此方大便結加玄明粉腹脹不得大便有下症者大小承氣湯防風石膏湯即乾葛石膏湯加防風陽明風熱面赤色故用此方四逆湯見身痛面赤色皆是陽邪然陰症中又有虛陽上浮者故用此方胸滿胸滿在心之上故多表症蓋表邪傳裡必先胸至脅然後入里者也胸滿症必內有痰涎外邪傳裡互相交結致是故胸滿胸痹之症多用栝蔞等豁痰或用瓜蒂散吐法傷寒胸滿心煩發熱者柴胡陷胸湯胸滿連脅加青皮枳桔若尚帶太陽表症加散表藥寒熱胸滿而嘔苦通用小柴胡湯加枳桔未效合小陷胸湯故胸滿症栝蔞枳桔為必用之藥惟嘔多者用半夏不用栝蔞若夾食胸滿見噯氣飽悶用保和平胃散消導法有表邪者兼散表有裡熱者兼清熱有痰飲導痰湯等另有不發熱口不渴唇不焦二便清利六脈沉遲此陰寒胸滿另用溫散太陽病下之脈促胸滿微惡寒桂枝去芍藥湯主之太陽表症誤下則變脈促胸滿因尚有微惡寒表症故用桂枝去芍藥者因胸滿症忌血藥凝滯耳太陽陽明合病喘而胸滿不可下宜麻黃湯三陽合病而喘表邪未伸故不可下而用麻黃湯若發汗若下之煩熱胸中窒者梔子豆豉湯汗後煩熱不可再汗下後煩熱不可再下汗下後煩熱胸中窒者即煩悶懊憹故用梔子豆豉湯未汗下者表症胸滿吐法不中用也病如桂枝症但頭不痛項不強寸脈微浮胸中痞硬氣衝咽喉不得息此胸中有寒也當吐之如桂枝症但頭不痛項不強寸脈微浮非桂枝症胸中痞硬氣衝咽喉不得息此胸中有寒飲故吐之非言裡氣虛寒用此法少陽中風耳無聞目赤胸中滿而煩若吐下之則悸而驚救逆小柴胡去黃芩加茯苓少陽中風言有汗發熱少陽症少陽之脈起目鋭眥入耳中其支者貫胸膈故少陽症則目赤耳聾胸中滿而煩若以吐下除煩則悸而驚故以小柴胡去黃芩加茯苓定悸安神陽明潮熱大便溏小便可胸脅滿屬陽明陽明潮熱大便硬小便不利乃是里症今大便溏小便又利且胸脅滿屬陽明表症太陰病腹滿而吐食不下自利益甚時腹自痛若下之必胸中結硬太陰之脈絡胃統腹故腹滿吐食自利時腹自痛本非下症若誤下之必胸中結硬少陰病下利咽痛胸滿心煩者豬膚湯主之此熱邪傳入少陰故以豬膚潤燥滋陰厥陰病手足厥冷脈乍緊邪結胸中滿而煩飢不能食病在胸中當吐瓜蒂散厥陰病手足厥冷脈本沉遲今乍緊急此陽邪傳入厥陰之病病在胸中故用瓜蒂散吐之瓜蒂散苦瓜蒂一兩為細末吹鼻黃水蓄於中焦此方吹鼻得嚏則目出淚鼻出水矣然內有黃水者可用柴胡陷胸湯柴胡栝蔞半夏黃連甘草青皮枳殼此即小陷胸湯加柴胡青皮枳殼大凡治凝結之症必開豁氣道小柴胡加枳桔湯柴胡黃芩廣皮甘草枳殼桔梗前方因熱痰凝結故以小柴胡合小陷胸湯此條但是熱邪結聚故不合陷胸湯但加枳殼桔梗小陷胸湯栝蔞熟半夏川連甘草按小柴胡湯加枳桔治少陽表裡有邪者柴胡陷胸湯治少陽表裡熱邪兼有痰結者小陷胸湯治內有熱痰外無表症者加枳桔則力專加甘草則力緩保和散楂肉麥芽萊蔔子半夏連翹香附枳殼痰食胸滿者宜用此方尚有表邪仍兼散表平胃散熟蒼朮厚朴廣皮甘草外感發熱不用燥藥但濕邪滿悶非此不能治二陳湯見似瘧胃中有痰飲則嘔惡飽滿豁痰和胃對症之藥導痰湯見似瘧痰結上焦用二陳湯若痰結中焦用此方上消下行梔子豆豉湯見懊憹小柴胡去黃芩加茯苓湯即柴胡二陳湯小柴胡湯不去黃芩加茯苓名柴苓湯去黃芩加茯苓名柴胡二陳湯總之熱痰凝結以半夏黃芩同用水飲凝結則去黃芩而以半夏茯苓同用脅滿胸胃皆在中脅肋在身之側故脅肋之症在雜症門以肝膽肺三經所主外感門一惟少陽蓋表邪傳裡必由胸以至脅故胸滿多是表症腹滿方是里症若滿脅痛皆是半表半裡之症然傷寒發熱脅滿痛亦有兼太陽陽明表邪者故無汗脈浮惡寒脅痛先用羌活柴胡防風湯發散表邪然後用小柴胡湯合小陷胸湯加枳殼桔梗山梔青皮治之若有痰飲內結再加豁痰藥另有一起即從少陽發寒熱或兩肋或一肋刺痛甚則痛極而死此感時行燥熱伏積於中又被風寒外束鬱於少陽名肋刺傷寒又名沙脹是也若無汗惡寒脈浮緊先用羌活敗毒散發散表邪隨用小柴胡湯加山梔青皮蘇梗木通疏散少陽若是燥熱加知母石膏則汗出邪散不愈刺委中三里並刺十指出血即名放沙法另有脅痛寒熱又見咳嗽氣逆此肺受外邪名金邪入木又有膽經有火刑剋肺金名木火刑金此二症最重初起發熱脈浮無汗者防風瀉白散加枳殼桔梗若無汗惡寒身痛有表症者加羌活柴胡先散表邪若有汗脈沉數用黃芩瀉白散合梔連枳桔湯若燥熱流年重加知母石膏即見少陽胸脅痛症亦是金邪入木仍以肺邪為重當清肺燥禁用辛溫若無肺經喘咳之症則單治少陽按外感脅痛最重刺肋傷寒以時行厲氣害人最速宜詳歲運何氣司政余故分詳少陽脅痛肺邪脅痛二條其下手認症處以不咳嗽為少陽以咳嗽為肺邪以左脅痛為少陽以右脅痛為肺邪其認脈處以左手脈病為少陽以右手脈病為肺邪其論治法以脈浮身熱無汗先散表以脈沉裡熱時時有汗清裡熱其有服發汗之藥汗大出邪不解表藥中重加黃芩山梔枳殼青皮以清少陽重加知母石膏枳殼桑皮以清肺邪又有用一半散表一半清裡重用木通蘇梗疏通經絡得和解之力而愈者余嘗以木通蘇梗各五錢加入和解方中以治無汗脅痛身痛汗必出痛必減以木通通竅蘇梗疏散耳余嘗以木通蘇梗各五錢煎湯治發熱脅痛多有發癍痧而愈者按此二味藥未嘗治痛今以之疏通經絡則不痛矣按此二味藥未嘗主發癍痧今以之疏通經絡則邪散而癍出矣太陽病十日外表已解也若胸脅痛小柴胡主之若脈浮者仍與麻黃湯傷寒四五日身熱惡風脅下滿手足溫而渴者小柴胡去半夏加天花粉太陽病十日外胸脅痛是邪傳少陽當用小柴胡湯設脈浮者尚是太陽表脈尚宜散表若四五日身熱脅下滿手足溫而渴則熱邪內傳當用小柴胡湯去半夏辛溫易天花粉潤渴傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡症不得利今反利知誤以丸藥下之先以小柴胡湯以解表後加芒硝湯主之十三日胸脅滿而嘔日晡潮熱微利此本柴胡症未應利而利必誤下而然故先解表後用芒硝治潮熱傳經熱邪脅滿乾嘔大柴胡湯主之傳經熱邪當用攻裡今因脅滿乾嘔尚非承氣湯症故用大柴胡湯太陽中風下利嘔逆表解乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒十棗湯主之太陽症表解漐漐汗出發作有時形容里症可攻心下痞硬脅下痛汗出不惡寒的是無寒熱短氣之實症即其頭痛亦是懸飲上攻頭痛故用十棗湯夫小青龍湯治冬月太陽表症乾嘔脅痛也小柴胡湯治少陽寒熱乾嘔脅痛也十棗湯治表邪已解痰飲內結乾嘔脅痛也陽明病潮熱大便溏小便自可胸脅滿小柴胡湯主之潮熱陽明裡症法當清下今以大便溏小便自可則里無結熱且見胸脅滿尚是柴胡湯症也陽明病脅下硬滿不大便而嘔舌上白苔小柴胡湯主之脅下硬滿不大便理宜下矣然嘔而見舌上白苔尚是小柴胡湯症脅滿乾嘔往來寒熱者屬少陽脅滿少陽也乾嘔少陽也往來寒熱少陽也言屬少陽小柴胡湯也羌活柴胡湯羌活柴胡防風枳殼青皮甘草脅痛無汗脈浮惡寒身熱為太陽少陽故用此湯家祕用蘇梗木通取通則不痛也小柴胡湯見寒熱此方治少陽脅痛若見太陽表邪加羌活陽明表邪加葛根痛即汗出火也多加山梔青皮木通蘇梗熱痰膠結合小陷胸湯小陷胸湯見結胸敗毒散見發熱防風瀉白散防風桑白皮地骨皮甘草此方本治肺風痰喘故脅痛若見咳嗽氣逆用此方黃芩瀉白散黃芩桑白皮地骨皮甘草前方瀉白散加防風開示肺冒風邪脅痛此方去防風加黃芩開示肺中伏火脅痛梔連枳桔湯山梔黃連桔梗甘草青皮木通蘇梗胸脅作痛氣道壅滯者多以梔連加入氣分藥中則火痛可除然此方治裡熱作痛者若外有表邪仍加散表之藥芒硝湯芒硝枳殼厚朴脅痛上焦病無下行法今以誤下症後復見下不得已而用之大柴胡湯見潮熱前方柴胡芒硝各用此先表後攻之法此方柴胡大黃合用此雙解表裡之法前方用芒硝重在下穢腐此方用大黃重在清裡熱十棗湯見痞氣三陽表邪盡解脅下仍見硬痛此懸飲結聚故以十棗湯下痰飲水積心下滿心下滿屬陽明胃家故曰邪結心下滿而煩飢不欲食心胸嘈雜或見沖逆作嘔此胃家有火之痰飲食積也宜梔連平胃散二陳湯調服心下滿而不飢不食不見嘈雜者此無火之痰飲食積也若初起噁心脹痛宜先吐之隨用消食化痰不用苦寒抑遏若熱邪聚胃心下痞滿方可用枳殼川連湯梔連保和散清熱積梔連二陳湯化熱痰家祕用保和散加白豆蔻砂仁消食滯飽悶若里有熱煎涼藥以湯調服忌燥者沖竹瀝萊蔔汁最妙總之胸前飽悶宜消不宜補宜散不宜收若有停滯切忌寒涼生冷若胸前真有凝結即見煩躁譫語等症宜察食氣痰凝慎勿誤認裡熱譫妄誤投涼劑攻下大凡胸痛胃滿皆是上部之病非下部腸病故禁下法也惟心下硬痛大便不通者方用攻下脈浮而大心下反硬有熱屬臟者攻之脈浮而大不當攻今心下反硬有熱屬臟形容熱已深入而結藏於里故可攻之陽明病心下硬滿不可攻攻之利遂不止前條浮大表脈尚曰可攻此條同一硬滿何曰不可攻前條有有熱屬臟內已包藏便硬消水口燥唇焦種種裡熱之症故曰攻之此條無有熱屬臟恐食滯痰飲硬滿言此條不可攻則上條可攻愈有下手傷寒五六日大下之後身熱不可去心下結痛者未欲解也梔子豉湯傷寒大下後若身熱去心下結痛此為結胸當用陷胸湯今身熱不去心下結痛當用柴胡湯不用柴胡而用此湯者以汗下後身熱里煩心下結痛耳太陽病重發汗復下之不大便六七日舌上燥而渴日晡小有潮熱從心下至小腹硬滿而痛大陷胸湯主之此分別同是下後上條身熱不去心下結痛與此條日晡潮熱小腹硬痛治分上下夫大便不通六七日舌上燥而渴日晡小有潮熱且心下至小腹硬滿而痛則成結胸症故用陷胸湯梔連平胃散即平胃散加梔連胃有濕熱故加梔連濕鬱成痰加半夏石菖蒲若頑痰膠結加海石香附二陳湯熟半夏白茯苓廣皮甘草加石菖蒲治痰用二陳不易之論然頑痰膠結非南星石菖蒲不能開鬱痰成積非海石香附不能解痰食相凝須以保和丸合用夫二陳湯治痰病之緩者導痰湯指迷丸化痰丸則稍重控涎丹滾痰丸則重矣要知應用控涎滾痰症不惟二陳不及即用指迷化痰亦不及應用二陳症不惟控涎滾痰太過即指迷化痰亦太過也枳殼川連湯二味此方加木香能治濕熱下利加當歸大黃能治燥熱下血腹痛頻並今以心下滿悶亦用此方以枳殼與川連同用能消心下熱結之痞若痰涎凝結加半夏栝蔞實則合小陷胸湯加廣皮厚朴竹茹能清胃熱而止嘔吐加大黃甘草又合調胃承氣湯梔子豆豉湯二味仲景治心胸滿悶以表症尚在者仍用發表表邪已解里有熱結者用諸瀉心湯心腹硬痛有下症者用陷胸湯若汗下後心煩痞塞立梔子豉湯和解其熱梔子厚朴湯寬解其氣此無窮法門也大陷胸湯見結胸按大陷胸湯治心下硬痛大實大滿小陷胸湯治熱痰凝結中焦枳殼川連湯梔子厚朴湯治熱邪凝結氣分梔子豆豉湯治汗下後煩熱痞塞諸瀉心湯治寒藥誤下抑遏痰熱於胸前此絲絲入扣法門也結胸傷寒論云病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞滿此千古疑句也觀仲景以大小陷胸湯重方治結胸以諸瀉心湯輕方治痞滿則知發於陽發於陰乃言病之輕重舊注以發熱惡寒發於陽無熱惡寒發於陰不知無熱惡寒者陰症也反下之即死矣焉能成痞滿仲景豈用黃連瀉心寒藥治誤下後之陰症乎又云太陽病風傷於衛當用桂枝湯誤用承氣湯下之因作結胸太陽病寒傷於營當用麻黃湯誤用承氣湯下之因成痞滿余細玩之亦不拘太陽一經以致病下文云傷寒五六日嘔而發熱柴胡症具而以他藥下之若心下滿而硬痛者此為結胸也大陷胸湯主之若但滿不痛者此為痞柴胡不中與也宜瀉心湯可見少陽經誤下亦有結胸痞滿之症又以心下硬痛者為結胸以心下但滿而不痛者為痞滿可見結胸痞滿但以痛不痛分別病之輕重命名總之三陽表邪未解而重下早而變心下硬痛名曰結胸三陽表邪未解而輕下早變心下但滿不痛名曰痞滿仲景未曾盡拘太陽一經亦未必以風寒傷衛傷營分別觀其用方主治則以大陷胸湯丸治心下直至小腹硬痛大結胸症用小陷胸湯丸但治心下痛小結胸症以諸瀉心湯但治心下滿不痛之痞氣細玩寒傷營發於陰無汗之表邪症重於風傷衛有汗之表邪何故誤下反不成結胸反成不痛之痞滿反用瀉心湯輕方按此明明以症之輕重命名立方其以陷胸瀉心立名者以其病在心胸部位耳若熱邪內陷陽明大腸下部則不得謂之結胸而為陽明腹痛下症不用陷胸而用承氣湯下之矣又如表症未解而誤下之表邪內陷系在太陰脾家陰經而見下症者不用承氣而用桂枝大黃湯以大黃下穢腐以桂枝散內陷之表邪且製大黃不傷太陰臟氣不比結胸在上之陽經症可用陷胸湯者不比熱結在下之陽明症可用承氣湯者外另有水結胸症用生薑半夏湯者有痰火結胸而用川連半夏湯者今余又推廣邪氣食氣互相膠結用平胃保和散者凡此皆後世類結胸症也太陽篇云病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞滿所以成結胸者以下之太早故也此條申明表熱未解失汗誤下成結胸痞滿之由言病發於陽表熱之重者下早表熱內陷而成結胸發於陰表熱之輕者若下早成痞滿舊注風傷衛為陽寒傷營為陰不知寒傷營無汗身痛發熱之表邪重於風傷衛有汗之表邪豈誤下反變痞滿之輕病必是以表熱之輕重而分陰陽也太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣燥煩心下懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余無汗劑頸而還小便不利身必發黃也浮而動數表脈也頭痛發熱盜汗惡寒表症也醫反下之動數變遲結胸脈也膈內拒痛懊憹心下因硬結胸症也故用大陷湯設若不結胸頭有汗遍身無汗小便不利則淤熱無從發泄身發黃矣太陽病重發汗而復下之不大便五六日舌上燥而渴日晡小有潮熱從心下至小腹硬滿而痛不可近者大陷胸湯主之表症失汗懼下有成結胸痞滿今重發汗復下之亦成結胸不大便舌上燥而渴日晡小有潮熱心下至小腹硬滿而痛故用大陷胸湯結胸者項亦強如柔痙狀下之則和宜大陷胸湯結胸而至頸項亦強胸邪十分緊實用大陷胸湯恐過而不留陷胸丸恐滯而愈結今煮汁服之則婉轉逐邪病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治此條辨結胸臟結之症惟在飲食如故時時下利上以別症寸脈浮關脈沉舌上有苔不可用辛溫白苔而滑不可用寒涼故曰難治病人脅下素有痞氣連在臍旁痛引小腹入陰筋者此名臟結死臟結無陽症不往來寒熱其人反靜舌上苔滑者不可攻也此申素有痞氣之人今痛引入小腹下連陰筋者名臟結之死症又申臟結非陽經症故無往來寒熱其人反靜舌上有苔而滑者故不可攻傷寒六七日結胸熱實脈沉緊心下痛按之石硬者大陷胸湯主之此條重申胸前實熱脈沉而緊心下痛按之石硬者宜用大陷胸湯小結胸症正在心下按之則痛脈浮滑者小陷胸湯主之此重申不按不痛脈浮滑不沉實宜用小陷胸湯傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯主之但結胸無大熱者此為水結在胸脅也但頭汗出者大陷胸湯主之上段言傷寒十餘日熱結在裡已可下然見往來寒熱少陽表症只可大柴胡雙解表裡下段言但結胸外無大熱者乃是水結胸阻絶陰陽故但頭汗余處無汗必以大陷胸逐水飲通閉塞此申明但頭有汗之症當治胸前凝結傷寒六七日發熱微惡寒骨節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之此章邪結脅下不成結胸又見太陽少陽表症當用柴胡桂枝湯先散表邪結胸病其脈浮大者不可下下則死結胸病脈浮大即為表邪故曰下之則死傷寒五六日嘔而發熱者柴胡症具而以他藥下之柴胡症仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡湯不中與之宜半夏瀉心湯此申明誤下變三症三條治法言結胸痞滿不獨太陽下早而成即少陽表症誤下亦成者故曰傷寒五六日嘔而發熱柴胡湯症反用他藥下之若發熱表症仍在不成結胸者當復與柴胡湯必蒸蒸發熱汗出而解若下後身不熱而見心下硬痛則成結胸矣宜用大陷胸湯若滿而不痛則為痞氣宜用半夏瀉心湯大陷胸湯芫花甘遂大戟熱邪傳裡內結小腹用大承氣湯若失汗誤下熱邪內陷作痛胸腹用大陷胸湯丸小陷胸湯川連半夏栝蔞實此方詳注胸滿以半夏辛散豁痰栝蔞蕩滌邪穢川連去積熱則熱散痰消承氣湯見便結結胸上部病本不用承氣湯若滿而不痛腹中痛多又見大便閉結故變用承氣湯下行則上亦寬桂枝大黃湯見腹痛誤下表邪內陷陽明胃家作痛脈沉而緊用大陷胸湯內陷大腸作痛脈數而實用承氣湯內陷太陰作痛脈細而數用桂枝大黃湯生薑半夏瀉心湯生薑半夏枳殼厚朴人參川連甘草此方通治失汗下早痞滿之方多加甘草名甘草瀉心湯治胃中虛客氣上逆多加生薑名生薑瀉心湯治脅下水氣腹中雷鳴平胃保和散即平胃散保和丸同研挾食外感胸中凝結作痛手不可近似結胸實痰飲食積症故用此方柴胡桂枝湯詳注痞滿痞滿痞滿致病同於結胸均是表邪下早變症均是表邪內陷心胸惟以痛者為結胸但滿不痛者為痞滿症有痛不痛之分治有陷胸瀉心輕重之別按諸瀉心湯皆寒藥以攻痞其一加附子者以辛熱監製寒藥而攻熱結非溫裡寒也另有不因誤下自己發熱胸脅滿悶非結胸痞滿此太陽少陽兩經表邪合病之支結症仲景用柴胡桂枝湯又有表邪傳入少陽半表半裡心下肋脅痞滿仲景用小柴胡湯陶氏以枳桔湯合治之重者以小柴胡湯合小陷胸湯傷寒汗出解之後胃中不和心下痞硬乾嘔噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之不因汗下汗出表解後胃中不和心下痞硬乾嘔噫食臭此脅下有水飲故腹中雷鳴而下利用生薑瀉心湯傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯先發汗則表邪解今先大下後發汗恐表未解況心下痞滿尚有惡寒表症仍在未可攻痞先用桂枝湯解表後用大黃黃連瀉心湯脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之心下痞而復惡寒汗出者附子瀉心湯主之上章明心下痞見惡寒乃是表邪此章明心下痞見惡寒因汗出故非表邪脈浮緊表症若誤下則緊脈之寒邪入里作痞按之濡則內無痰飲食積但是氣痞其脈關上浮屬陽邪故用大黃黃連以泄痞熱若痞而見惡寒汗出則是邪熱得寒藥凝結不得發越而惡寒故以瀉心湯寒藥中加附子開導本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之誤下心下痞滿應與瀉心湯今痞不解其人反口渴燥煩小便不利此太陽之邪不特痞結心下復下遺而結膀胱故用五苓散傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之傷寒發熱汗出不解太陽中風表症汗出心下痞硬下利又陽明裡症因嘔吐故不用承氣而雙解表裡傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之未汗吐下解後見心下痞硬噫氣不除則痰氣胃實當用陷胸瀉心湯今汗吐下後故用養正滌痰扶元下墜之藥太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此里未和也宜十棗湯外有太陽中風內有下利嘔逆若表邪已解方可攻若漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒此表解里有痰飲結聚作痛故用此方生薑瀉心湯生薑半夏甘草人參黃芩黃連乾薑大棗瀉心湯五方三方皆用乾薑半夏黃連黃芩兩熱兩寒豁痰清熱此方因汗出表解胃陽虛不能敷布水飲腹中雷鳴而下利故用生薑佐乾薑和胃陽此以痰熱方中化出逐寒飲之法大黃黃連瀉心湯大黃黃連痞滿症瀉心諸方皆用冷熱各半之藥此方除去乾薑半夏辛溫惟用大黃黃連此以痰熱方中化出單清裡熱之法附子瀉心湯大黃黃連黃芩附子此即前方加黃芩以合三黃大寒之劑加熟附子辛熱以散其凝結此以清熱方中化出辛溫嚮導之法半夏瀉心湯半夏黃芩乾薑人參甘草黃連大棗瀉心湯皆用半夏而獨以此方命名者因痞滿嘔吐皆是痰涎作禍故即以此湯重加半夏此以瀉心方中化出重治痰涎之法甘草瀉心湯甘草黃芩乾薑半夏黃連大棗此方以瀉心湯重加甘草示明誤下損中心下痞硬反忌甘溫作脹者細玩瀉心諸方示後人練方治病惟在分兩上輕重加減大棗湯芫花甘遂大戟大棗心下痞硬乾嘔脅痛要分表邪已解未解全見表症者仲景以小青龍湯發表邪散水飲邪在半表半裡則用小柴胡湯和解若表邪盡散里有水飲則用十棗湯旋覆代赭石湯旋覆花甘草人參代赭石生薑半夏大棗汗吐下後表裡之邪已解但見心下痞滿噫氣無凝結作痛實象乃是胃虛不能運化停痰結聚不下故用此方柴胡桂枝湯柴胡桂枝黃芩芍藥甘草大棗半夏生薑支結有二條若少陽陽明見症以小柴胡合小陷胸湯太陽少陽見症以小柴胡合桂枝湯一以痰熱結於心胸故合小陷胸一以表邪內傳心胸故合桂枝芍藥枳桔湯枳殼桔梗仲景以枳朮湯治脾虛食滯之痞以瀉心諸湯治傷寒熱病之痞今立枳桔湯以豁胸前氣痞兼治胸脅支結咳逆內經云五臟六腑皆令人嗽不獨肺也此言咳嗽主肺然別經亦有之於是詳列十二經絡主咳症形以治內傷至傷寒論太陽篇論咳兩條皆曰心下有水氣皆用小青龍湯此以水飲內伏心下太陽表症未解用發散心下水飲主治其少陽篇云咳者小柴胡湯此以邪傳少陽主治其少陽篇兩條一以小便不利泄利下重用四逆散一以下利六七日咳而嘔渴心煩不得眠用豬苓湯二者皆陽邪傳入陰經當以濕熱主治傷寒論惟有太陽少陽少陰三經致嗽非內經詳而仲景略也蓋因內傷門咳嗽者多外感咳嗽者少然外感者六氣皆能致也傷寒致咳惡寒身痛發熱無汗脈浮緊肺素無熱外受寒邪未經鬱熱冬月可用三拗湯肺熱感寒者羌防瀉白散傷風致咳頭痛額痛發熱多汗脈浮而緩荊防飲以上二條表邪利害宜散表傷熱致咳喉痛聲啞不惡寒反惡熱汗出而熱脈沉而數黃芩瀉白散加荊芥薄荷兼風者加防風傷燥致咳口渴唇焦內熱煩躁時常有汗干嗽無痰連嗽不已時或停止遇夜益甚右脈急數瀉白散加石膏黃芩風濕致咳瀉白散合防風神術湯大凡外感咳逆既明何經主病又當究何氣致病因寒散寒因風散風有熱清熱有濕利濕必當去其致病之根以外感咳嗽但去病邪正氣自復例如熱病初起不咳後致咳皆因熱邪伏於肺胃要先清其所伏之熱邪是以外感之嗽初起即當從外散表若初起先見咳嗽即為肺家受邪單治肺邪若見左脅作痛即為金邪入木以肺受邪熱乘克少陽肝膽木位宜清理肺邪佐以清肝膽之藥如瀉白散加柴胡黃芩以清少陽惟先見少陽寒熱症後變咳嗽乃名木火刑金以少陽火邪刑傷肺金而為咳嗽宜清少陽佐以清肺之藥如瀉清各半湯等加桑白皮桔梗傷寒表不解心下有水氣乾嘔發熱而喘咳或渴或利或噎或小便不利小腹滿或喘者小青龍湯主之此言外有太陽表邪內有水飲伏結上則乾嘔發喘咳下則小便不利小腹滿故以小青龍湯辛散內伏之水飲敷布胃中從發表之藥作汗外解傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之此重申太陽經心下有水氣喘咳發熱不渴可用小青龍湯服小青龍湯已發渴者此寒飲已去病欲解不必再服小青龍湯小青龍湯麻黃桂枝白芍藥乾薑細辛五味子半夏甘草此方泛視雜合細玩有苦心原文云傷寒表不解心下有水氣乾嘔發熱而咳又云心下有水氣咳而微喘發熱不渴皆以小青龍湯主之曰表不解不得不用麻桂曰水氣內伏又非麻黃桂枝大青龍三方所能治故以乾薑半夏辛散心下所伏之水飲先散中焦續得麻桂細辛引拔水引作汗出表不使水邪干肺喘咳又以白芍藥斂住肝家營血五味子斂住腎家陰津但欲辛散心下內伏水飲作汗發出皮毛內散水飲外解表邪不欲其陽液陰津亦從麻桂細辛而出夫大青龍湯行周天之雲雨小青龍地下之蛟龍初起但發山中內伏之水而外出若不用幹薑半夏先散水飲徒用麻桂散表則伏內之水飲不散若用十棗湯等下水飲太陽之表邪乘虛內陷小柴胡湯見寒熱小柴胡去半夏加栝蔞根湯同一少陽病有嘔吐加半夏有煩渴去半夏易以栝蔞根荊防飲荊芥防風桔梗甘草桑白皮杏仁此方治傷風咳嗽用桔梗開肺竅桑白皮杏仁瀉肺氣加荊芥防風將肺中之風輕輕瀉出黃芩瀉白散桑白皮地骨皮甘草黃芩三拗湯治肺受寒邪而嗽者荊防飲治肺受風邪而嗽者此方治肺火嗽者廣而推之燥火加知母石膏風熱加防風石膏風濕加防風蒼朮痰多者加栝蔞海石厄逆傷寒論有噦無厄按靈樞治噦篇以草刺鼻作嚏嚏已無息疾迎引之立已大驚之亦已推之即今外治厄逆之法方書以乾嘔與噦妄擬咳逆夫咳逆者以咳嗽氣逆立名厄者胃氣不和上衝作聲聽聲命名故曰厄逆厄逆之症若身發寒熱嘔逆作厄此表邪傳少陽也若見左脈浮緊身熱無汗羌活柴胡湯主之若有汗脈數小柴胡合清膽湯若內熱口渴厄聲作止時時汗出唇焦便結右脈沉數此陽明裡熱上衝也乾葛竹茹湯竹茹清胃湯若裡熱便閉六脈數大者用瀉心湯涼膈散有下症者承氣湯若胃熱兼虛者人參橘皮竹茹湯若中脘多痰右脈滑大者二陳竹茹加枳桔有痰有火脈沉而數者梔連二陳湯加葛根竹茹或導痰湯下之若食滯中焦氣口脈滑者平胃保和散若誤服寒涼六脈沉遲中焦凝滯者宜大順飲溫中保和散若陰火上衝而厄逆者知柏四物湯另有初起不發熱口不渴二便清利六脈沉遲而見厄逆此陰症寒厄也輕則理中湯重則四逆湯丁香柿蒂湯主治陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘症者與麻黃湯若不尿腹滿加噦者不治陽明病脈弦少陽也脈浮大太陽也腹滿脅下及心痛少陽症也鼻乾不得汗嗜臥面目悉黃有潮熱時時噦者陽明症也耳前後腫刺之小瘥外不解病過十日脈續浮則用小柴胡湯引陽明之邪從少陽而出脈但浮無餘症者則以麻黃湯引陽明之邪從少陽而出如法治之若原不尿腹滿反加噦者不治陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻熱必噦陽明不能食有寒熱二條胃熱不能食攻其熱則愈胃寒不能食攻其熱必噦厄下文申明二條又云脈浮而遲者表熱裡寒下利清穀者四逆湯主之若胃中虛冷不能食者水飲則噦言陽明裡寒不能食不但寒涼而噦即飲水亦噦傷寒噦而腹滿視其前後知何部不利利之則愈言陽明胃實噦而腹滿當視前後何竅不利以利之羌活柴胡湯羌活柴胡防風黃芩廣皮半夏甘草寒熱嘔苦耳聾脅痛而厄當治少陽見惡寒頭痛即為少陽太陽故以此方兼治太陽小柴胡湯見寒熱少陽太陽厄逆以前方發散若無太陽表邪竟以此方加竹茹厚朴即合清膽湯承氣湯見大便結瀉心湯見痞滿中焦有痰火寒涼抑遏每多厄逆此方以黃連乾薑同用調其裡氣佐以半夏辛散痰涎兼見嘔吐者加竹茹藿香氣逆阻滯者加枳殼厚朴涼膈散見發狂諸逆上衝皆屬於火故陽症厄逆熱而無滯則以此方清之若見下症加玄明粉人參橘皮竹茹湯橘皮竹茹生薑厚朴半夏甘草人參藿香厄逆見表症散表厄逆有痰火用梔連竹茹湯梔連二陳湯冷熱不調用半夏瀉心湯今因表邪已解里無實熱惟是胃虛厄逆故以此方補胃和中二陳竹茹湯熟半夏白茯苓廣皮甘草竹茹枳殼桔梗胃熱厄逆用涼膈散冷熱不調瀉心湯胃虛厄逆人參橘皮湯今以痰凝氣窒故以二陳湯加竹茹枳桔梔連二陳湯加乾葛竹茹嘔吐厄逆胃家痰火故以梔連二陳湯加竹茹清膽火乾葛宣揚胃熱不惟治厄逆且治嘔吐平胃散見譫語胃家濕鬱食滯亦發厄逆大抵右脈實大不數即為食滿厄逆不可妄用寒涼胃實者此方加枳實萊蔔子青皮嘔吐加半夏藿香保和散見胸滿濕鬱食滯用前方平胃散必合保和散則功愈專然必詳審所傷何物加對病之藥更效大順飲見腹痛痰火厄逆用梔連二陳然皆胃無停滯者方可若有食滯又被寒冷抑遏當用縮砂草蔻溫燥以開寒凝厚朴青皮辛散以散滯氣然後再合平胃保和溫中平胃散即平胃散加豆蔻砂仁此方即大順飲加蒼朮去青皮平胃散加砂仁豆蔻善治胃家凝結停滯然內無燥熱可用理中湯見腹痛陽症厄逆則用梔連二陳湯陰症厄逆則用理中湯虛陽上浮加黃連以嚮導四逆湯見厥冷陰症厄逆四肢厥冷急用此湯知柏四物湯陰火厄逆以此方斂而降之此即滋陰降火法也丁香柿蒂湯丁香柿蒂人參生薑此治寒厄之方今人以此治陽症厄逆大謬腹痛傷寒腹痛寒熱血積四條大節目也有太陽症失散表誤用承氣下早陽邪內陷陽明身反不熱脈沉而緊自胸至腹皆痛名大小結胸症用大小陷胸湯不比誤下陽邪內陷太陰腹痛脈沉而細用桂枝芍藥大黃湯者若太陽症失於散表誤用承氣下早不成上部結胸陽邪內陷太陰成腹滿腹痛之症脈必沉細而數用桂枝芍藥大黃湯不比陽邪內陷陽明脈大汗出而用大陷胸湯者又有太陽症誤用承氣下早陽邪不結心下不結太陰內陷大腸與燥屎食積結聚小腹作痛汗出心煩脈沉數此陽明大腸腹痛用不得桂枝大黃而用承氣再下者又有不因誤下熱邪自傳入里下結大便唇焦口燥滿腹作痛脈見沉數潮熱自汗用三承氣正下者又有熱邪傳裡時或下利腹痛頻並此有熱無結三陽協熱下痢等症宜黃連枳殼湯若腹痛大便結寒熱未除尚帶三陽表邪者即有下症未可攻下止以大柴胡湯雙解表裡若小便不利小腹硬痛此為溺澀八正散等利小便若小便自利腹臍硬痛漱水不欲下咽或如狂喜忘此蓄血腹痛也桃仁承氣湯下之若初起本是陽症或寒涼抑遏寒凝太陰脾經腹痛脈必沉遲宜理中湯建中湯若本是陽症或多食生冷寒凝陽明腸胃腹痛脈必沉大宜大順飲或平胃散用生薑湯調服更有初起不發熱脈沉遲二便清利腹微痛口不渴此三陰經陰症腹痛也輕則理中重則四逆湯傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之胸中熱上焦熱也胃中邪氣中焦熱邪也腹中痛下焦熱也三焦皆熱而嘔吐故用黃連湯傷寒病四逆其人或咳或悸或小便不利腹中痛或泄利下重者四逆散主之此條雖見四肢冷然小便不利腹中痛泄利下重乃是熱痛故用四逆散先治四逆傷寒陽脈澀陰脈弦腹中急痛法當先與小建中湯不瘥與小柴胡加芍藥陽脈澀陰脈弦腹中急痛似三陰腹痛故先與小建中設不瘥乃是少陽鬱火未伸故脈弦澀用小柴胡清少陽加芍藥和絃澀之脈少陰病二三日不已至四五日腹痛四肢沉重疼痛自下利者此為水氣其人或咳或嘔或下利或小便利真武湯主之此少陰經寒濕傳變太陰腹痛用真武湯補土中之火以制水氣下利厥陰傷寒四五日腹中痛若轉氣下趨小腹者此欲下利也陽邪傳裡有燥屎轉矢氣下趨肛門陰寒在裡欲下利轉氣下趨小腹蓋熱氣欲出直從肛門而出陰寒欲出則下趨小腹而止大陷胸湯見結胸痞滿桂枝芍藥大黃湯桂枝白芍藥大黃甘草承氣湯下陽明腹痛者桂枝大黃湯治太陰腹痛也大腸熱結不用桂枝大黃脾家穢腐不用承氣湯三乙承氣湯見大便結三黃枳殼湯黃柏黃連黃芩枳殼木通腹痛大便祕結者用承氣湯協熱下利而腹痛當用三黃湯腹痛皆氣結故用枳殼木通分利兩便大柴胡湯見寒熱桃仁承氣湯桃仁大黃枳殼誤下表邪心胸痛連小腹大陷胸湯邪陷太陰腹痛桂枝大黃湯太陽祕結腹痛承氣湯挾熱下利腹痛三黃枳殼湯腹痛表症未解大柴胡湯今以蓄血腹痛用此方理中湯人參白朮乾薑甘草陽症腹痛當用清熱陰症腹痛則用此方四逆湯見身痛建中湯白芍藥桂枝甘草中氣虛而腹痛用理中湯真陽不足而腹痛用四逆湯肝脾血分虛寒故以戊己湯加桂枝大順飲縮砂草豆蔻厚朴青皮陽症腹痛當用清熱陰症腹痛則用溫經今本是陽症因過服寒涼以致腹痛故用辛散疏利黃連湯黃連桂枝乾薑半夏人參甘草大棗誤用寒藥痰飲熱邪痞塞中焦故用瀉心湯寒熱各半散之今加參棗化瀉心湯為和中散邪之劑四逆散柴胡白芍藥枳殼甘草陰症腹痛厥冷用四逆湯陽症腹痛厥冷用涼膈散今以陰經陽症腹痛厥冷不可驟用寒涼故先疏通肝膽血脈調和胃家中氣四肢溫暖然後清熱真武湯茯苓白朮白芍藥附子陽邪腹痛腸胃居多陰寒腹痛乃脾寒故用真武湯通脈四逆湯附子乾薑廣皮甘草蔥白頭陰症腹痛下利厥冷脈伏真陽脫矣故用通脈四逆
