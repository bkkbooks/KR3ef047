body:
  text: 卷二似瘧似瘧者發作有時而准也按似瘧與潮熱皆不失時候但熱不寒者名潮熱先寒後熱者名似瘧故曰似瘧表症也發於晝邪在陽分氣分者輕發於夜邪在陰分血分者重若發於寅卯二時少陽症也柴胡湯主之寒多者加羌活防風熱多者加黃芩山梔若發於辰巳午三時或一日一發者太陽症也加減羌活湯主之寒多倍加羌活防風熱多加黃芩山梔發於未申二時或間日一發者陽明症也乾葛湯主之若寅卯先見煩躁煩熱至未申而熱甚者陽明而兼少陽也重加柴胡黃芩若發時寒多加羌活防風熱多加知母石膏此以時候分各經主治之法也又有一日一發惡寒頭痛脈浮而數為太陽經即以前方羌活湯若間日發作熱多寒少脈長而大煩渴消水者為陽明經即以前方乾葛湯加減主之若寒熱口苦脈弦而數者為少陽經即以前方小柴胡湯加減服之此又據症據脈分各經主治之法也寒熱發在午前者表症也宜發表寒熱發在午後者邪在半表半裡一半散表一半清裡若但熱不寒發在午後者疸陽症宜清裡為急大凡似瘧發作不愆其期者則非虛熱不論日數悉作邪治有表邪惡寒失散表邪內伏變症有里邪失治里邪病必不愈若發時手足皆冷甚至麻木此積熱從內發外風寒束其外裡熱不得發越是以手足反冷宜先散表邪後清積熱積熱先感伏於內未曾發病風寒後感束於外其病乃發後感之風寒在外而近故先寒先感之積熱在內而遠故後熱積熱本病表寒標病近者先治故凡病先散表後清裡也若發時胸前或滿或嘔或熱或嘈或痛或噁心此痰飲內伏故嘔吐也宜以二陳導痰湯熱令有火加山梔川連沖竹瀝熱服若胸前飽悶嘔吐不食此食滯胃家宜以平胃保和散青皮檳榔散草果飲加白豆蔻川連若內有積熱忌辛燥者沖蘿蔔汁以似瘧症必夾痰食而起者故曰瘧家中脘多蓄黃水腸胃有痰飲積食至其時則發作上潮宜先用吐法隨用導痰湯草果飲保和散消盡痰積重加檳榔楂肉則無瘧母癖塊之患大凡痰飲食積似瘧症若在熱令發作雖忌辛溫燥味又忌生冷抑遏以此症最易變重夫瘧疾間日而發發後清爽仍能行走飲食若一日一發發後身雖涼不能起身飲食乃太陽經先寒後熱之寒熱病非真瘧也初起先寒後熱宛似瘧症失忌風寒飲食一熱不涼矣此症如發熱汗多表邪不解久病不愈直待汗少方是熱減可愈之機若一起從來無汗或汗向少尚有惡寒表症直待汗多方是表邪表散之徵故曰無汗惡寒表症也欲其有汗散表為先有汗潮熱里症也欲其無汗清裡為急如初起胸前飽悶惡寒發熱不思飲食此胃家有滯直待胸前寬適飲食能進方有愈期若胃強能食發熱不止此陽明有熱必減其飲食則穀氣不助熱邪而熱自減故云日暮微煩減谷即愈太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未解也以其不得小汗出身必癢宜桂枝麻黃各半湯太陽病得之八九日一日一發先寒後熱如瘧狀若其人不嘔清便則里無邪當自可若一日二三度發則是邪散變輕而無准期脈又見微緩則為自愈若仍見惡寒表症而脈微當知陰陽俱虛不可更發汗更下更吐也若見面熱赤色此其表邪未解未得小汗出身必發癢仍當發汗冬月北方用麻桂各半湯南方三時用羌活防風湯服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發汗出必解宜桂枝二麻黃一湯服桂枝湯汗大出病不解脈反洪大又與桂枝湯又見形如瘧若一日兩發此是表邪欲解之象因桂枝止治風邪寒邪終不得散故加麻黃一半以散寒邪則汗出而必解可見太陽似瘧皆主散表不比陽明似瘧有汗下兩條者病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈虛浮者宜發汗下之與大承氣湯發汗宜桂枝湯太陽如瘧皆表邪今日晡發熱此陽明似瘧之症故分脈沉而實宜下之以大承氣脈若不實而浮尚是太陽似瘧而以桂枝發汗也少陽篇曰婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之此條專言女科熱入血室似瘧症小柴胡湯兼治少陽厥陰再加引入血分之味小柴胡湯見寒熱頭眩二門按似瘧症若發寅卯二時又見弦數之脈以此方主治若惡寒身痛加羌活無汗加防風胸前飽悶加枳殼厚朴草果白豆蔻口渴加知母石膏乾葛嘔惡加竹茹倍半夏加減羌活湯見惡寒似瘧發於午前見惡寒身痛伸缺拘禁為太陽症故以此方發表升麻乾葛湯升麻乾葛白芍藥甘草此治陽明經有汗惡寒之瘧若無汗去白芍藥加防風惡寒身痛加羌活嘔惡加半夏厚朴口渴消水加乾葛石膏胸前飽悶加草果白豆蔻白虎加桂枝湯似瘧症表有寒邪忌白虎里有積熱忌桂枝今以石膏之清涼同桂枝亦能散表桂枝辛熱同石膏亦化清涼桂枝治先惡寒石膏治後發熱二陳導痰湯半夏南星枳實赤茯苓橘紅甘草石菖蒲胸前飽悶又見寒熱似瘧此因痰成瘧故立此方外感表邪加羌活柴胡乾葛里有積熱加山梔黃連白豆蔻厚朴平胃散見譫語腸胃濕熱恆發似瘧若發時胸前飽悶悉以食積主治兼冒寒邪加羌活柴胡葛根防風內兼積熱加山梔黃連枳殼食積重者加楂肉一兩青皮三錢嘔吐加竹茹半夏白豆蔻草果飲草果仁青皮白芷甘草紫蘇白豆蔻山楂萊蔔子人冒外邪但發寒熱不成瘧症若腸胃先有食積痰涎後又外感風寒則發似瘧故家祕以此消痰積若發時惡寒身痛此後感之表邪急也加羌活柴胡升麻口渴唇焦先感之積熱重也加梔連不思飲食似瘧不愈消其飲食不助熱邪而熱自除能食而似瘧不愈禁其飲食不助邪熱而熱自減以似瘧之症皆因內有痰飲積熱故耳家祕截瘧飲羌活柴胡升麻半夏厚朴檳榔青皮枳殼木通楂肉潮熱潮熱者如潮水之有準而不失其時但熱不寒不若似瘧先寒後熱尚有表症者發作有時不若發熱壯熱煩熱常熱不休者雜症潮熱有實有虛外感潮熱惟以陽明腸胃積熱燥屎所致故潮熱多用清下二法以里症多也然又有分別發於寅卯二時先有微寒而熱者此少陽潮熱無汗脈浮柴胡防風湯有汗脈弦小柴胡湯大便祕有下症者大柴胡湯虛人柴胡引子發於巳午二時或一日一發者此太陽潮熱脈浮無汗羌活沖和湯熱結膀胱導赤各半湯重加羌活發於申未二時或間日發作者此是陽明腸胃積熱宜川連枳殼湯然脈浮無汗尚宜乾葛解肌湯有汗脈大口渴用葛根白虎湯若胸前飽悶右脈弦滑保和散重加消導若大便結有下症者大幹葛湯下之若腹脹滿作痛欲大便不得便手足漐漐多汗用三乙承氣湯潮熱不用發表之方者以潮熱無表症耳若表邪未散者仍用發散是以潮熱亦有用雙解散小柴胡湯和解而愈者未可徒恃清下二法者總之自汗脈沉數無表邪之潮熱宜清裡不必解表無汗脈浮大有表症之潮熱宜解表即有里邪亦只宜雙解表裡未可單清裡熱反礙表邪即表邪盡解里症潮熱如無下症者未可即下以上言有表有里之潮熱也又有外不常熱每至五更即覺煩熱至辰巳或午未申則內火上衝或嘔或脹或作痛或胸前脅肋一片每至其時發熱如火一日一發不愆其期此積熱痰火內伏作患從里發外之潮熱也宜升麻清胃湯合枳殼川連湯梔連二陳湯加海石栝蔞清積熱化痰涎甚至腹作痛有下症者導痰湯加大黃玄明粉下之若食滯未消忌寒涼抑遏者宜保和平胃散消食積若痰食皆消惟存積熱不解家祕用乾葛而熱從表解川連同枳殼而泄大便川連同木通而清小便得內外分消之法此言里有積熱之潮熱也又有熱病後每至申酉微有潮熱此名日暮微煩陽明腸胃積熱未清二便未滑又食谷太早仲景云損谷即愈此言戒穀食並用寒涼微下大腸損其腹中之穀食兼清其餘熱宜用枳殼木通川連大黃黃芩山梔以治之或梔子豆豉湯加枳實大黃同食復主治亦可太陽病重發汗復下之不大便舌燥而渴日晡小有潮熱從心下至小腹硬滿而痛手不可近者大陷胸湯此條不治潮熱但治結胸故詳注結胸症陽明潮熱大便硬可與承氣湯若不轉失氣此但初頭硬後必溏攻之必脹滿不食此申明用承氣法必以轉失臭氣為糞定硬若不轉臭氣其糞初頭一段雖硬後即是溏糞若誤攻腹必脹滿不食陽明病脈遲汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡矣手足汗出者大便已硬也大承氣湯若微發熱惡寒者外未解也如熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄陽明病脈不浮大而遲緩汗出不惡寒且腹滿潮熱手足汗出大便已硬可攻裡矣若尚見發熱惡寒又無潮熱里症未可用承氣湯即令腹大滿大便不通只可與小承氣湯微和胃氣勿令大下陽明病譫語有潮熱反不能食者胃中必有燥糞五六枚也若能食者但硬耳大承氣湯主之此以不能食別有燥屎以能食別無燥屎言陽明熱本能食今反不能食此腸胃中填實無餘地納穀即大實大滿互詞故斷其必有燥屎五六枚宜大承氣湯主之若能食者但硬大便未必有乾結燥屎未可用大承氣湯陽明病譫語發潮熱脈滑而疾者小承氣湯主之與湯一升腹中轉矢氣者更服一升不轉矢氣勿更與之明日不大便脈反微澀者裡氣虛也為難治不可更與承氣湯也陽明病譫語潮熱脈沉數方是下脈今脈滑疾尚是浮動表邪之脈且以小承氣湯服之察其若轉矢氣仍以小承氣湯更服一劑若不轉矢氣勿更服明日不大便脈反微澀則裡氣已虛不可更投承氣湯故曰難治二陽並病太陽症罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈大承氣湯主之太陽症罷但發潮熱已無表證矣汗出大便難而譫語皆下症故用大承氣湯陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出陽明病中復申脈浮而緊即潮熱發作有時者亦不可早下仍用太陽施治發作有時非發作定期乃言發作時必現太陽時候例如辰巳潮熱屬太陽之時上半日潮熱屬表邪之時即脈但浮不緊表邪輕者亦見盜汗出尚是柴胡症也此示人不拘脈與症但見表邪起影即當從表治之柴胡防風湯柴胡防風乾葛甘草此散少陽陽明表邪之方若惡寒身痛加羌活飽悶加枳殼厚朴嘔吐加半夏厚朴小柴胡湯柴胡黃芩廣皮甘草半夏人參此方和解少陽若見惡寒身痛仍加羌活防風口渴去半夏加天花粉飽悶去人參加枳殼厚朴小便不利加木通大柴胡湯柴胡黃芩廣皮甘草半夏大黃少陽表症未解里症又急用此方雙解表裡口燥渴去半夏腹中脹加枳殼小便澀加木通柴胡飲子此即小柴胡湯加大黃大柴胡湯加人參家祕治潮熱便閉本元虛者去半夏加當歸白芍治血虛潮熱大便閉結羌活沖和湯見發熱導赤各半湯見腹痛白虎湯見口渴用此方第一要分別有汗無汗消水不消水唇口焦與不焦乃下手要訣也大幹葛湯此從大柴胡湯雙解少陽表裡法中化立此湯雙解陽明表邪未解又見陽明裡熱有下症者三乙承氣湯枳殼厚朴大黃芒硝甘草潮熱里症也故一見下症即用下法大陷胸湯此方詳注結胸症煩躁煩躁有陰陽表裡四條按煩與躁同一煩悶不寧也身大熱脈浮大有表症無汗而煩名曰煩熱宜發汗身不大熱脈沉數無表症汗多而煩名曰煩躁宜清裡另有不發熱脈沉遲口不消水而煩者名曰陰躁用溫里夫煩熱表症煩躁里症陰躁陰症是以煩躁宜分表裡陰陽若太陽中風汗出而煩躁脈反浮緊發熱惡寒身疼痛此太陽經營衛兩傷之煩躁大青龍湯主之若身痛無汗脈浮緊身大熱而煩此太陽經寒傷營之煩躁也冬月北方用麻黃湯三時南方用羌活湯若發熱有汗而煩脈浮緩此太陽經風傷衛之煩躁也冬月北方用桂枝湯三時用防風湯若汗出不解而煩渴欲飲水小便不利此太陽經熱結膀胱之煩躁也北方用五苓散南方羌活木通湯若發熱無汗而煩目痛鼻乾脈長浮洪此陽明表症煩躁也冬月葛根湯三時升麻乾葛湯若有汗而煩脈洪而數口渴消水此陽明裡症煩躁也白虎湯若表邪盡散脈沉而數有下症而煩者承氣湯若寒熱嘔而口苦脈弦而煩者此少陽半表半裡煩躁也小柴胡湯合梔子豆豉湯若腹脹便閉有汗而煩躁此少陽有下症煩躁也大柴胡湯下之又有積熱內結外不大熱手足反冷脈沉而數口渴飲水時有汗出而煩者宜用清裡又有表邪伏於經絡中焦凝滯表熱不能外發遍身反冷脈反沉伏而煩熱宜用升散總之有汗之煩躁里症也宜清熱無汗之煩躁表症也宜散表脈浮之煩躁表症也宜散表脈伏之煩躁伏邪也宜升提沉數之煩躁裡熱也宜清熱沉遲之煩躁裡寒也宜溫經雜症煩躁另具大方條內太陽篇曰傷寒欲自解者必先煩乃有汗而解何以知之脈浮故知汗出解此首揭傷寒表症若欲作汗必先見煩熱躁悶呻吟不寧之候何以知之以浮脈見煩故知汗出而解太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈太陽中風當用桂枝解肌今服後反煩者太陽之邪充塞肌竅刺風池風府泄其所郁之熱再與桂枝則愈矣中風發熱六七日不解而煩有表裡症渴欲飲水水入即吐者名曰水逆五苓散主之多服暖水汗出愈此條即太陽熱結膀胱之煩詳注發熱太陽脈浮動數頭痛發熱微盜汗出反惡寒者表未解也醫反下之動數變遲膈內拒痛短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之此條言表邪未解誤下變結胸當用結胸法結胸症具煩躁者即死結胸症見煩躁則內水將竭矣下之則死不下亦死傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯發汗後只解得半日許又復煩脈又浮數不可更行麻黃用桂枝湯解肌發汗傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之煩而腹不滿表症也腹滿不煩里症也既煩且滿雖經下後邪在半表半裡故以梔子去煩厚朴泄滿傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之大下過下也腸胃因寒用梔子去煩加乾薑以暖中下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表症脈沉微身無大熱者乾薑附子湯主之晝夜煩躁乃是陽症今以汗下後夜則安靜且不嘔不渴外無表症脈又沉微身無大熱此本是陽症因汗下太過故用溫中之藥太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之太陽中風症又見浮緊傷寒脈發熱惡寒身疼痛不汗出煩躁之傷寒症故用大青龍湯雙解營衛之邪太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗服藥已微除其人發煩熱目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之麻黃湯主之一句在當發其汗下看從前諸注皆誤也詳注衄血條內服桂枝湯大汗出後大煩渴不解脈洪大者白虎湯主之傷寒無大熱口燥渴心煩背惡寒者白虎加人參湯主之二條詳注口渴重在煩故用白虎太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈此條詳注大便硬病人不大便六七日繞臍痛煩躁發作有時者此有燥屎故使不大便也一派下症不立下法而大承氣湯在矣得病二三日脈弱無太陽柴胡症煩躁心下硬至四五日雖能食以小承氣湯少少微和之令小安與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯脈不浮緊非表脈無太陽少陽表症見煩躁心下硬明表解而為裡熱煩躁矣詳注大便結內陽明病不吐不下心煩者可與調胃承氣湯言陽明病無太陽少陽表症不吐不下未曾傷其腸胃若有心煩是裡熱調胃承氣湯可與傷寒六七日無大熱其人煩躁者此為陽去入陰故也六七日傳裡之時身無大熱表邪已解其人反煩躁則陽邪傳入於裡宜用清裡之法梔子乾薑湯梔子乾薑陽症煩躁用梔子陰症發躁用乾薑今因本是陽症宜清不宜下反誤下之身熱不去而微煩故以二味合用仲景常以一味解表藥一味清裡藥和解表裡之邪今以化出一味寒藥一味熱藥和解冷熱不調誤下後之身熱心煩極開化方用藥之妙悟梔子厚朴湯即清氣湯梔子厚朴枳實小便不利加木通大便結有下症加大黃梔子豆豉湯治心煩懊憹腹不滿重在懊憹此方去豆豉加厚朴枳實治心煩腹滿不懊憹重在腹滿觀此二方加減治煩全在懊憹腹滿二症上分別因此悟得仲景治寒傷營無汗煩躁用麻黃湯風傷衛有汗煩躁用桂枝湯營衛兩傷之煩躁用大青龍湯熱結膀胱小便不利之煩躁用五苓散膈內拒痛結胸煩躁用大陷胸湯大汗出煩渴背惡寒用白虎湯無表症煩躁心下硬用大承氣陽症誤下變陰身熱不去之微煩用冷熱各半之梔子乾薑湯下後復發汗晝日煩躁夜則安靜身無熱之亡陽症用乾薑附子湯要知表症煩躁當汗之里症煩躁當清之邪在半表半裡當和解之有表復有里當雙解之陰躁致煩溫之灸之推而廣之凡治病當如是也大青龍湯麻黃桂枝甘草杏仁生薑石膏大棗桂枝湯治風傷衛之輕症仲景之輕方也麻黃湯治寒傷營之重症仲景之重方其大青龍湯恐麻黃湯太峻故加大棗生薑補養胃氣加石膏制麻桂辛溫以煩躁之症忌用溫熱此變麻黃湯重方而為稍輕之劑後代皆注此方太峻似乎反重於麻黃湯千古差謬桂枝湯見惡寒羌活湯見發熱防風湯見身痛五苓散見小便不利羌獨木通湯見發熱葛根湯見似瘧升麻乾葛湯升麻乾葛白芍藥甘草陽明表邪煩躁難用原方葛根湯辛溫以此方治之若無汗惡寒加羌活防風去白芍胸前飽悶加枳殼桔梗煩渴消水加知母石膏白虎湯見潮熱承氣湯見潮熱譫語譫語者語言狂妄也陽明熱極上乘心肺則神志不清輕者睡中呢喃重者不睡亦語經云譫語獨語語言不休與夫狂言言亂等症由其病之輕重而立名也今分別表熱譫語心熱譫語胃熱譫語肺熱譫語食滯譫語燥屎譫語痰熱譫語蓄血譫語八條分別表熱譫語者身雖大熱兩足獨冷或癍痧內伏或風濕相搏一身盡痛邪不外泄內攻譫妄病在太陽羌活湯病在陽明升麻葛根湯在少陽柴胡湯心熱譫語者動則狂驚靜則自笑舌苔黑刺時時昏沉無一刻清爽左寸脈數導赤各半湯胃熱譫語者時或狂妄時而清爽唇焦口渴舌生黃苔右關脈數清胃湯三黃巨勝湯手足多汗表邪未解下症急者大柴胡大幹葛湯選用肺熱譫語者肺主藏魄肺受火傷則魂魄不寧時或悲泣時或咳嚏涼膈散主之食滯譫語者外冒風寒內傷飲食邪食膠固則發譫語惟以唇不焦舌不幹渴不消水與裡熱譫語為異治宜保和散倍加枳實石菖蒲山楂萊蔔子食滯初起須用探吐之法隨用消化之藥若早用寒涼凝滯則譫語益甚若下早則胸前結聚而成結胸即有便閉脹痛應下之症亦止宜用芒硝玄明粉以硝消堅行而不滯切忌用大黃重濁凝滯之味燥屎譫語者胸中有邪熱腹中有燥屎熱結在裡下不得泄上熏心肺唇焦口燥臍腹脹滿大便不通手足時時多汗此下症譫語也三承氣湯選用痰熱譫語者心胃有痰火攻衝胞絡則君主不寧而多譫語此症口亦不渴舌上滑苔若服寒涼則譫語愈甚宜導痰湯大便結者指迷丸吳氏以竹瀝一盞生栝蔞根打爛絞汁一盞溫服滌痰清熱下順大便不比寒凝食滯不語之症忌用寒涼清潤之藥蓄血譫語者漱水在口不得下咽身目發黃言語若狂此上焦血也小腹脹滿小便反利下焦血也在上者犀角地黃湯加紅花當歸在下者桃仁承氣湯陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣一盞腹中轉矢氣者更服一盞若不轉矢氣者勿更與之明日不大便脈反微澀者裡氣虛也為難治不可更與承氣湯詳注潮熱條自此以下四章詳別譫語用承氣法陽明病譫語有潮熱反不能食者胃中有燥屎五六枚也若能食者但硬耳宜大承氣湯詳注潮熱條陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止勿更服詳注自汗條汗出譫語者以有燥屎在胃中此為風也須下之必過經乃可下下之若早語言必亂以表虛里熱故也下之則愈宜大承氣湯此章以表虛里熱三句在須下之下者千古錯解詳注自汗條須互相查考夫實則譫語虛則鄭聲鄭聲重語也實邪譫語狂妄不一正氣不足只將一語反復言之也直視譫語喘滿者死下利者亦死直視譫語惡候也又見喘滿其死必矣若見下利亦必死發汗多若重發汗者亡其陽譫語脈短者死脈和者則不死陽實譫語邪亂神明尚為可治亡陽譫說神魂無主故脈短者死脈和者尚可不死傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表裡虛實久則譫語脈沉為邪在裡今反發其汗則津液越出腸胃乾涸大便為難仲景雖不立方然微和胃氣躍然言內傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服吐下後不解又不大便獨語如見鬼狀發則不識人循衣摸床惕而不安微喘直視脈弦尚有生理脈澀者死若脈微但發熱譫語無以上惡候可與承氣湯若一服而大便利即不可再服羌活湯升麻葛根湯柴胡湯三方見惡寒導赤各半湯川連甘草生地木通知母滑石麥冬山梔黃芩犀角心熱譫語宜清心經之熱欲清心熱莫如先利小便清胃湯川連升麻生地山梔甘草譫語清心熱一法也亦有胃熱譫語宜先清胃者故先立導赤各半湯又立清胃湯也三黃巨勝湯黃芩黃連大黃山梔石膏此因三陽經皆熱故以三黃湯兼清三陽加石膏山梔則功力巨大大幹葛湯見頭痛譫語有下症者理宜承氣湯若尚帶陽明表邪家祕以乾葛石膏加大黃枳殼雙解陽明表裡此從大柴胡雙解少陽表裡法中化立此方要知清胃湯清足陽明胃熱者大幹葛湯清手陽明大腸熱者涼膈散桔梗黃芩山梔連翹玄參天花粉薄荷甘草黃連玄明粉心熱胃熱譫語人所知之至於肺熱人多不知上焦熱甚則神魂迷蕩故涼膈清神持治譫妄枳石平胃散熱蒼朮厚朴廣皮甘草枳實石菖蒲山楂肉萊蔔子食滯胃家外冒表邪寒凝抑遏皆發譫語故立平胃保和散倍加枳實菖蒲萊蔔子導痰湯半夏南星枳實赤茯苓橘紅石菖蒲甘草海石有熱加黃連食滯譫語用平胃消導若痰結中脘又當消痰指迷丸半夏陳皮甘草白茯苓枳實玄明粉痰結胃家用導痰方法熱痰下結大腸當用指迷丸犀角地黃湯見身痛衄血譫語如狂亦有血症諦者以此方出入加減桃仁承氣湯見蓄血大承氣湯見便結發狂經云邪入於陽則狂又云重陽為狂傷寒書以熱毒入胃併入於心遂使狂言妄語大渴引飲然此指熱甚一條而言也夫發狂症內傷有痰熱挾食驚氣蓄血血虛失精神不守舍七者之分今外感以表邪壅閉裡熱內結血蓄癍毒挾痰食滯陰躁七者之別未可概以火熱治之而犯誤下寒涼抑遏之弊也表邪壅閉者其人素有積熱外冒表邪不得發泄內擾神明遂使志識昏迷但見狂妄即有表邪因內有積熱不宜辛溫發散無汗脈浮數先以羌活沖和湯散表後以雙解散和解表裡邪熱內結者六脈沉數唇焦口渴手足多汗狂亂譫語二便閉澀當以黃連解毒湯涼膈散導赤各半湯清利裡熱若大便不通有下症者承氣湯下之蓄血發狂者如狂喜忘漱水在口不能不咽寸脈見芤者血蓄上焦也當歸桃仁湯主之小腹硬滿小便自利尺脈見芤者血蓄下焦也桃仁承氣湯甚者抵當湯癍毒發狂者內伏癍毒外被風寒所束或食生冷抑遏或因食滯中焦癍毒不得發越內擾神明左脈或浮或躁者羌活敗毒散生冷抑遏食滯中焦右脈滑大者保和散平胃散時氣發狂者四時之疫氣沿門患之當察時令所屬應發表者羌活敗毒散應和解者雙解散應清涼者涼膈散黃連解毒湯另有挾食發狂者外感時令內傷飲食滯於中焦則多譫語症似陽狂但脈大不數口不消水為異亦宜平胃保和散等煎湯服之又有挾痰發狂者中脘有痰胸膈痞滿迷塞包絡口出無倫語症似陽狂但唇不焦口不渴舌有滑苔痰在上焦寸脈滑大法先吐之鹽豉湯探吐痰在中焦關脈洪滑二陳湯加竹瀝膽星有結痰痰積者加海石瓦稜子脅肋脹滿作痛有實候者先以導痰湯服之有下症者以滾痰丸下之陰躁發狂另具陰症門太陽病不解熱結膀胱其人如狂血自下者愈其外不解者尚未可下當先解外外已解但小腹急結者乃可攻之宜桃仁承氣湯太陽病六七日表症仍在脈微而沉反不結胸其人發狂者以熱在下焦小腹當硬滿小便自利者下血乃愈所以然者以太陽經淤熱在裡故也抵當湯主之太陽病身黃脈沉結小腹硬小便不利者為無血也小便自利其人如狂者血症諦也抵當湯主之三條詳注蓄血陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱庵然如狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈此條詳注身痛羌活沖和湯見發熱發狂不用表藥今以表邪未解故先散表邪然後或清熱或消食或消痰雙解散羌活葛根柴胡防風荊芥石膏黃芩滑石山梔連翹知母甘草桔梗表邪發狂止須解表裡熱發狂止須清裡若表裡俱見之症以此方雙解表裡黃連解毒湯黃連黃芩黃柏山梔石膏發狂之症外無表邪里無痰食則以此方清裡熱涼膈散桔梗天花粉連翹薄荷黃芩大黃芒硝山梔心藏神肺藏魄心肺為邪熱所冒則神識昏迷狂言譫語故以此方清上焦心肺之熱承氣湯見大便結狂亂系熱結在裡故大便不通而狂亂者宜用此方導赤各半湯木通生地甘草黃連知母滑石麥冬山梔黃芩犀角心為熱冒則發譫狂故以導赤散合瀉心湯上清心經之火加滑石導心火下通小便而出加知母山梔黃芩兼清上焦肺火以利小便莫如清肺清肺熱又莫如利二便也當歸桃仁湯當歸桃仁紅花丹皮山楂澤蘭葉如狂喜忘之症血結者多故以此方治之不應再加枳殼大黃直達大腸桃仁承氣湯見蓄血血停上焦用上方兼化兼行血蓄下焦用此方抵蓄湯見蓄血此方行血至重然淤血沉結非此不可羌活敗毒散見發熱疫毒必從毛竅口鼻感入故疫症發狂見表症者宜先散疫毒保和丸山楂麥芽萊蔔子熟半夏連翹香附枳殼熱甚加梔連濕鬱痞滿合平胃散石菖蒲發狂症皆以陽火主治亦有食滯中焦生冷抑遏故特補此消導法門二陳竹瀝膽星湯熟半夏白茯苓陳皮甘草膽星竹瀝寒涼凝結加生薑內有積熱加梔連濕鬱合平胃散氣結加枳殼香附石菖蒲滾痰丸礞石黃芩大黃黃柏沉香胃實食重熱結大腸用承氣湯下之表邪下早內陷心胸用陷胸湯下之今熱痰膠固腸胃以此方下之嘔吐有聲無物為嘔有物無聲為吐有物有聲為嘔吐仲景有乾嘔條嘔而無物之謂嘔吐症以內傷論皆在陽明胃家以外感論有各條分別若惡寒發熱脈浮而數初起胸滿而嘔此太陽外感風寒胃家內有痰飲以羌活湯散太陽表邪合保和平胃散加乾葛消胃家痰飲食滯若寒熱嘔而口苦脈見弦數此少陽經表邪嘔苦之症小柴胡湯治之若初起兼有飽滿嘔吐亦是胃家夾食佐以保和平胃散若目痛鼻乾先渴後嘔無汗脈浮大此陽明外有表邪內有積熱以乾葛清胃法治之若有汗脈數嘔而消水此燥火嘔吐也知母石膏湯沖竹瀝蘆根汁若嘔而不渴身不大熱此濕火嘔吐也梔連半夏湯加白豆蔻厚朴竹茹若噁心嘔吐六脈滑大不數發熱而口反不渴此痰飲食積嘔吐之症也平胃保和散二陳導痰湯加乾葛竹茹治之若口臭牙疼二便赤澀此積熱痰火嘔吐也升麻清胃湯二陳湯竹茹湯加川連白豆蔻若脅肋刺痛嘔吐酸水此肝木火沖之嘔小柴胡加梔連竹茹總之無痰涎不嘔吐故熱病嘔吐皆痰飲火邪上衝用竹茹半夏化痰涎梔連清胃火家祕以竹茹半夏湯加梔連白豆蔻其吐立止若夫時行熱病汗出不解足冷耳聾煩悶咳嘔此疫毒癍症嘔吐也羌獨敗毒散升麻乾葛湯升麻清胃湯若燥邪時疫嘔吐加知母石膏竹瀝半夏沖蘆根汁生梨汁熱服方書云嘔家多服生薑此指胃寒痰飲嘔吐而言若胃熱者不與川連同用寧不增病耶惟三陰經胃寒嘔吐乃用理中湯等溫劑此書專為傷寒熱病故三陰不發熱嘔吐另具症因脈治中也太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔桂枝湯脈浮自汗翕翕發熱此即太陽中風症故解肌散表則嘔自止凡服桂枝湯吐者其後必吐膿血服桂枝而吐者胃必熱胃熱得桂枝後必吐膿血發汗後水藥不得入口為逆若更發汗必吐下不止太陽熱結膀胱下部症發表為逆故水藥不得入口若再發汗必氣升而吐利不止中風發熱六七日不解而煩有表裡症渴欲飲水水入即吐名曰水逆五苓散主之多服暖水汗出即愈此申明太陽熱結膀胱表裡吐逆之症應用五苓治者太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之太陽中風下利嘔逆表邪已解脅下痛乾嘔短氣此兼懸飲宜十棗湯治者太陽病或已發熱或未發熱必惡寒體重嘔逆脈陰陽俱緊此申明寒傷營之嘔逆症必發熱惡寒身體重痛嘔逆而無汗脈陰陽俱緊者傷寒二三日心下悸而煩者小建中湯主之嘔家不可用建中湯以甜故也本言悸煩症治引出嘔家用藥禁忌甘甜泥膈傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡主之心下痞而硬而下利者通因通用之下症也尚有發熱嘔吐止可用大柴胡湯傷寒六七日發熱惡寒肢節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之詳注惡寒門太陽少陽二經外邪未去而微嘔故用柴胡桂枝湯傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之胸中有熱胃中有邪腹中痛言濕熱上衝嘔吐故以黃連湯治火逆前書皆注邪氣為寒氣誤也傷寒吐後腹脹滿者與調胃承氣湯腹脹滿雖是下症但吐後止可用調胃承氣湯傷寒嘔多雖有陽明症不可攻之嘔屬上焦病即有陽明裡症亦不可攻下食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦食谷欲嘔似陽明胃寒若服溫藥反劇者乃是上焦熱邪傷寒五六日中風往來寒熱胸脅若滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之此條歷敘少陽中風邪在半表半裡默默不欲食心煩喜嘔並以小柴胡湯加減治之太陽與陽明合病不下利但嘔者葛根加半夏湯主之太陽與陽明合病者必自下利葛根湯主之二條皆是太陽陽明合病但以不下利嘔者別病在足陽明胃以不嘔下利者別病在手陽明大腸故同用葛根湯惟以加半夏以見其和胃止嘔以去半夏便是升散大腸風邪內陷太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯太陽與少陽合病同自下利以不嘔用黃芩湯若嘔吐黃芩湯中加半夏生薑上下二章互發嘔吐症半夏生薑必用者太陽之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸滿結硬此條太陽經外有表熱里有寒邪而嘔利也若誤用下法則變胸滿結硬矣傷寒本自寒下利醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯言傷寒則為熱病若陰症自寒下利吐下之即死矣豈尚可用芩連乎因其人表熱裡寒下利醫者誤認挾熱復吐下之則寒格而食入口即吐出故用乾薑溫其寒芩連折其熱嘔而發熱者小柴胡湯主之嘔吐而發熱陽邪傳少陽故用小柴胡湯羌活沖和湯見發熱保和平胃散嘔吐有表邪用前方有食滯用此方消導小柴胡湯小柴胡湯有柴胡黃芩無竹茹枳實清膽湯有竹茹枳實無柴胡黃芩加二味則二方合之又加藿香厚朴以利胃止嘔乾葛清胃湯乾葛石膏熟半夏厚朴廣皮甘草乾葛解表石膏清裡加半夏厚朴廣皮化痰涎和胃止嘔羌獨敗毒散見發熱此方散表邪則疫毒散而嘔吐止故曰敗毒散升麻葛根湯見發熱疫邪癍痧伏於陽明胃經嘔吐用此方升散陽明則癍出吐止蒼朴導痰湯痰飲水濕伏於胃家每多嘔吐故用燥濕化痰非外感熱病漫用燥藥梔連二陳湯前方治有痰無火者此方加川連白豆蔻竹茹厚朴治有痰有火者竹茹湯竹茹乾葛陳皮半夏甘草藿香嘔吐屬胃此方以乾葛竹茹清胃廣皮甘草和胃無涎不成嘔故加半夏化痰涎應辛散者加生薑應清火者加梔連白豆蔻若帶表症加各經表藥若和中氣加藿香厚朴若飽悶有食滯加消導之藥黃連湯見腹痛胃寒而吐用理中湯吳茱萸湯胃熱而吐用黃連湯若熱痰嘔吐梔連二陳湯食滯熱嘔梔連保和散口渴熱嘔合乾葛石膏湯黃芩加半夏生薑湯太陽少陽合病當用桂枝柴胡黃芩湯今見嘔吐故加半夏生薑乾薑黃連黃芩湯乾薑黃連黃芩人參此方寒熱並用統治誤下致嘔者加廣皮半夏即合瀉心湯方法喘逆喘者促促氣急正傳云哮以聲響名喘以氣息言河間云病寒則氣衰而息微病熱則氣盛而息粗諸經皆令人喘而肺胃二經者多大抵喘而作嗽者肺也喘而嘔惡者胃也內經論喘不一皆雜症之條若傷寒論惟曰有邪在表而喘有邪在裡而喘有水氣痰火而喘若在表者心腹不滿不痛脈浮無汗者宜發汗冬月西北方麻黃三拗湯若內有熱者越婢湯南方三時羌活湯若熱邪入里而喘者心腹脹滿外無寒熱手足時時汗出法當清熱瀉心湯涼膈散有表邪有下症者大柴胡湯有下症無表症者三乙承氣選用水氣而喘者先渴後嘔動而有聲宜祛水飲小半夏湯水寒射肺風寒外束而喘者小青龍湯痰火喘者乍作乍止六脈滑數梔連二陳湯加枳桔竹茹總之頭痛身痛惡寒身熱而喘者此太陽風寒表邪宜散表身熱多汗煩悶喘渴靜則多言此暑熱喘逆宜清暑湯調益元散口渴身熱面赤多汗唇焦喘咳氣逆此燥火喘逆宜清燥湯知母石膏湯栝蔞根湯食滯中焦胸前飽悶喘滿不得睡臥平胃保和散若喘而咳嗽者此肺風肺熱之喘詳注咳嗽門太陽病頭痛發熱身痛腰痛惡風寒無汗而喘者麻黃湯主之此太陽表邪之喘詳注頭痛發熱門太陽與陽明合病喘而胸滿者不可下麻黃湯主之胸滿多帶表症故曰不可下宜散表互注胸滿條傷寒不解心下有水氣乾嘔發熱而咳或喘者小青龍湯詳注咳嗽條言外邪不解內伏水飲當散表散飲傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯發熱不渴知心下有水氣故以小青龍湯今服此湯已後見渴者此水寒已去病欲解不必服小青龍詳注咳嗽喘家有汗桂枝湯加厚朴杏仁湯主之太陽風傷衛當服桂枝湯今兼喘則加厚朴理胃氣杏仁理肺氣太陽病下之微喘者表未解故也桂枝湯加厚朴杏仁湯主之喘家作桂枝湯加厚朴杏仁佳太陽病誤下之表邪不解而喘用桂枝湯當加平肺胃之藥故曰喘家用桂枝加厚朴杏仁乃佳發汗後不可更行桂枝汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之發汗後飲水多者必喘以水灌之亦喘下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯上半節言發汗後不可再行桂枝下半節言下後不可再行桂枝湯汗下雖殊同是表邪未盡同是汗出而喘身無大熱故以此方雙解太陽此從太陽熱結膀胱用桂枝五苓散雙解下焦表裡法中化出雙解太陽上焦熱結之法也詳注自汗條宜互看太陽病桂枝症醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯此條誤下太陽不成結胸而成挾熱下利喘而汗出詳注自汗門陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難麻黃湯主之發熱惡寒脈浮而緊尚是太陽表邪若誤下之則腹滿而小便難麻黃湯主之句在脈浮而緊之下陽明病脈浮無汗而喘者發汗而愈宜麻黃湯脈浮無汗而喘即從太陽表邪而治不必拘執陽明病故曰發汗則愈陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重白虎湯五苓散上條言脈浮而緊當散表此言咽燥口苦腹滿發熱汗出不惡寒反惡熱又當用白虎湯治咽燥五苓散治脈浮而緊腹滿身重傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表裡虛實久則譫語脈沉而喘宜清裡熱反發其汗津液外亡大便枯滯此表無邪里有熱故久則譫語病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯仲景每以小便利驗屎定硬今又以小便不利以定下法小便利驗屎已定硬故可下小便不利驗熱已入里故可下大便乍難乍易大腸有火之徵故可下時有微熱潮熱互詞故可下喘冒不得臥陽明胃實故可下傷寒吐下後不大便潮熱若劇則不識人循衣摸床微喘直視脈弦者生澀者死症急惟以脈定生死脈弦陰未絶故生脈澀陰已竭故死羌活湯見惡寒羌活沖和湯太陽純表邪見喘則用前方若有表邪又有裡熱則用此方瀉心湯見譫語涼膈散見發狂裡熱作喘當分肺胃心三經主治前方瀉心下之熱此方兼肺胃治之大柴胡湯見潮熱三承氣湯見大便結小半夏湯熟半夏廣皮生薑喘逆有痰火水飲之分此方治水飲喘逆而無火者小青龍湯見咳逆此方治內伏水飲外冒風寒而喘者詳注咳逆條梔連二陳湯梔子川連半夏廣皮白茯苓甘草前小半夏湯治無火之痰此方治有火之痰清暑湯川連香薷厚朴甘草香薷性溫世傳清暑不知與黃連同用一冷一熱故能清暑邪例如服六一散必用滾水泡服方能散暑邪而宣腠理清燥湯桑葉石膏人參麥門冬枇杷葉杏仁阿膠黃芩知母天花粉此方以石膏黃芩知母花粉清潤上焦桑葉杏仁引入肺中人參門冬阿膠潤肺生津同一治熱治濕熱用苦燥治燥熱用涼潤按燥濕分於二分然春分應濕而未濕至穀雨而始濕秋分應燥而未燥至霜降而始燥故曰逢霜始燥逢雨始濕此言時令之正也亦有濕時反燥燥時反濕又當從權變而治也知母石膏湯知母石膏半夏竹葉麥門冬甘草火喘無痰者用石膏知母火喘有痰又要加半夏夫石膏寒涼同半夏亦能辛散痰涎半夏辛熱同石膏亦能清熱和胃此潤燥方中化出辛散痰涎定喘之法兼可化治痰火嘔吐痰火咳嗽等症栝蔞根湯栝蔞根半夏竹茹枳殼桔梗前清燥湯治肺燥喘逆者知母石膏湯治胃熱喘逆者栝蔞根湯治肺胃二經痰多喘逆者平胃保和散見胸滿此治食滯中焦喘滿不得臥者用枳殼湯調下麻黃杏仁甘草石膏湯四味此方因汗下後汗出而喘身無大熱表症已減桂枝湯不可用故以麻黃加入杏仁石膏清肺湯中雙解上焦之餘邪而治喘逆乾葛黃芩黃連湯三味仲景喘而汗出有三條其一以太陽汗後喘而汗出身無大熱其二以太陽下後喘而汗出身無大熱汗下不同而同禁桂枝同用麻黃甘草杏仁石膏湯其三以桂枝湯症反用承氣誤下遂利不止脈促表未解喘而汗出則用葛根芩連主治按第一第二條汗下不同以其病症同在太陽上焦故同用麻黃甘草杏仁石膏湯其第二與第三條同是下後同是喘而汗出反不同方主治者以其病在陽明下焦協熱下利故用乾葛芩連湯身重傷寒門有身痛有身重中寒門有身痛無身重可知身重皆是陽邪為患非虛寒之謂按身重有風濕有風溫有風寒有火逆有中暍如風濕相持身體疼痛不能轉側羌活勝濕湯重加防風如風溫身熱發汗猶灼熱身重多眠防葛石膏湯如風寒身重者即作傷寒施治若無汗脈浮惡寒發熱手足或冷即是表邪急宜汗之羌活湯敗毒散羌活勝濕湯若表邪已解里有結熱惡熱不惡寒脈沉而數口渴便赤宜清裡石膏湯邪在半表半裡宜和解小柴胡湯如火邪身重者表汗未出誤用火熏腰下重痹者宜解火邪如中暍發熱身重身痛手足常冷時時汗出口渴齒燥宜人參白虎湯太陽病或已發熱或未發熱必惡寒體重嘔逆脈陰陽俱緊者名曰傷寒此條詳注惡寒脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮宜發汗解肌者失解表誤以火灸兩陽相熏灼邪無從泄腰以下必火閉無汗故必重痹名曰火逆傷寒八九日下之胸滿煩驚小便不利譫語一身盡甚重不能轉側者柴胡加龍骨牡蠣湯主之下後變症仲景立小柴胡湯加桂枝治身重加大黃治譫語又加龍骨牡蠣斂神收攝制使大黃清裡熱而不下脫制柴胡桂枝散表邪而不外越以下後危症外越不脫又所當慎傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之言但重乍有輕時的是太陽表邪攻注症乍重者寒傷營也乍輕者風傷衛也言無少陰症以明太陽症也故用大青龍湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出此大便已硬也大承氣湯若汗多微發熱惡寒外未解也其熱不潮未可與承氣湯此章詳注潮熱泛視之似乎身重之症治宜攻裡細玩之深言身重宜發汗未可攻裡三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗者白虎湯主之此條詳注自汗羌活勝濕湯羌活防風蒼朮黃柏澤瀉茯苓廣皮甘草身重風濕居多此方用三味以祛風又以澤瀉茯苓利小便去濕風濕兼寒去黃柏加桂枝防風葛根石膏湯防風乾葛知母石膏甘草陽明風濕身重家祕用此方羌活敗毒散見惡寒石膏湯石膏白芍藥柴胡升麻黃芩甘草白朮茯苓附子此治陽虛寒濕之眩暈苓桂白朮甘草湯桂枝茯苓白朮甘草此治上虛不能制水水飲上衝眩暈之症天麻四君子湯即四君子湯加天麻此治氣虛眩暈者有火加梔連有痰加半夏廣皮有寒加炮薑肉桂天麻四物湯即四物湯加天麻身癢內傷身癢有實有虛外感身癢悉是表汗未出故太陽症有身癢之條陽明病有身如蟲行皆是表邪無從而出故身癢但坐以汗出不徹之故夫表有風寒則身痛表有風熱則身癢總之陽邪怫鬱於肌表不得汗出則皮膚作癢太陽身癢羌獨敗毒散若陽明身癢乾葛防風湯少陽身癢柴胡防風湯原病式謂腠理閉密陽氣鬱結不得散越則發癢故仲景用麻黃桂枝各半湯辛散表邪陽明篇曰此久虛故也言元氣久虛津液不足之人又冒外邪因久虛之故不能作汗逐邪當散表邪非言久虛而用補藥活人妄以朮附湯黃耆建中湯治最為遺禍太陽得之八九日如瘧疾狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也面色反有熱色者未欲愈也以其不得小汗出身必癢宜桂枝麻黃各半湯太陽症八九日言如瘧狀必其人不嘔清便脈微緩者有欲愈之機若面反有赤色尚是表邪未散身必癢故用發散表邪陽明病法多汗反無汗其身如蟲行皮中狀者此久虛故也陽明病本多汗今反無汗則外邪攻注皮中如蟲行之狀乃是元氣素虛不能作汗逐邪故也不立方然散表補元躍躍言外羌獨敗毒散見發熱乾葛防風湯乾葛防風荊芥甘草太陽身癢不用麻桂各半湯而用羌獨敗毒散陽明身癢不用幹葛湯原方而用此方以表邪火鬱故耳柴胡防風湯柴胡防風荊芥甘草太陽陽明身癢用前二方若少陽身癢則此方治之若三陽合病身癢當以三方合用桂枝麻黃各半湯見發熱頭眩傷寒頭眩言睡在床褥亦覺頭眩眼花非言坐起而覺也夫外感風寒之症坐起時皆頭眩也方書頭眩皆以陽虛立論愚以為久病後汗下吐後方可言陽虛若暴病及未曾汗下吐者則風寒邪熱痰火積飲皆能眩暈吳氏書以太陽中風頭眩頭搖脈浮弦而急者羌活神術湯加防風天麻此治太陽陽明外感風寒也又云寒熱嘔而口苦頭眩脈弦數小柴胡湯加川芎天麻此治少陽頭眩也余今酌定初起暴病有表症而頭眩無汗脈浮者發散表邪為主在太陽用羌活湯在陽明用乾葛防風湯在少陽用柴胡湯以上惡寒者多加羌活有風者多加防風有火者加酒炒黃芩連若表症已解里有結熱又宜清裡熱如桔梗湯涼膈散大凡眩暈之症一見嘔吐即為痰飲食滯急用保和平胃二陳湯里有積熱者加山梔黃連最忌凝滯補劑惟汗吐下及久病後見頭眩者當用溫中扶元如建中湯真武湯苓桂白朮甘草湯若氣虛者四君子湯加天麻氣虛有火加梔連虛而有痰者六君子湯血虛者四物湯加天麻血虛而有火者加山梔黃連若陰火上衝知柏四物湯太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之太陽病誤用麻黃以發汗是以頭眩身瞤動一派陽虛之症故用真武湯傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之言若吐若下後久病胃虛不能運化虛邪搏飲上衝故頭眩脈沉緊非汗脈強發汗則振振身動故用苓朮甘桂湯助中州化水飲傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿此與上條同是吐下後因此症心下痞硬脅下痛氣上衝咽喉似火似實又見眩冒經脈動惕之虛候攻補兩難故曰久則成痿太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門此條詳注項強陽明病脈遲食難用飽飽則微煩頭眩必小便難欲作谷疸雖下之腹滿如故所以然者脈遲故也陽明病脈遲胃寒也飽則微煩頭眩胃寒不能消水谷停留腸胃則小便難而作谷疽雖下之腹滿如故何以知其然者以脈遲陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者不痛陽明病不惡寒又能食胃熱也咳主於肺胃熱上衝則肺熱而咳咽喉痛設不咳則肺無火咽亦不痛少陽之病口苦咽乾目眩目眩口苦膽經所主故名少陽之病羌活神術湯羌活蒼朮石膏防風天麻此治太陽風濕發熱眩暈之症若兼陽明加乾葛白芷兼少陽加柴胡川芎兼飽悶噁心加半夏神麯小柴胡湯柴胡黃芩廣皮甘草川芎天麻半夏此治少陽寒熱眩暈症若惡寒加羌活防風有火加梔連羌活湯見惡寒此治太陽惡寒發熱眩暈者若胸前飽悶合平胃保和散嘔吐加半夏天麻乾葛湯見似瘧此治陽明表邪眩暈者若嘔吐飽滿加半夏厚朴惡寒無汗加羌活防風桔梗湯桔梗半夏陳皮枳實此治痰結飽悶眩暈者若惡寒發熱加羌活防風里有積熱加梔連陽明見症加白芷天麻少陽見症加柴胡川芎涼膈散見發狂平胃二陳湯即蒼朴二陳湯此治痰飲食積眩暈之症胸前飽悶合保和散加砂仁豆蔻胃寒加乾薑胃熱加梔連建中湯白芍藥桂枝甘草此治陽虛眩暈之症氣虛加人參白朮血虛加當歸黃耆真武湯口渴濕熱則口不渴燥熱則口渴此以渴不渴分濕火燥火也熱在血分則不渴熱在氣分則作渴此以渴不渴分熱在血熱在氣也胃家痰食所滯則口渴而不消水胃家邪熱所傷則渴而消水此以消水不消水分痰食積熱也實火口渴脈實數能消水虛火口渴脈虛數不能消水此以脈之虛實消水不消水分虛火實火也邪熱在表則不渴邪熱在裡則作渴此以渴不渴分熱在裡熱在表也太陽表熱不渴若熱入膀胱之裡則煩渴脈數小便不利五苓散兩解表裡切不可同陽明汗出口渴誤用白虎有礙太陽表邪陽明表熱則無汗而渴葛根湯汗之若熱邪入於陽明之經汗出而渴脈洪而數白虎湯清之若熱結在下小便不利而渴豬苓湯切不可同太陽小便不利誤用五苓散以礙陽明裡熱若熱邪傳入陽明之腑舌燥口渴大便不通手足多汗有下症者承氣湯少陽裡熱口苦咽乾脈弦數而渴小柴胡湯去半夏加天花粉三陽之熱傳入三陰有熱深厥深手足冷而渴者然脈必數神氣昏沉小便必赤此陽症似陰之渴也仍用白虎湯涼膈散外有陽毒熱病目赤唇黑大渴引飲三黃巨勝湯涼膈散又有中暑煩渴乾葛石膏湯調辰砂六一散又有秋熱傷燥而發渴者水梨汁西瓜汁沖飲之未應石膏清燥湯又有冬溫春熱時疫發渴又以欲飲水能消水為欲愈以得水入胃胃氣和敷布周身作汗外泄則熱解而渴亦愈若禁其飲水則胃汁乾枯無從作汗而熱不解矣大凡口渴之症皆陽明氣分胃熱所致故乾葛石膏乃渴症必用之藥乾葛宣發陽明之鬱熱石膏清潤陽明之裡熱有連用石膏知母渴不減後用乾葛而愈者此陽明表熱口渴也有連服乾葛渴不減後用石膏知母而愈者此陽明裡熱口渴也同一陽明經病同一陽明經藥而失分表熱裡熱則不見效又如口燥唇焦不能消水以乾葛石膏治之不效以痰飲食滯治之亦不效此熱伏陽明血分故唇焦不渴易以升麻清胃湯清陽明血分伏火而愈者癍症中常有此症也是以雜症中口渴有肺消腎消不足之症今傷寒熱病一惟陽明經熱即有少陰口燥咽乾而渴厥陰消渴飲水亦是陽明傳入三陰之熱病是以仲景不設滋陰補血之方於口燥咽乾條內者良以滋陰之藥治血虛發熱之口渴非治熱邪外盛口渴症者中風發熱六七日不解而煩有表裡症渴欲飲水水入即吐名水逆五苓散主之多服暖水汗出即愈此章首揭多汗發熱不解而煩渴欲飲水此太陽有表有里用不得單表單清之藥宜用五苓散上下分消表裡者太陽病發汗後大汗出胃中乾燥煩不得眠欲得飲水者少與之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散此章分別不可用五苓散宜用五苓之法上段言發汗後大汗出胃中干煩躁欲飲水無脈浮小便不利句但可與飲水焉可用五苓下段多脈浮小便不利之句焉可不用五苓前賢見一方在末句皆注總治全章誤也發汗已脈浮數煩渴者五苓散主之發汗已脈浮數不煩渴者可再發汗今煩渴此太陽熱結在裡故以五苓散雙解表裡可見五苓散惟太陽小便不利脈浮煩渴方可用若陽明煩渴小便不利當豬苓湯傷寒汗出而渴者五苓散主之不渴者茯苓甘草主之此章申明傷寒汗出風傷衛之症須分別渴與不渴若一見渴則為里有結熱可用五苓散若汗出不渴者則非熱結在裡故不可用五苓散觀仲景用五苓散不重在小便不利治法之中反詳於口渴引飲發熱多汗表熱不減條內可見意在雙解表裡上下分消太陽耳非利小便也本以下之故心下痞與瀉心湯痞不解其人渴而口煩躁小便不利者五苓散主之誤下太陽心下痞滿用瀉心湯痞不解反渴而煩躁小便不利此太陽之邪因下內陷下結膀胱故用五苓散雙解表裡按以上五條皆反復告誡用五苓散以治汗多熱不解口渴煩躁之症良以表熱不退多用發表口渴煩渴多用清熱今因汗出表不解又見煩渴消水此太陽表裡兩兼之症又當雙解表裡非單清單表所能愈者服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之煩渴本白虎湯症然惡寒無汗而渴脈浮脈細而渴脈伏不消水而渴太陽汗多表熱不解表裡熱結而渴皆禁白虎湯此以服桂枝湯後大汗後大煩渴脈洪大此陽明表解裡熱之渴故用白虎湯傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表症者白虎加人參湯上章申明用白虎之症此章又恐表邪未解故復告誡若傷寒脈浮發熱無汗表症不解不可用白虎即渴欲飲水亦要看表症全無方與白虎湯傷寒無大熱口渴心煩背微惡寒者白虎加人參湯主之上章關防表症不可用白虎此章又恐口燥渴心煩津液有立盡之虞故曰身無大熱口燥渴心煩者裡熱已極即有背微惡寒表症亦用白虎湯傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒七八日不解熱結在裡舌乾燥而煩直至消水數升當用白虎湯今以若吐若下後故加人參以救津液陽明病脈浮而緊咽噪口苦腹滿而喘發熱汗出不惡寒反惡熱身重心中懊憹舌上白苔者梔子豆豉湯若渴欲飲水口乾舌燥者白虎加人參湯若脈浮發熱渴欲飲水者小便不利者豬苓湯主之此章分三條治法詳注懊憹門以梔子豆豉湯治懊憹舌上白苔又以白虎人參湯治渴欲飲水清陽明上焦之熱若加小便不利者又用豬苓湯清陽明下焦熱結陽明病汗多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便也上章立豬苓湯治法此章防汗多者津液外泄渴者內水已虧不可用豬苓湯傷寒五六日中風往來寒熱胸脅苦滿默默不能飲食心煩喜嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之傷寒中風有柴胡症但見一症便是不必悉具若胸中煩而不嘔去半夏人參加栝蔞實若渴者加人參栝蔞根去半夏此條歷敘少陽經之各症而以小柴胡湯主治惟以煩而嘔則用半夏若不嘔去半夏人參加栝蔞實若渴者去半夏加人參天花粉傷寒四五日身熱惡風頭項痛脅下滿手足溫而渴小柴胡湯主之此申明上章一見少陽症便以小柴胡湯主治太陽篇有一些惡寒頭疼便是太陽施治今少陽篇又云有柴胡症但見一症便是少陽玩兩篇互發見症治症之義少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之此申明少陰下利有寒熱兩途今咳而嘔渴心煩不得臥此少陰熱利也故用豬苓湯從下去熱少陰病得之二三日口燥咽乾者急下之大承氣湯此申明少陰裡熱症口燥咽乾而渴則津液立竭故用大承氣急下少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯此明凡用急下必要見下症者質清而無渣滓相雜色青而無黃赤相間熱極假陰之候然必得心下硬痛口燥咽乾而渴方是裡實下症的據五苓散見小便不利乾葛湯見似瘧白虎湯知母石膏粳米甘草陽明表熱口渴用乾葛湯陽明表解裡熱則用白虎湯如小便不利加滑石木通車前子虛弱人加人參豬苓散見小便不利陽明水液不分口渴下利以此方分利小便承氣湯見大便結熱邪傳入陽明之裡則發渴消水傳入少陰則口燥咽乾而渴故渴而大便結有下症者用此湯小柴胡湯見寒熱頭眩風盛為消木能盜水故少陽風發之瘧消渴特甚小柴胡去半夏加天花粉乃不易之常法導赤各半湯火動於中則多消渴然諸火皆起於心心與小腸為表裡凡治心火莫如利小便此方導赤散合瀉心湯專利小便三黃巨勝湯黃芩黃連大黃石膏中有積熱身熱多汗二便赤閉目赤唇焦譫妄作渴飲水則用此方涼膈散見發狂肺胃有熱多發渴此方雖用大黃不用枳殼與桔梗同用則涼上而不下行矣乾葛石膏湯見寒熱陽明裡熱作渴用白虎湯陽明表裡皆熱亦用此方石膏清燥湯見喘逆熱在氣分口多渴燥熱為病口多渴清燥湯氣分藥也清氣分之燥熱則渴自止大黃黃連瀉心湯大黃黃連甘草口渴皆系內熱瀉心下之火則熱退渴止枳實梔子豆豉湯見懊憹食滯中焦每不作口渴然蒸釀日久亦能作渴故不用清熱治渴而以腐谷消滯則渴自止茵陳蒿湯茵陳梔子大黃發黃口渴全憑濕熱上起見故去熱退渴推此方為當升麻清胃湯同一陽明症以渴而消水熱在氣分用乾葛清胃湯渴不消水熱在血分用升麻清胃湯治膏粱積熱亦用升麻清胃湯以血肉之物善傷血分耳若以陽明邪熱之口渴妄用膩膈之味則邪熱凝滯食氣痰飲膠結胸前蒸釀發熱其渴愈甚另有三陰下利陰寒之症亦有假作渴者然渴不消水小便清白為異耳口燥口乾燥者邪熱結聚上焦陽明胃經所主肺熱者亦有之肺熱涼膈散胃熱竹葉石膏湯身熱已減表邪已解有下症者三承氣湯選用少陽病口苦舌乾小柴胡去半夏加天花粉陽明病背惡寒口乾燥白虎湯熱傳少陰口燥咽乾而渴手足冷脈反沉澀不治之症也按口燥與口渴不同口渴者口中尚有津液但時時欲飲水口燥咽乾者口中燥裂津液全無仲景於背惡寒條以口中和不幹燥者為陰寒若背惡寒口乾燥者為陽熱然又當以消水不消水小便清白紅赤以定寒熱唇焦夫唇口焦裂人身大病也在雜症中有脾肺心及腸胃五條在外感門惟手足陽明所主上唇挾口屬手陽明大腸下唇挾口屬足陽明胃傷寒熱在太陽則唇口不焦熱傳在陽明則唇口焦裂故曰陽明燥熱唇口焦裂然又有分別唇焦而消水者為燥熱唇焦不消水者為濕熱又曰熱在氣分則焦而口渴熱在血分則焦而不渴又曰唇口焦渴而消水胸前寬適者為熱而無滯宜清熱渴不消水胸前飽悶者為熱而有食滯宜消滯此言足陽明胃上部熱也唇口焦不渴不飲水腹中煩滿者為熱在大腸有燥糞此言手陽明大腸下部熱也故唇焦之症有用保和散消導上部胃家食滯而愈者有用承氣湯去下部大腸燥糞而愈者不獨涼膈清熱一法可盡之例如熱邪譫語唇焦口燥渴而消水用涼膈散導赤各半湯清上焦燥熱者食滯譫語唇焦口燥渴不消水用枳實豆豉湯保和散沖竹瀝蘆卜汁潤燥消中焦滯者燥結大腸譫語唇焦用承氣湯行下焦燥屎者另有熱病與發癍誤食葷腥油膩與熱邪癍毒結紐不解唇口焦裂口臭牙疳渴不消水煩熱昏沉若以保和散等消穀食治之病必不減若以乾葛石膏知母三黃清熱治之其熱愈甚若誤認大腸燥屎唇焦用承氣湯下行逆治其死更速醫家至此束手待斃余以晚年之悟思得癍邪熱毒伏於腸胃蒸釀發出者也初起必用升麻乾葛湯宣發陽明伏毒若膏粱積熱非升麻清胃湯不能宣揚腸胃積熱故清熱化癍必用余化此湯加山楂檳榔若食肉多再加三稜阿魏治夾食症常有得生者夫熱在氣分唇焦發渴用乾葛石膏知母湯人人知之者熱在血分用升麻生地川連清胃湯主治人多忽之不知乾葛清胃湯治陽明氣分渴水之唇焦口渴升麻清胃湯治陽明血分不消水之唇焦口渴余以升麻清胃湯化癍此化法也又以此湯清陽明血分發渴不消水是法外之法也今又以此湯治膏粱積熱葷腥發熱之唇焦此化外化出者也再詳仲景治太陽渴欲飲水微熱消渴者脈數煩渴者汗出而渴渴而口煩躁者不用清解上焦肺胃積熱皆用五苓散主治良以太陽汗多口渴表熱不減表裡皆病熱結膀胱下焦非同表熱裡熱單以發表退熱單以清裡止渴者故以五苓散雙解太陽也夫口渴消水用清裡人人知之口渴消水有表邪用不得清裡人不知也衄血雜症門衄血為里症宜清裡外感門衄血為表症宜散表故曰外感衄血邪熱在經但有經絡之分總無寒熱之異同歸表熱而已三陰經無衄血惟陽邪傳入少陰厥而無汗之症醫者見其手足冷而無汗誤認太陽表邪未伸用麻桂強發其汗陰血內動血從口鼻而出名下厥上竭此少陰裡熱誤用辛溫觸動陰血而上衝者也戴氏云仲景論衄血宜發汗麻黃湯主之此治冬月傷寒太陽表症里無積熱之衄非言三時熱令也三時衄血即有太陽表症宜散表只用羌活沖和湯不可用麻黃桂枝湯若太陽之邪已經侵入陽明即要與陽明藥互用若陽明本經熱甚以致衄者不用太陽之藥當用升麻乾葛湯以解陽明氣分之邪隨用茅花湯合黃芩芍藥湯犀角地黃湯升麻清胃湯以解陽明血分之熱海藏云仲景言衄家不可發汗汗之必額上陷此為脈微里有熱者言也夫衄家脈浮緊可發汗若脈已微表症已解再發汗則額上陷故傷寒論云衄血脈已微者用黃芩芍藥湯犀角地黃湯此言裡熱衄血宜涼血不可用辛溫發散也吳氏云衄血之症若脈浮緊宜發汗脈不浮緊不可發汗東垣治衄血脈已微黃芩芍藥湯脈沉數犀角地黃湯余按仲景用麻黃湯治衄乃是太陽經寒邪未散脈浮緊之衄東垣用黃芩芍藥湯治衄乃是表散血熱脈不浮緊而微者黃芩涼血芍藥斂血涼血斂血則衄自止再按用犀角地黃湯治衄者是表邪解脈沉數裡熱甚宜清熱之衄也夫犀角地黃涼陽明血熱又清肝腎之火沉數之脈熱在下焦清肝腎下焦之火血不上升而衄不作故仲景麻黃湯但治冬月太陽表邪之衄東垣黃芩犀角湯治四時裡熱之衄兼治內傷之衄地黃引子門冬引子治內傷不治外感者升麻清胃湯治外感兼治內傷者此治之分別也外感之衄脈大者易治沉澀者難醫內傷之衄脈緩者易治脈數者難醫此脈之分別也太陽病脈浮無汗發熱身疼八九日不解表症仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之太陽病脈浮緊無汗發熱身疼痛八九日不解表邪不散當以麻黃湯發其汗今服麻黃藥已病微除其人發煩目瞑劇則太陽之邪不從汗解必發鼻衄而解其所以然之故以太陽經熱邪重今得麻黃辛溫必上從陽明入目絡鼻之竅而出血矣麻黃湯主之五字在當發汗之下不然陽氣太重必衄乃解之後何可再用麻黃湯也太陽病脈浮緊發熱身無汗自衄者愈此言太陽發熱脈緊無汗應用麻黃湯因其人邪微正旺未服麻黃湯自衄而病愈申明上章衄而病解不必再用麻黃湯也太陽傷寒脈浮緊不發汗因致衄者麻黃湯主之上章既明不可多用麻黃湯此條言失用麻黃湯因而致衄太陽症仍在仍用麻黃湯申明致衄後太陽表邪不解仍要發表太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛身體枯燥太陽傷寒未發熱火劫發汗尚不為害太陽中風陽邪症火劫則邪熱被火熱血氣妄溢失其常度其身必發黃火傷於上陰血足者尚能作衄而解火傷於下陰血虧損者必致小便不利陰陽皆虛而肌肉消爍陽明病口燥但漱水不欲下咽此必衄此明鼻衄之症非獨太陽之邪侵入陽明陽明本經亦有成衄者如陽明病口燥但欲漱水在口不欲咽下此陽明熱在血分亦必發衄脈浮發熱口乾鼻燥能食者則衄脈浮發熱陽明表熱口鼻乾燥能食陽明裡熱表裡皆熱則迫血妄行為衄升麻乾葛湯見煩躁茅根湯茅花一味茅性清涼根能涼血止煩花苗專涼上焦之血故治衄黃芩芍藥湯黃芩白芍藥川連甘草陽明表熱而衄前方升麻葛根湯陽明表熱而衄用此湯家祕加生地當歸以當歸辛散同芩連生地則血涼而當歸經矣犀角地黃湯生犀角山梔白芍藥荊芥牡丹皮赤芍藥生地黃芩此方不獨治衄兼治咳血吐血不獨治內傷肝腎血即陽明外感亦當從此方出入加減加黃芩荊芥則血涼不上升若大便實者加當歸酒蒸大黃其血立刻歸經家祕用當歸同涼血藥則下順歸經之功最大地黃飲子生地丹皮天門冬黃芩地骨皮白芍此治肝腎精竭血燥勞瘵之方若尺脈大加黃柏知母以外感發衄皆因本元血分有火故亦立此方門冬飲子麥門冬地骨皮知母石膏生地丹皮白芍藥此通治鼻血之方若陽明表症加升麻乾葛荊芥黃芩若裡熱便結加當歸大黃乾葛石膏湯乾葛石膏知母甘草丹皮生地黃芩此方專治外感衄血者然此涼陽明氣分之藥家祕加丹皮生地黃芩則兼涼其血升麻清胃湯見口渴衄血皆陽明血中伏火故以此方清陽明血分之熱蓄血方書皆以唇乾口燥漱水在口不得下咽以定上焦蓄血小腹硬滿小水自利以定下焦蓄血至身黃如狂發狂喜忘乃是蓄血症中之症故傷寒敘蓄血症與狂亂症中互相發明看傷寒以手按其心下及兩脅漸至大小腹但有硬處當詢其小便利否若小便不利者或是氣結溺澀非蓄血症若小便自利兼有身黃目黃如狂喜忘漱水不得下咽等症即是蓄血急以桃仁承氣湯抵當湯下之若小腹繞臍硬痛口渴消水大便不通時有失氣此非蓄血乃是燥屎硬滿按蓄血治法有上中下三條傷寒失汗淤其血於上焦用犀角地黃湯如狂喜忘心下滿淤其血於中焦桃仁承氣湯小腹硬痛小便自利淤其血於下焦抵當湯主之然桃仁承氣湯雖治中焦並治下焦抵當湯雖主下焦兼治中焦按仲景原文其用抵當湯五條用桃仁承氣者一言有淤血當下者三至犀角地黃湯乃後人補入者余謂衄血吐血未曾淤蓄內結者可用若蓄聚淤結犀角地黃凝滯當用桃仁承氣抵當湯散結逐淤為當矣若蓄結既行再以犀角地黃湯當歸紅花湯調血養血亦為至當陶氏云上焦衄血可用犀角地黃湯如無犀角以升麻代之此因同散陽明血熱之藥耳家祕治中焦血熱血結恐犀角凝滯易以升麻清胃湯加桃仁紅花此又難用犀角以升麻代之也太陽不解熱結膀胱其人如狂血自下者愈其外不解者尚未可攻當先解外外已解但小腹急結者乃可攻之宜桃核承氣湯此條不以小便利不利以定血惟以其如狂斷其蓄血下焦當攻其血然表邪未解當先解外邪表解小腹脹急乃可攻之太陽病六七日表症仍在脈微而沉反不結胸其人發狂者以熱在下焦小腹當硬滿小便自利下血乃愈所以然者以太陽經淤熱在裡故也抵當湯主之太陽病六七日表症仍在當散表今脈微而沉且不結胸而發狂者必血結下焦而小腹硬滿小便自利攻下其血乃愈抵當湯主之所以宜用此湯者以淤熱在太陽下焦之裡故也太陽病身黃脈沉結小腹硬小便不利者為無血也小便自利其人如狂者血症諦抵當湯主之太陽身黃脈沉結小腹硬有兩條若小腹硬而不狂小便不利此熱結膀胱之水當用五苓散若小腹硬小便自利如狂者此熱結下焦之血故用抵當湯二條並詳發黃傷寒有熱小腹滿應小便不利今反利者為有血也當下之不可用余藥宜抵當丸此條重申小腹滿小便利者的是有血較上章多有熱二字則易抵當為丸以示留戀濃重去熱方盡陽明病其人喜忘者必有蓄血所以然者本有久淤故令喜忘屎雖硬大便反易其色必黑抵當湯下之此二章申明用抵當湯真訣血淤於內則喜忘且大便硬反潤滑易出驗其色又黑確是蓄血故用抵當湯病者胸滿痞痿舌青口燥但漱水不欲下咽無寒熱脈微大來遲腹不滿其人自言吾滿為有淤血胸滿痿黃似脾胃濕熱但舌青色口燥漱水不欲下咽無寒熱脈又微大來遲他人不見腹滿自言脹滿則外不脹而內脹急故斷其淤血病者如熱狀煩滿口乾燥而渴其脈反無熱此為伏陰是淤血也下之病如熱狀且見煩滿口乾燥而渴其脈反不數大乃是陽邪伏於陰分故知其為淤血宜下之前條以脈大來遲而斷其血此條以脈反無熱而斷其血也少陰病脈沉細手足冷或時發燥作渴亦漱水不欲咽者宜四逆湯溫之下利厥逆無脈乾嘔煩渴欲漱口不欲咽宜通白四逆湯加豬膽人尿同服厥陰蛔厥口燥舌燥時時欲涼水浸舌反唇一刻不可離又不欲咽下宜理中湯加烏梅主之以上三條言陰極發躁亦有漱水在口不欲咽下者故用四逆理中等湯溫之紅花桃仁湯紅花桃仁赤芍藥當歸身此方行血而無推蕩活血而無凝滯家祕加山楂香附以散凝結加山梔以散熱結加韭汁以散寒結犀角地黃湯見衄血此方本治衄血吐血今因火傷上焦故可用之桃仁承氣湯桃仁大黃芒硝桂枝甘草此湯加桃仁佐大黃行下焦蓄血加桂枝散下焦凝結之血家祕加枳朴以血隨氣行加當歸芍藥去舊中即為生新地步抵當湯水蛭虻蟲桃仁大黃血蓄下焦沉結牢實直至小腹硬痛不得不用此方當歸紅花湯二味此活血之方非行血者血虛人有停淤以此方加山楂桃仁為輕行之法當歸桃仁湯二味此亦輕劑但以桃仁易紅花則稍重前方此等方法示後人婉轉而戒鹵莽下血血從小便出者名尿血從大便出者名便血總其名曰下血但有陰經陽經之分並無寒熱之異同歸於熱而已傷寒論雖有少陰厥陰下血之條皆是陽熱傳入陰經之症經雖屬陰症則陽症陶氏一以為協熱是矣一以為陰寒誤也此因雨濕之年濕淫用事濕毒外襲皮毛內侵血分令人身發寒熱大便下血腹反不痛且用蒼獨敗毒散辛溫散表忌用寒涼抑遏此宗內經濕淫所勝治以辛溫之法非陰寒而溫之也陶氏以其用辛溫故誤認陰寒而名之不思內經云歲火太過民病血溢血泄少陰火氣內發血溢血泄夫血得熱則妄行故無論外感諸血以熱主治即內傷亦有心移熱於小腸而尿血用導赤各半湯者小腸本經自熱而病用火府丹加木通滑石者肺移熱於大腸為便血用涼膈散者大腸本經自熱而病用當歸大黃湯加梔連芍藥者膀胱下焦熱結而尿血用木通車前湯加知柏梔連者肝經血室伏火而施泄下血用知柏四物湯合龍膽瀉肝湯者未可以陰寒言之也太陽病以火薰之不得汗其人必躁到經不解必圊血名為火邪太陽病當汗解因其人津竭血燥不得作汗醫以火劫汗傷陰故發躁下圊血當清火邪太陽病下之其脈促不結胸者為欲愈脈沉滑者協熱下利脈浮滑者必下血太陽病誤下怕成結胸其脈浮促表邪尚未內陷未成結胸故為欲愈若脈沉滑則邪遺大腸而為協熱下利若脈浮滑者則血熱流溢必大便下血淋家不可發汗發汗則便血淋家即熱結膀胱小便頻數不清利膀胱反發其汗必小便出血陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈此條詳注熱入血室少陰病八九日一身手足盡熱者以熱在膀胱必便血也此少陰熱邪外傳太陽則一身盡熱熱結膀胱必小便下血當歸大黃湯當歸大黃生地甘草此方本治燥火下血家祕以此治吐血嗽血大便乾結良以涼血則不上升且大黃與當歸同用其血當歸經矣黃芩芍藥湯見衄血肝家有火則施泄不藏脾受火乘則土崩而不裹今以白芍與芩連同用則肝脾之火皆清而藏裹之令皆得矣蒼朮敗毒散熟蒼朮羌活獨活柴胡前胡防風荊芥枳殼廣皮甘草寒濕傷於太陽內傳陽明有濕毒下血之症以毛竅所入之邪必要仍從毛竅而出故不用血藥而以此方散寒濕若誤用寒涼毒邪伏而不散桃核承氣湯即桃仁承氣湯寒濕傷表用敗毒散裡熱下血以此方清裡熱下淤血一表一里兩大法也導赤各半湯見譫語發熱涼膈散見譫語火府丹治二便當歸赤芍藥黃連大黃甘草滑石桃仁承氣湯下淤血者此方清血熱者同用大黃有清下之分有大小便之別當歸大黃湯當歸大黃廣皮甘草火府丹兼治二便此方專清大腸木通車前湯木通車前子山梔川連知母黃柏生地甘草此方清小腸之熱通利膀胱家祕治下焦熱結小便淋祕知柏四物湯知母黃柏當歸白芍藥生地丹皮龍膽瀉肝湯見脅痛膽草柴胡黃芩山梔川連知母麥冬人參甘草
