body:
  text: 卷四下利下利當分陰陽表裡在表有寒濕風濕濕熱在裡有積熱傷食臟寒冷飲外感寒濕下利惡寒身痛無汗脈浮瀉下清水色如屋漏口不作渴此寒濕傷於太陽也北方麻黃桂枝湯江南用羌胡敗毒散先散毒邪利未止五苓散分利小便若頭額眼眶痛六脈長大此寒濕傷於陽明也蒼防乾葛湯解表後用豬苓湯利小便若時寒時熱六脈弦大此寒濕傷於少陽也以柴苓湯主之外感風濕下利則骨節煩疼惡風身痛自汗脈浮此風濕傷於太陽也北方用桂枝防風湯江南羌活防風湯小便不利蒼防四苓散若額痛目痛手足拘痛身熱多汗六脈長大此風濕傷陽明也蒼防乾葛湯利未止合豬苓湯若寒熱往來嘔而口苦此風濕傷於少陽也蒼防柴胡湯主之外感濕熱下利發熱惡寒六脈浮大此濕熱傷於太陽也先用羌獨敗毒散發表後用清濕熱若發熱自汗六脈長數此濕熱傷於陽明也先用乾葛石膏湯後用川連枳殼湯若寒熱口苦此濕熱傷於少陽也先用柴胡湯後用黃芩芍藥湯河間芍藥黃連湯臍腹作痛裡急後重大柴胡湯香連丸又有發熱汗出煩躁口乾頭痛身痛時寒時熱下利脈大三陽挾熱下利俗名漏底傷寒此濕熱先傷腸胃又因早晚風露外束濕熱不得外泄下流大腸而下利宜以羌防柴苓湯先散表邪後以豬苓湯分利濕熱若寒熱往來口苦而嘔症兼少陽宜柴胡湯此症若不先散表邪即用清裡則表邪內縮不死不休又有表邪已解裡熱不散而下利當用清裡治法如黃芩黃連湯香連丸等若痛而即利利後稍減少頃復痛復利宜川連枳殼湯欲便不得便腹痛有下症承氣湯下之又有飲食不節損傷腸胃腹中常痛常利者此傷食成利症也宜保和平胃散家祕消積散又有本是積熱日發熱口乾過食生冷以致腸鳴下利此因熱傷冷症宜大順飲等另有初起不發熱口不渴小便清白大便滑泄下利六脈沉遲此三陰臟寒下利也輕者理中湯重者四逆湯夫三陰寒利脈宜沉小三陽外感下利脈忌沉小內傷下利左關弦大者主死外感下利左關弦大反不作死論以人迎脈大正合外感身熱症耳太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不利者桂枝人參湯主之表症誤下若不見表邪變下利痞滿結胸者用瀉心湯陷胸湯今下後表裡不解故仍用桂枝解表加人參和中氣傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便此因誤下多下以致下焦不固又以理中誤治中焦故用固下焦藥設利不止又當分利小便以此條是水穀利耳二傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之發熱陽邪也汗出不解心下痞硬而下利里症也故以此方雙解表裡太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯太陽與少陽合病自下利宜治少陽故用黃芩湯若見嘔加半夏生薑陽明少陽合病必下利其脈不負者順也負者失也互相剋賊者為負也脈滑而數者有宿食也當下之宜承氣湯木邪乘克腸胃下利若少陽脈大則陽明受病重設陽明脈滑數方可下之此關防下利忌陽明脈弱更不可誤下太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬太陰腹滿吐食不下自利而腹自痛非陽明下症腹痛若誤下之則胸下結硬自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩上章以腹滿吐食自利定真太陰此章以自利不渴承明太陰寒症尚論書皆注熱邪誤也傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實穢腐當去故也脈浮陽脈也脈緩太陰也上章以自利不渴定其太陰寒症下利此章以脈浮手足自溫定其太陰濕熱下利太陰濕熱當發身黃若小便自利不發黃至七八日大便結硬此外傳陽明濕熱變燥而為脾約等症若不外傳而發暴煩下利雖每日十餘行濕熱去盡必自止而愈以脾熱穢腐當去者也同一太陰熱邪以濕熱繫住太陰下利則入太陰篇以外傳陽明濕熱變燥大便乾結則入陽明篇此千古未白少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之此言少陰火虛滑脫便膿血宜用桃花湯舊注陽邪傳入誤也少陰病便膿血者可刺此言少陰熱病便膿血不可用桃花湯但可刺泄血中之熱少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之少陰病自利清水色純清心下必痛口乾燥者急下之宜大承氣湯上二條皆少陰熱症詳注渴門傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹先厥後發熱則真陽回而利止若反汗出咽中痛則回陽太過上衝其喉必痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹陽經發熱無汗利必不止陰經發熱無汗利必自止若不止而無汗則回陽太過下移大腸而必便膿血熱邪下泄故喉不痹下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯此言裡寒之人外冒表邪之症下利腹脹滿是裡寒身體疼痛者是表邪下利腹脹之身痛必以四逆湯先救里後以桂枝湯再發表下利清穀不可攻表汗出必脹滿此重申下利清穀必先救里若先發其汗出必脹滿不治下利有微熱而渴脈弱者令自愈下利脈數而渴者令自愈設不瘥必清膿血以有熱故也下利脈數有微熱汗出令自愈設復緊為未解前條言下利清穀外冒表寒之利此條言微熱而渴又見脈弱則邪衰正復故令自愈第二段言脈數而渴較之上段則里有熱故設不瘥必下膿血第三段言脈數微熱是表熱內陷故自汗出令自愈設復緊則表邪伏而未散下利寸脈反浮數尺中自澀者必圊膿血寸脈主氣尺脈主血今寸脈浮數氣中有熱尺中自澀血分受傷熱勝於血故必圊膿血下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死下利脈沉弦則邪滿於里故下重若脈太過而大為未愈必得微弱而數乃為自止即或脈數發熱乃沉弦轉陽亦不主死熱利下重者白頭翁湯主之此言熱利以明上條皆寒利下條皆熱利也熱利下重火熱下迫故用清火下利欲飲水者以有熱故也白頭翁湯主之此申明宜用白頭翁湯方法言陰症下利口不渴今欲飲水者以上焦有熱故也亦以前方清熱下利譫語以有燥屎也宜小承氣湯上條以渴欲飲水定熱在上焦此以下利譫語定腸胃有燥屎下利後更煩按之心下濡者為虛煩也宜梔子豉湯上條以譫語故定腸胃實熱此條以利後心下濡而不堅故定虛煩也羌活敗毒散見發熱五苓散見小便不利乾葛湯見似瘧豬苓木通湯豬苓白茯苓澤瀉木通太陽熱結下焦用五苓散若陽明熱結家祕用此方柴苓湯柴胡黃芩廣皮半夏甘草茯苓豬苓少陽濕熱每多協熱下利故用此方家祕加乾葛兼治陽明大腸加木通佐其分利桂枝防風湯桂枝防風桔梗厚朴蒼朮甘草此治風寒濕熱三氣下利故用桂枝防風去太陽風寒用蒼朮去陽明風濕若風熱濕熱當以羌活易桂枝蒼朮四苓散即四苓散加蒼朮防風此方表有風濕里有濕熱故以蒼防散在表之風濕以四苓利在裡之濕熱家祕加木通湯調服功力更大蒼防乾葛湯蒼朮防風乾葛白芷厚朴甘草風濕內傳每多下利河間云風邪內縮以此方治之豬苓湯豬苓澤瀉茯苓滑石阿膠濕熱下利先散表邪隨利小便熱結太陽用五苓散熱結陽明用此方蒼防柴胡湯蒼朮柴胡黃芩半夏廣皮甘草防風此方治風濕傷於少陽下利者若見太陽表症加羌活見陽明表症加乾葛羌防柴苓湯羌活防風柴胡茯苓黃芩半夏廣皮甘草外感下利皆從毛竅而入必當仍從毛竅而出故用此方黃芩芍藥湯黃芩白芍藥川黃連甘草燥火利以大黃歸芍同用則清血分之火與枳殼同用則清氣分之火今濕火傷血故以黃連芍藥同用加棗肉又名芍藥黃連湯兼治內傷血利香連丸木香川連等分棗肉為丸濕火傷血用當歸黃連清血中之火今濕火傷氣故以木香黃連同用家祕加棗肉為丸則不損中州三乙承氣湯見大便祕保和丸見發狂平胃散見譫語理中湯見嘔吐四逆湯見身痛大順飲見腹痛溫中湯草豆蔻乾薑厚朴甘草此方與大順飲同治傷冷飲者若液干有熱反為害大柴胡湯見潮熱白通湯蔥白頭乾薑熟附子此即四逆湯去甘草加蔥白以通陽氣少陰下利脈微厥冷方可用白通加豬膽汁湯即白通湯加人中黃豬膽汁溫服真武湯白茯苓生薑熟附子白朮白芍藥土虛不能制水以此方補土中之火四逆散見厥冷白頭翁湯白頭翁黃柏秦皮黃連熱利下重乃是火勢下迫故以此方主治梔子豉湯山梔淡豆豉加薤白蔥頭下利心煩故以此方先治上焦小便不利太陽熱結小便不利仲景用五苓散家祕用羌獨木通湯陽明熱結小便不利仲景用豬苓湯木通湯六一散另有風濕相搏身腫身痛小便不利用通苓散羌活勝濕湯有腸胃熱結大便閉澀小便不利用八正散有心熱遺於小腸而不利者導赤各半湯有上焦肺熱而不利者清肺飲有水飲停結而不利者用平胃四苓散合二陳湯有誤汗太過津液外亡而不利者用生脈益氣湯有誤下太過中氣損傷津液內耗而不利者用生脈建中湯若論運氣便閉內經有陽明司天之政天氣急地氣明民病癃閉此言燥熱加臨也宜用白虎湯清燥湯又云少陰司天之政地氣肅天氣明其病淋此言君火行令也宜用瀉心湯導赤各半湯又云太陰在泉濕淫所勝病小腹腫不得小便此言土敗浸淫也宜用平胃五苓散又云水不及曰涸流其病癃閉此言火炎燥土金不生水也宜用清肺飲涼膈散又云厥陰司天風淫所勝民病溏泄土受木克不能分利小便水穀偏滲大腸先用羌防勝濕湯散風祛濕隨用五苓散豬苓湯分利陰陽另有食滯中焦小便赤澀黃濁此即中氣不清溲便變色宜用辛溫化滯保和散加砂仁豆蔻合蒼朮平胃散若妄用寒涼則食滯凝結另有三陰裡寒而小便不通此是陰症寒閉也真陽不足者金匱腎氣丸中氣虛寒氣化不及州都者補中氣湯外有水腫而小便不利厄逆而小便不利女科胎前而不利跌撲傷損而不利另具本門雜症中太陽病發汗後大汗出胃中干煩躁不得眠欲飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之發汗後又大汗出則表邪已解胃中干欲飲水故以水治其乾渴可以令愈若脈尚見浮則表邪未散又小便不利微熱消渴此太陽熱結膀胱太陽病身黃脈沉結小腹硬小便不利者為無血也此辨小腹硬是水是血同一身黃脈沉結小腹硬而以小便利為蓄血以小便不利為溺結大下之後復發汗小便不利者亡津液故也勿治之得小便必自愈此言汗下太過津液外亡下竭勿用劫利膀胱則病必自愈傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之小便不利裡熱者多然尚見少陽太陽表證故立散表法門陽明病發熱汗出者此為越熱不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必黃茵陳湯主之傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯此條詳注發黃言表汗未透熱瘀於內故發黃而小便不利腹微滿用茵陳湯去濕熱則黃退便利腹滿亦減病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥糞也宜大承氣湯此症有結糞微熱加以小便不利故下大便則小便利詳注不得臥五苓散澤瀉豬苓茯苓白朮桂枝陽明小便不利用豬苓湯太陽之邪熱內結膀胱而小便不利用此方但白朮凝滯桂枝辛熱必得里無鬱熱者可用羌活木通湯見發熱桂枝五苓散外解太陽表邪內利膀胱小便但南方熱令不用家祕化立羌活解太陽之表木通利膀胱之裡豬苓湯豬苓白茯苓澤瀉滑石阿膠木通陽明熱結小便不利不用五苓而用此方家祕以黃芩易阿膠最效六一木通湯即木通湯調下六一散前條以羌活木通湯雙解太陽此條又以滑石木通分利陽明通苓湯木通豬苓茯苓車前子淡竹葉甘草麥門冬此方通利小便家祕加川連清心胃之熱加桔梗黃芩石膏清肺胃之熱加生地黃柏知母清腎火以滋真陰氣化不及加人參以助肺氣羌活勝濕湯羌活防風蒼朮黃柏澤瀉茯苓廣皮甘草此方散表勝濕兼用澤瀉黃柏清利下焦極得表裡分消之妙八正散車前子瞿麥萹蓄滑石山梔甘草稍木通大黃前後熱結二便不利者用此方家祕加通草枳殼其力更專導赤各半湯見發熱導赤散治血熱小便不利者今合瀉心湯則氣血兼清且木通川連同用引心火下通小便生地川連同用涼心血而心火自清人但知川連涼心火而不知心主血同生地其功乃全清肺飲桔梗黃芩山梔連翹花粉玄參薄荷甘草利小便莫如清肺此方不用利小便藥然深得利小便法平胃四苓湯即平胃散合四苓散利小便忌燥藥今因中焦水飲痞塞混濁故用辛散亦利水一法也生脈補中湯即生脈散合補中益氣湯膀胱者州都之官津液藏焉氣化則能出矣此方以生脈潤津液補中助氣化家祕加車前子其效更速生脈建中湯人參麥門冬五味子白芍藥桂枝甘草上方以生脈散與補中湯同用此方又與建中湯同用一以益氣一以滋血開二大法門白虎湯見口渴陽明燥熱則肺受火制此方清上焦燥火則小便自利清燥湯桑葉石膏甘草人參阿膠杏仁麻仁麥冬枇杷葉此方詳注喘逆門石膏與杏仁同用清肺火佐以阿膠麥門冬潤肺燥火傷氣旺益以人參甘草肺燥大腸亦燥佐以麻仁則下焦火泄小便自利金匱腎氣丸生地牡丹皮澤瀉豬茯苓山茱萸山藥車前子附子肉桂手少陰心主火旺而小便不利用導赤各半湯足少陰腎經火旺而小便不利用知柏六味丸足少陰腎經火衰而小便不利用此方以補水中之火一方治熱極小便不利一方治水虛小便不利一方治火虛小便不利外感小便不利不應列入火衰方法此因外感互發內傷也大陷胸湯見結胸陷胸湯丸原非利小便方法今因結胸症見小便不利治結胸即是利小便茵陳蒿湯見發黃先小便不利而身黃利小便則黃退身黃而小便不利清濕熱則身黃退而小便自利柴胡桂枝幹薑湯見寒熱因表邪而小便不利先散表邪今以少陽症兼見太陽故用此方真武湯見腹痛大便祕結大便祕結雜症門有實祕虛祕風祕冷祕熱祕氣祕血枯之分外感門症分表未解半表半裡表已解表邪傳裡治分應下急下微下大下可下未可下不可下俟之蜜導等法如表汗未出表症尚在病在胸前脈浮身熱脈細不數脈伏不出面赤煩躁胸前食滯久病多汗血竭津竭者不可下身無大熱手足多汗便硬腹脹身無表邪欲便而不得便時轉臭氣下口燥咽乾渴而消水大便久結常脹滿舌苔黃焦腹中作痛應急下皆用大承氣湯然仲景下法既詳此條之中復詳於自汗門內良以下法最怕表邪未散表汗未徹必自汗多汗表邪方解互注參玩庶不差誤若大便不通臍腹脹痛表症在而里症尤急不得不下者止用大柴胡湯雙解表裡如熱輕結少津液乾涸便閉不通腹脹未滿不轉臭氣者宜微下止用小承氣湯若大便不通腹不脹滿未欲大便即大便閉結俟之有熱無結不轉矢氣者宜俟之津液不足大便乾結血枯熱微者宜生津養血外用蜜導上部胸胃無熱不耐承氣苦寒下部大腸熱結下用膽汁外導是以大便閉結惟以表邪之解與未解裡熱之結與不結汗之多與不多身表之熱與不熱下症之急與不急屎之硬與不硬津液之干與不幹臍腹之痛與不痛脈之數與不數以別可下不可下微下急下俟之導之之法也傷寒脈陽微而汗少為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過陽絶於里亡津液大便因硬此條言汗出太多則陽液竭絶於里名亡津液大便因硬非言陽火虛寒也太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也此申明上章汗下亡津液胃中乾燥內實大便難此名陽明裡症也太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈此申明上章吐下後雖有陽明可下之症但津液耗盡止與小承氣湯和之病人不惡寒而渴此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之以法救之此申明不大便無所脹苦非下症也詳注口渴陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少津液當還入胃故不久必大便也此重申多汗亡津液大便硬不可下宜俟之仲景常以小便利不利以定屎之硬不硬今又以小便減少以定水液還入大腸而必大便之自行陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及豬膽汁皆可為導也此承上文重亡津液即大便硬有下症者止宜用外導陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡矣手足濈然而汗出者此大便已硬也大承氣湯若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明脈洪大今反遲非浮緊之表脈大凡汗出不惡寒者無身重今雖身重短氣而喘因有潮熱則可攻裡矣然必手足漐漐汗出則大便已硬宜用大承氣若汗多而見發熱惡寒其熱不潮未可下也若腹大滿不通只可小承氣湯微和胃氣病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使大便也大下後六七日不大便煩而不解腹滿者此有燥屎也所以然者本有宿食故也宜大承氣湯以上諸條關防未可下外導等法此二條又恐應下失下故曰腹滿痛煩躁發作有時不大便即是有燥屎急宜下者陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯入腹中轉矢氣者此有燥屎乃可攻若不轉矢氣此但初硬而後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱必大便硬而少也以小承氣湯和之不轉矢氣者慎不可攻也上二條申明大下的訣以下又關防若未見燥糞尚宜探討例如陽明病見潮熱里證又見大便微硬可與大承氣湯若不硬者切勿與之若不大便六七日恐有燥屎當以小承氣湯若湯入腹有臭氣下矢此有燥屎可攻若不矢臭氣但初頭硬後必溏攻之必脹滿不能食欲飲水者與水則胃寒而噦其後雖發熱煩躁即大便硬然結糞必少止可以小承氣湯和之若不轉矢氣慎不可攻得病二三日脈弱無太陽柴胡症煩躁心下硬至四五日雖能食以小承氣湯少少微和之令小安至六日與承氣湯若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯上半節以脈弱無太陽少陽表症而有煩躁心下硬應下之症故即能食亦宜以小承氣湯微和之下半節以小便少別糞未必硬即不能食未可攻須待小便多屎定硬方可攻陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與小承氣湯一升腹中轉矢氣者更復一升若不轉矢氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也此條言服承氣湯不轉臭氣又不大便不可再服詳注潮熱宜互看陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服多汗則津液大泄胃中必干大便必硬上熱不得下泄故譫語然用小承氣湯清胃熱止譫語不求必下結糞故譫語止勿再服傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語此重申誤汗亡津液大便必難久則譫語如脈沉喘滿乃里熱之喘誤認表邪反發其汗大便必難裡熱不得下泄久則譫語傷寒若吐若下後不解不大便五六日上至十餘日日晡發潮熱不惡寒獨如見鬼狀若劇者發則不識人循衣摸床惕則不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服首段總言吐下不解不大便日晡發潮熱不惡寒如見鬼狀之病第二段分劇者不識人循衣摸床惕而不安微喘直視脈弦者生若脈澀者則死後段言症之微者但發熱譫語可以大承氣湯大便一利不可再服陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜大承氣湯此章千古誤注曰陽明病則無太陽少陽表症譫語潮熱乃里熱無疑陽明胃熱本能食今反不能食乃是腸胃有燥屎內無容物之地當用大承氣湯若能食者胃雖熱尚有容物之地但硬大便未必有燥屎不可用大承氣湯前賢見大承氣湯在末句皆注曰同用此方豈理也哉傷寒六七日目中不了了睛不和無表裡症大便難身微熱者此為實也急下之宜大承氣目睛不和表症也今六七日傳裡日期無表裡症大便難身微熱非陽明表邪乃是陽明裡症實熱故急下之按仲景用急下有六條陽明經三條皆救津液一日汗多津越於外一曰潮熱便結津竭於內一曰目睛不和津竭於上少陰經三條皆救腎水一曰真水自竭一曰木燥水枯一曰土燥水乾夫人以津液養生停聚則病泥結則危干竭則死邪在太陽則結聚肌肉而毛竅不通故用發表以散結聚邪在少陽則結聚半表半裡而胸脅滿嘔故用和解以開結聚邪在陽明之裡則結聚腸胃而大便不通故用下法以通結聚陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和濈然汗出而解矣陽明病脅下硬滿不大便而嘔舌上白苔少陽半表半裡和解發汗之症故宜小柴胡湯此申明和解可以通津液發汗也太陽陽明者脾約也正陽陽明者胃實也少陽陽明者發汗利小便已胃中躁煩實大便難是也言太陽陽明者太陽表邪後歸陽明之裡陽明裡熱又內傳太陰約束大便堅結故曰脾約也正陽陽明者陽明熱邪不傳太陰而傳大腸燥熱也少陽陽明者發汗利小便後傳陽明腸胃煩燥而大便難也此章分別三陽傳裡大便結硬也傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也此承明上條陽明之熱內傳太陰而為燥熱脾約者當用脾約丸若少陰復傳陽明大便硬脈大沉數者仍用承氣湯不比太陰篇濕熱系在太陰而下穢腐之條少陰病六七日腹脹不大便者急下之宜大承氣湯上條言太陰熱邪外傳陽明此條言少陰熱邪外傳陽明有便腹脹急下之症宜用大承氣湯下利譫語者有燥屎也宜小承氣湯上章言腹脹滿不大便宜急下此章言下利譫語無腹脹不大便即有燥屎亦止宜小承氣湯二陽並病太陽病罷但發汗潮熱手足漐漐出大便難而譫語者下之則愈宜大承氣湯太陽症罷則表症全無但發潮熱手足多汗大便難譫語者此陽明應下之症小承氣湯枳殼厚朴大黃此方下劑之輕者表有邪加柴胡葛根中氣虛加人參廣皮甘草小便不利加木通大承氣湯枳殼厚朴大黃芒硝痞滿腹脹應急下症則用此方大柴胡湯見寒熱下症雖見尚帶少陽表症者則以此方雙解表裡麻仁丸麻仁白芍藥枳實大黃杏仁厚朴熱結陽明氣分者則用承氣湯熱結太陰血分者則此方合病太陽症兼見陽明名曰太陽陽明合病太陽症兼見少陽名曰太陽少陽合病陽明症兼見少陽名曰陽明少陽合病以上兩陽經合病也若三陽皆見症者名三陽經合病夫曰合病初起一齊發病之謂若一經先病先病之經未解又見一經起者名並病若先起之經病解又見一經病起者名傳經病皆非合病也若太陽與陽明合病先治太陽兼治陽明太陽少陽合病先治太陽兼治少陽凡治外感先重太陽表症故見太陽症多用羌活湯為君兼陽明症加葛根兼少陽症加柴胡三陽皆見三經之藥俱用而太陽之藥倍之三陽合病多發春夏秋三時三陽合病多下利按傷寒論合病言太陽有二條不言合病然用方一以𠘧𠘧有汗用桂枝葛根湯以解肌一以𠘧𠘧項背強無汗用葛根湯以發汗則暗合陽明合病矣又明言太陽與陽明合病三條一以不下利但嘔者葛根加半夏湯一以不嘔下利者但用葛根湯一以喘而胸滿者麻黃湯其太陽與少陽合病者二條一以自下利者黃芩湯一以下利兼嘔者黃芩湯加半夏生薑陽明少陽合病者一條以下利脈滑而數者有宿食用大承氣湯三陽合病二條一曰脈浮大上關上但欲眠睡目合則汗不立方治一曰腹滿身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之額上生汗手足逆冷若自汗者白虎湯主之前言三陽合病一見太陽病重用太陽表症之藥再視何經有合病再加某經藥治之此言太陽表邪為重故以太陽經絡而分輕重也又云合病並病要看症之多少輕重舍少從多舍輕從重主治未可盡執經絡上分輕重又見仲景於太陽陽明合病見嘔加半夏不加太陽藥太陽陽明合病見喘滿用麻黃湯不用陽明藥下文太陽陽明合病見下利用黃芩湯清少陽不用太陽藥下利見嘔加半夏生薑不加少陽藥此又在症上分輕重緩急而言此告戒經絡病症互相參治方無遺漏並病並病者一經先病未愈又起一經病者如先見太陽病未解又見陽明病此太陽與陽明並病如先見太陽病未解又見少陽病此太陽與少陽並病傷寒論言二陽並病兩條一曰面赤色不足言陽氣怫鬱在表煩躁不知痛處但坐以汗出不徹更發汗則愈此言宜汗也雖不立方然北方冬月麻黃湯南方羌活湯躍躍矣二曰太陽症罷潮熱汗出大便難而譫語者宜大承氣湯此言宜下也其論太陽少陽並病三條第一言頭項強痛眩冒如結胸心下痞硬當刺大椎慎不發汗脈弦譫語當刺期門此言不可汗也第二言心下硬頸項強而眩者當刺大椎肺俞肝俞此言慎勿下也第三言反下之成結胸下利不止水漿不入其人心煩此言誤下變症也壞症汗吐下溫針諸法皆用過而病不解名壞症又有汗吐下諸法顛倒誤用而病不解亦名壞症言壞症非言必壞之症言無經絡表裡無汗吐下諸法可治者故曰壞症按傷寒論壞症兩條上條言太陽病汗吐下溫針用過桂枝湯又不中用下條言太陽病已吐下發汗溫針反見譫語此為壞症自此詳之則太陽病用不得發表解肌少陽病用不得柴胡和解陽明症用不得葛根湯即是壞病總之此經之病用不得此經之方法正治者亦名壞症故曰看其脈症知犯何逆隨症治之而不立方法昏冒昏冒即昏憒不醒也內傷而至昏冒則死傷寒熱病至昏冒亦重矣方書皆言虛誤也仲景云太陽與少陽並病頭項強痛或眩冒當刺大椎肺俞肝俞又曰陽明病小便不利大便乍難乍易時有熱喘冒不能臥宜大承氣湯此言冒未至昏者以下乃言昏冒矣海藏云傷寒傳至五六日漸變神昏不語或睡中自語目赤神焦稀粥與之則咽不與則不思此言熱邪內傳手少陰心經心火上薰於肺則神識昏迷若脈浮數熱在小腸用導赤散脈細數熱在心經宜瀉心湯若浮沉皆數兩經皆熱導赤各半湯傷寒直格云邪熱傳內昏冒脈應疾數若熱極內甚脈反沉細欲絶未明造化誤認陰症或有始得病時陽熱暴甚初起便見昏冒者或兩感熱甚亦有昏沉者或失下熱極以至身冷脈微昏冒將死若急下之則殘陰暴絶而死不下亦死並宜涼膈散黃連解毒湯待積熱散則心胸暖脈漸出若有下症者大承氣湯可見昏迷症未可以虛概之余今酌定解表清裡化痰消導等法若癍痧疫毒用升發寒涼抑遏用溫散熱結大腸用下法汗下太過脈空瀉脫用補元熱入血室熱入血室傷寒論分四條首條陽明病下血譫語總論男女均有此病故曰下血不曰經水但頭汗出刺期門少陽三條則專言婦人矣第一言經水適來七八日熱除身涼胸脅下滿如結胸狀言渾似太陽誤下身不發熱表邪乘虛入里結胸症但彼以誤下邪熱傳入陽明腸胃故成結胸此以熱邪自傳厥陰血室故刺期門第二條言經水適斷發作有時而寒熱渾似少陽似瘧症但彼以邪入少陽心胸之間而成似瘧此以邪熱入厥陰血室之所而成熱入血室二者病不同而同用小柴胡湯以其寒熱發作如瘧狀相同肝膽同治故以小柴胡湯同和解第三言雖有傷寒發熱之表症譫語見鬼之裡症然不用汗吐下等法以犯胃氣惟用刺期門以泄裡熱服小柴胡湯和解表裡大凡發熱有氣血之分日間發熱為氣熱夜間發熱為血熱故晝安靜夜發熱名熱入血室然血熱之症又有虛實不同血虛發熱營血不足如陰虛內熱之症故脈必細數治以補血涼血如海藏四物湯倍加柴胡黃芩以定寒熱血實發熱邪熱入血即熱入血室等症故脈必數大治宜涼血不必補血歸芍柴胡湯導赤各半湯倍加柴胡芍藥生地黃芩丹皮引入血分然其症狀各有分別血虛者其人陰血素虛漸漸夜間發熱日間仍能舉動其熱也緩其脈細數無神血實者素無不足偶因外有感冒內有積熱表邪未散裡熱未清或因早食厚味或因早服補藥每夜發熱其熱也甚其脈數大有力陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其熱而瀉之濈然汗出則愈此條詳注頭汗下血門宜互看陽明表邪傳少陽內舍厥陰不得外泄上薰頭汗出刺期門肝穴經絡宣通濈然汗出而愈婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之中風發熱惡寒七八日熱除脈遲身涼當自愈矣今反見胸脅下滿如結胸狀譫語者此因經水適來血海正開熱邪乘虛入於厥陰藏血之室肝主魂熱邪內亂神明是以脅滿譫語故刺期門厥陰所注之腧瀉其實熱外泄婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之上條言身涼脈遲不用發表但刺期門此條言七八日續得寒熱發作有時經水適斷血室未閉熱入血結如瘧狀宜用小柴胡湯婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈上條一言結胸狀一言如瘧狀此條又言如見鬼狀此互發熱入血室病形不一兩條言刺期門一條言小柴胡湯主之此條言無犯胃氣及上二焦此總結上文熱入血室惟刺期門小柴胡湯二法小柴胡湯見寒熱頭眩此方清血室之熱家祕加當歸芍藥則引入血分立齊以此湯加生地丹皮亦是此意柴芩四物湯柴胡黃芩生地當歸白芍藥牡丹皮此即海藏四物湯家祕加入柴胡黃芩治血虛發熱今用治熱入血室最效歸芍柴胡湯歸身白芍柴胡生地丹皮地骨皮秦艽黃芩廣皮甘草此方涼血養血家祕治血虛夜發熱熱入血室陰虛骨蒸等症最效導赤各半湯血藏於肝而生於心故心火旺則血亦熱此方清心火生心血家祕加柴胡歸芍兼肝熱而治之矣不語不語之症內傷外感皆有外感不語即噤口傷寒也世有其症無其書故補注之內傷不語有舌強不語者神志仍清口亦能開但舌本強硬不能言語也有口噤不語者舌本無病但牙關緊咬口不能開而不能言語也有神昏不語者呼之不應問之不答如醉如睡而不得言語也外感不語之症有五條初起惡寒發熱失於發散表汗不得發越遂發煩熱喘渴誤認裡熱誤投涼劑有口噤不語之症此寒涼抑遏表邪之一條也又有發熱日久熱邪不解應清火而不清有下症而失下諸竅熱壅語言不出此裡熱昏沉之一條也倘因惱怒停食又兼外冒風邪發熱譫語渴不消水人見其譫語誤認裡熱苦寒冷飲凝結中焦今有譫語之後即變不語此寒涼抑遏食氣之一條也又有內積痰飲外冒風寒又誤食生冷與夾食傷寒不相上下此寒涼抑遏痰迷不語之一條也以上諸條即大便祕結有下症者止用芒硝玄明粉硝以消堅不用大黃重濁泥滯又有時行異氣沿門傳染溫毒濕毒暴熱暴寒襲人毛竅或發疫症癍痧毒氣不得外泄內擾神明志識昏迷叉手捻空口噤不語此時疫不語之一條也治表邪不語若身表尚熱兩足無汗六脈浮滑數動或脈沉伏模糊治宜辛溫發汗冬三月北方口不幹者可用麻黃湯若口乾者用羌活敗毒散餘三月不用麻黃竟用羌活敗毒散佐以石菖蒲半夏開竅豁痰禁用寒涼攻下治裡熱不語若身表不熱手足時常有汗口乾唇焦六脈沉數宜清其裡熱則諸竅通達導赤各半湯涼膈散有下症者承氣湯下之治食氣不語若發熱胸滿手足或冷或熱唇不焦口不渴右脈滑大不數或反沉伏先用吐法隨用理氣稍滯如保和散枳桔平胃散加石菖蒲白豆蔻無汗者加乾葛防風太陽見症加羌活少陽見症加柴胡若表邪已散時時手足有汗便結不通有下症者下之治痰迷不語若胸膈滿悶噁心嘔吐口不乾渴右關脈滑按之沉弦不數治宜二陳導痰湯合平胃散加枳桔亦有用吐法上湧其痰若有表邪加各經散表之藥若表邪已散手足時時有汗梔連二陳湯沖竹瀝熱服若便結不通有下症者竹瀝導痰湯加玄明粉下之治疫毒不語先用敗毒散散表若胸前滿悶可用吐法吐中有發散之義若腸胃有積熱脈見沉數當清涼解毒然亦不可驟用寒涼古人用敗毒散治疫毒以天地邪氣從外而入仍要從毛竅而出發散則毒得外出苦寒則毒抑遏羌獨敗毒散見發熱導赤各半湯見腹痛涼膈散見發狂承氣湯見便結枳桔平胃散即平胃散加枳殼桔梗梔連二陳湯即二陳湯加山梔黃連竹瀝導痰湯即導痰湯沖竹瀝痰結不語即令有火亦防寒涼抑遏此方清火而無凝滯化痰而不推蕩清胃湯升麻生地山梔黃連甘草膏粱積熱壅結中焦則諸竅閉塞而言語不出故以此方清胃熱治其本也發癍發癍症海藏分四條一曰溫毒二曰熱病三曰時氣四曰傷寒至吳氏書改熱病發癍曰陽毒又增出內傷寒涼陰症發癍共為六條然究其實傷寒熱病者多陰症發癍甚少即內傷寒冷抑遏陽火不伸以致發癍不過用辛溫升散之法耳亦未可遽作陰症主治就目今所發之癍只須依海藏四條為正一曰溫毒冬時觸冒寒毒至春始發郁久變熱故以溫名又有冬令應寒反暖亦名溫毒人感溫毒外冒風寒所束溫氣不得發泄則惡寒拘急身熱足冷無汗脈浮或脈伏宜以敗毒散升麻葛根湯散其表邪則溫毒外泄而脈出汗出癍氣自透若里有積熱然後用升麻清胃湯消毒化癍湯清熱二曰熱病發癍即陽毒發癍濕熱燥火傷人血分蒸釀發出其症目赤狂言咽痛煩悶癍如紋錦不惡寒反惡熱初起脈見浮大先以升麻葛根湯升散陽明癍毒若脈沉而數身熱不退隨以消毒犀角散石膏化癍湯升麻清胃湯清其裡熱便結腹脹下症悉具以當歸大黃丸加柴葛以下之三曰時氣發癍此天時疫毒加臨長幼傳染初起惡寒發熱或耳聾足冷煩悶下利呻吟嘔惡此等之癍有表症者羌活敗毒散升麻葛根湯已發者消毒飲合升麻清胃湯化癍湯化之若食滯中焦宜消導忌寒涼故治疫邪治無定法若寒淫所勝治以辛溫寒濕所勝治以溫燥濕熱所勝治以苦寒燥熱所勝治以甘寒隨各年時氣以治者四曰傷寒發癍內有積熱外傷暴寒束於肌表蒸發紅癍或當汗不汗當下不下熱毒蘊蓄亦令發癍每發於十日之外不論日數但頭痛足冷惡寒發熱脈浮大有太陽症用羌活敗毒散若寒熱耳聾煩悶咳嘔脈見弦數有少陽症用柴胡湯若目痛額痛鼻乾不眠脈見洪長有陽明症用升麻乾葛湯若表散裡熱脈大沉數用解毒化癍湯升麻清胃湯若有下症脈浮弦數大柴胡湯脈大長數大乾葛湯脈沉數大三化湯大承氣湯楨按發癍症以發出為主然癍之不出有五一曰表郁寒邪二曰積熱火閉三曰內傷冷飲四曰食滯中焦五曰痰窒中脘若外郁表邪散表則癍出里壅邪熱清裡則癍出內傷冷飲溫中則癍出食滯中焦消食則癍出痰凝中脘化痰則癍出此始發之工夫也即出之後若癍痕不化又看有何症何因表邪尚在者發表則癍化熱結在裡者清熱則癍化內傷冷飲者溫中則癍化食滯中焦者消食則癍化痰凝中脘者豁痰則癍化便閉不通腹實脹悶者行大便則癍化今之治癍初起但知升提以發之那知癍滯不出症因多條夫發癍用升發忌苦寒人知之也化癍用升發忌苦寒人不知矣化癍而用苦寒忌升發人知之也化癍而用消導忌苦寒人不知矣至於寒飲抑遏食滯痰凝症外之兼症所當先治人人忽之矣夫傷寒從表傳裡邪熱斂結腸胃者當立下法今癍症疫邪自腸胃而發於外熱邪散漫體中不肯斂結於腸胃故但立發表清裡二法不立承氣下行之方或遇大便不通立當歸大黃丸因傷寒熱在氣分可用承氣湯癍症熱在血分濕火傷血大便挾熱下利用黃連芍藥湯燥火傷血大便閉結用當歸大黃湯丸此設雖發前書之未發然亦淺而易明者更有熱病發狂誤食葷腥血肉稠黏膠固與邪熱癍毒結紐不解唇口焦裂口臭牙浮渴不消水煩熱昏沉最難醫救用保和散沖竹瀝蘆根汁潤燥消導不愈用乾葛石膏治之唇口燥裂身熱不減用潤腸下順治之譫妄愈甚夫保和散但能消穀食痰涎不能消葷腥血肉之油膩乾葛石膏湯但能清陽明氣分無形之熱不能清陽明腸胃血分有形之積熱承氣順腸但能解下部大腸燥熱之結不能解上焦胃家稠黏濕熱之結是以膏粱厚味積熱上衝常有唇焦口爛牙齦潰腐口臭口乾之症家祕不用葛根石膏而用升麻清胃湯重加楂肉略佐砂仁少許以行生地之滯宣發陽明血分積熱實有苦心以熱病與癍痧誤食葷腥者必死余故發此死中求活總之癍毒之症皆陽明積熱所致以其熱在血分故外現紅點古人用升麻乾葛湯於初時發癍人人知也余以升麻清胃湯繼後化癍人所不知也至以清胃湯重加楂肉以救葷腥所傷佐砂仁行滯宣發腸胃血中伏熱又法外之法當互參唇焦門者夫唇焦口燥渴而引飲熱在氣分發渴之症用乾葛石膏人人知之也唇焦口燥渴不消水脈大不數之症不用幹葛石膏而用消導之法則不知矣至於癍毒內結唇焦口燥熱在血分不渴之症用升麻清胃湯清陽明血分之熱人都不知也夫癍毒痧痘初起用升麻乾葛湯要知妙與白芍藥同用則能宣發血中之伏火初起不用清胃湯者以升麻同生地川連則涼血太過今余用於末後化癍無化早之患此於升麻紫草化毒湯中參化出來今後治癍初起以升麻乾葛湯發之後以升麻清胃湯化之可為後世不磨之法古人以犀角地黃湯治陽明血熱鼻衄又以犀角化陽明血熱發癍曰如無犀角以升麻代之以其同散陽明血熱之藥同解陽明血熱之毒故可以升麻代犀角然余獨以犀角地黃湯濃重但宜於滋陰症中若以化癍論之則石膏知母芩連偏於涼氣失於涼血犀角地黃湯偏於滋陰失於凝滯不若升麻清胃湯輕清涼血且發且化又與升麻乾葛湯節次相承之妙也故余補注難用犀角以升麻易之惟不忌凝滯者犀角地黃湯亦可用也此升堂入室之工夫羌獨敗毒散見發熱發癍之症時行疫毒者多故用敗毒散先散表邪解毒化癍湯大力子荊芥防風川連桔梗蟬蛻生甘草癍痧發出里有熱者當以此方清熱化癍升麻乾葛湯見煩躁發毒見太陽表症當以敗毒散若見陽明症則以此方升發用敗毒散散背部癍伏用升麻葛根湯發胸面不透並唇焦口爛嘔吐介齒此妙里工夫也消毒犀角飲桔梗荊芥連翹防風黃芩犀角生大力子癍痧已出身熱不減故立解毒湯治熱之重者立消毒飲治熱之輕者石膏化癍湯石膏知母人參甘草葛根解毒化癍湯通治六經裡熱此方專治陽明裡熱症重者二方合用若熱極生癍用涼膈散三黃解毒湯當歸大黃湯當歸生大黃川黃連甘草熱重便硬有下症者立此方涼大腸血熱以癍症屬血故加當歸癍症不宜大下故加甘草大柴胡湯見潮熱大幹葛湯見頭痛少陽表熱有下症當以大柴胡湯雙解若陽明表熱有下症家祕化立此方有此二法則少陽雙解陽明雙解確不紊亂三化湯大黃枳實厚朴血熱便閉有下症者當歸大黃丸下之若氣熱便閉有下症則用此方加甘草即調胃承氣湯犀角大青湯犀角大青梔子豆豉此方即梔子豆豉湯加犀角大青能解陽明血中之毒故為癍症之要藥升麻清胃湯升麻川連生地丹皮甘草木通乾葛清胃湯清陽明氣分熱毒此方清陽明血分疫毒故癍症口燥唇焦熱而消水氣分熱也用乾葛清胃湯若口燥唇焦熱不消水血中伏火升麻清胃湯大凡膏粱積熱口臭唇焦牙齦腐爛多用此方以葷腥能傷血分耳加楂肉砂仁善消油膩葷腥加木通合導赤各半湯能利小便加枳殼合川連枳殼湯而清大腸積熱邪火傷血則發癍濕火傷血大便泄燥火傷血大便結當歸大黃丸清血中燥火潤大腸結余化用此方治燥火傷血腹痛赤痢止大腸之泄溫病內經以冬月天寒人傷而即病者名傷寒若傷而不即病寒邪鬱而成熱至春而病者名溫病傷寒論太陽病發熱而渴不惡寒者為溫病同言太陽病以不渴惡寒名傷寒以渴而不惡寒者名溫病然則內經所云明溫病之原仲景所云別溫病之症知病原識症狀知傷寒溫病之所以別矣第內經所謂溫病者冬受寒邪至春始發之溫病也仲景所謂溫病者人感濕熱當時即發之溫病也進而求之即春之溫病亦有三種有冬傷於寒至春而成溫病者有冬感溫氣至春更感溫熱而病溫熱溫毒者有非冬感寒非重感溫熱但遇時行溫熱之邪而即發溫病者是此而知傷寒不獨於冬四時有暴寒皆能傷寒者溫病不獨發於春四時有暴熱皆有溫熱病者但要明其病原主治耳楨又悟得傷寒之邪傷於太陽從表而起溫熱之病感於陽明而入腸胃自內而發故溫病發熱而渴不惡寒者若先感溫熱又冒風寒而發身痛頭痛惡寒發熱而渴者此太陽有表邪之寒熱病不得名之溫熱病也當發表清熱和解主治者故太陽傷寒用羌活敗毒散發表若太陽寒熱病則用羌活沖和湯和解陽明傷寒用葛根湯發表若陽明寒熱病則用乾葛石膏湯和解若少陽傷寒用羌活柴胡湯少陽寒熱病用小柴胡湯和解若身痛頭痛惡寒發熱口不渴者乃三時暴感之傷寒症非溫熱之症總之傷寒外感風寒里無積熱故初起以辛溫散表不可早用清涼直待表散裡熱方用清裡今溫病先感熱而病者故宜清涼和解惟惡寒身痛無汗脈浮表有寒邪者方用辛涼散表活人云傷寒者冬傷於寒即發之寒熱病也冬溫者冬有溫氣感而即發之熱病也春溫者冬傷於寒至春陽氣發升寒邪鬱而發熱之溫病也風溫者不因冬感寒邪即於春令感當時溫熱之氣而病者然此皆一人自感而獨病者若暴寒暴熱天地之邪氣流行沿門長幼皆病者此名時疫之病羌活沖和湯見發熱溫熱之病陽明經多然亦有兼太陽者故立此方和解以溫症用不得麻桂辛溫耳乾葛石膏湯升麻乾葛知母石膏甘草此方和解陽明表裡症帶太陽仍加羌活小柴胡湯見寒熱此方和解少陽表裡者若帶太陽表症加羌活帶陽明表症加乾葛涼膈散見發狂溫病表解裡熱者以此方清熱若帶表症仍加表藥三黃巨勝湯見發狂此方專治陽毒故溫熱重者用之也若帶表症仍加散表之藥三乙承氣湯見大便結溫病裡熱止須清裡然有熱結大腸大便不通者以此方下之疫病疫邪之症長幼相似若一人獨病不染他人者此人自感非大災之疫也疫症之原不一如春時應暖而反寒則有寒疫冬時應寒反溫則有溫疫推之於夏應熱而反涼秋應涼而反熱應燥而反溫及久雨之濕久旱之燥偏於太過者則皆可成疫也傷寒論惟注溫疫寒疫不知六氣之不正者皆能發疫也故各隨時氣之不正者主治則得之矣總之時令應暖而反寒散寒邪即是治疫時令應寒而反溫清溫熱即是治疫應燥而反濕祛濕邪即是治疫應濕而反燥清燥火即是治疫寒疫即時行之傷寒病也既冒寒邪當以辛溫散表若內無積熱太陽見症者冬月北方用麻黃桂枝湯南方用羌獨敗毒散等若表邪未散即內有積熱者亦止宜羌活沖和湯等和解未可用清涼若陽明見症者冬月北方葛根湯南方升麻乾葛湯少陽見症者北方柴胡桂枝湯南方柴胡防風湯若寒邪已散里有結熱仍照傷寒清裡之法溫疫即時行傷熱病也熱邪帶表當以辛涼解表太陽見表症羌活沖和湯陽明見表症升麻乾葛湯少陽見表症小柴胡湯溫疫禁用辛溫若里有結熱涼膈散三黃湯人參白虎湯有下症者三乙承氣湯選用若表邪未盡仍要先散表邪然後清下濕疫即時行傷濕病也濕邪之症當分寒濕熱濕發熱無汗身痛拘緊口不消水脈濡而小此太陽寒濕之症宜辛溫散表羌獨敗毒散羌活勝濕湯若少陽見症加柴胡陽明見症加蒼朮白芷發熱多汗口渴消水脈洪而數此陽明濕熱之症宜辛涼解肌升麻乾葛湯合神術湯若兼有太陽表症合羌活沖和湯少陽見症合小柴胡湯燥疫即時行傷燥病也燥熱之症多傷手陽明大腸手太陰肺故燥火之症每多煩渴喘逆當用清燥之藥如人參白虎湯清燥湯等切忌溫燥又不可發汗利小便重亡津液又不比內傷之燥可用滋陰凝滯麻黃湯桂枝湯見惡寒羌活敗毒散見發熱雙解散見發狂寒疫可用辛溫若溫熱之疫即有表邪止用此方辛涼雙解乾葛石膏湯見寒熱太陽溫疫當以雙解散治之陽明溫疫則以此方雙解若兼少陽合用小柴胡湯涼膈散見發狂溫疫病有表症當以前方雙解若表邪已解當以此方清裡知母石膏湯知母石膏粳米甘草麥門冬涼膈散通治上焦裡熱此方專治陽明胃熱若下部有熱再加清下部之藥三黃湯黃連黃芩大黃前二方治上焦溫熱若三焦皆熱大便燥結當用此方六一散夏令濕熱溫疫當用此清利濕熱從下竅而出神術湯防風熟蒼朮石膏甘草濕熱疫邪當分表裡主治濕熱在裡用寒藥以清熱淡藥以利水若濕熱在表用風藥以散濕燥藥以勝濕佐以石膏甘草則濕熱盡去蒼朮防風湯風濕疫邪散表為捷防風勝濕蒼朮燥濕兼寒者加熱藥兼熱者加寒藥此二語開無窮之悟朮附湯熟附子白朮寒濕疫邪在表者宜用辛溫散濕若里有寒濕當以此方主治人參白虎湯見潮熱燥熱疫邪肺胃先受故時行熱病見唇焦消渴者即用此方清燥湯見喘逆陽明燥熱疫症用前白虎湯若燥傷肺氣而見發熱喘嗽則以此方清肺若陽明燥熱上衝刑肺二方合用夾食傷寒論胸滿條有煩熱胸中窒用梔子豉湯又有胸中痞硬氣衝咽喉不得息當吐之此二條言胸前胃家滿悶一以清胃熱一以吐胃痰主治也至心之下腹之中硬滿則曰脈浮而大心下反硬有熱屬臟者攻之又云從心下至小腹硬滿而痛大陷胸湯主之此二條一言心腹硬滿用承氣下腸胃燥屎一言心下至小腹硬痛用陷胸湯下胸腹痰飲至論病後新瘥強與穀食故令微煩當捐谷則愈此言病後食復之症也舍此別無食滯中焦胸膈飽悶而用消導之法不知今之患傷寒熱病癍痧疫毒因食滯中焦凝結胃陽不能敷布作汗內外結紐互相蒸釀久熱不解至死者比比良由世有夾食傷寒之名前賢未有夾食治法余今參悟方法主治夫食滯中焦外冒表邪病因不一有先因感冒而食滯不消者此因感冒停食外感為本食滯為標有先因食滯感冒風寒食滯為本外感為標二者雖有標本之分然當擇其急者先治二者皆急當以二者並治古人云急則治標人多錯解此言重在急字言治病當先治本若標病急當捨本先治標矣若不急仍先治本進而詳之更有說焉例如表熱食滯必得表汗外出表熱外解則食始消不知欲發表邪必得胃陽敷布方能作汗故以一半消食一半發表治之若胃氣衝和者則能作汗外解若痰涎食重膠固胃中而以表裡和平治之則不應矣於是家祕立保和散細研為末以散胸前凝結又以升陽解表湯煎湯調服蒸助胃汁則作汗外解若表邪未解表熱方盛食滯不消而里已熱結且唇焦口燥用不得快膈末藥者則以前方同煎以湯潤燥夫胸前食滯膠固不開不用消化則熱久神昏必至於死消化之藥太燥則熱得燥而燥愈甚亦必至死用潤不及則偏於燥而熱不減用潤太過則偏於潤而結愈固仲景用山梔豆豉湯治里有煩熱不能作汗外解河間又發豆豉石膏滑石同蔥白能發裡熱無汗之症均有至理家祕用保和散以消胸膈痰食多衝竹瀝蘿蔔汁以其潤而不燥寒而不凝不獨能消痰食且燥火閉郁非此不清燥熱無汗非此不潤平淡切病常能起回生惟葷腥食重抑遏表邪者多有不應若癍痧疫毒得葷腥者百無一生以疫毒得葷腥厚味則凝伏不出腸胃必腐後下血水更重於他病耳故治夾食必互參癍毒及唇焦胸滿方能得手家祕保和散半夏厚朴枳殼香附楂肉萊蔔子麥芽川連豆蔻石菖蒲上為細末白湯炮服有燥熱沖竹瀝蘿蔔汁或煎湯以服此方消痰化滯家祕治胸滿寒熱夾食夾痰先服此方隨服後方升陽解表湯若表裡並急前後二方合用古名保和丸然胸前凝結必須散以散之湯以蕩之若丸以緩之則胸前愈加填滿升陽解表湯升麻葛根羌活防風柴胡枳殼厚朴廣皮甘草半夏此方升發胃氣敷布胃陽作汗散表家祕治發熱胸滿表邪不解之症若表症重者先服此方散表若表裡皆重前後二方合服五味以散表五味以宣散胃陽敷布作汗古人以一味表藥一味涼藥和解表裡又以一半散表一半清理雙解表裡今家祕化立此方和解夾食外感以開化方比例之妙法痙病強直反張之病名痙病按痙病與傷寒相類但多項背反張為異治分表裡陰陽虛實寒熱金匱以太陽發熱無汗惡寒名剛痙發熱有汗不惡寒名柔痙此以有汗無汗別寒濕傷營風濕傷衛而定名者雖不明言發汗解肌然細玩首章原文以有汗無汗立說仍暗度金針於太陽傷寒發汗解肌同條處治但痙病不獨在冬月三時皆有者故不明示麻桂辛溫發汗解肌又因痙徑強直多有營衛不充外冒外淫致病用不得大汗發表故下章云太陽病發熱脈沉而細者名曰痙為難治蓋言太陽發熱之痙惟以散表為正治今以脈沉而細用不得散表則難治矣是此可見太陽發熱之痙設脈浮緊而大者仍可用散表方法而不曰難治矣下文又言太陽病發熱無汗之病本宜發汗若脈沉而細大發其汗因汗太多亦能致痙若發熱有汗之中風症脈沉而細者下之亦能致痙瘡家雖身疼痛若脈沉而細者誤發汗亦成痙即太陽病症備若脈沉遲止用栝蔞桂枝湯再三告戒脈沉而細者汗下俱禁者也然下文云太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之按此條但言無汗不言脈沉細故仍用葛根麻黃以發太陽陽明之表明示首章發熱無汗反惡寒之剛痙若脈不沉細仍用發表治法下文云痙為病胸滿口噤臥不著席腳攣急必介齒可與大承氣湯按此條不言無汗不言脈沉細明示首章發熱有汗之柔痙若脈不沉細而實大仍可用大承氣湯以下者首章恐痙病之脈有沉細者即無汗表症之剛痙亦用不得麻黃湯即有汗發熱之柔痙亦用不得桂枝湯此章恐發熱無汗脈大不沉細之剛痙應汗失汗故復立葛根麻黃湯又恐發熱有汗脈數不沉細之柔痙應下失下故復立大承氣湯兩面告誡可見仲景惟以病之無汗有汗脈之浮細浮大沉細沉實端在表裡虛實詳示發表攻裡者也海藏有口噤背反張名太陽痙低頭下視名陽明痙一目左右斜視手足搐搦名少陽痙其意欲以背為太陽胸前為陽明目之斜視左右為少陽以定經絡然項強之症屬陽明者多而陽明之脈入目陽明之脈左右交加兩目亦能斜視未可以此為定論丹溪有人參竹瀝主治者此因內傷痙病血液枯燥經絡不潤成之故耳薛新甫有瀉青丸異攻散六味丸逍遙散四物歸脾三乙承氣家祕用舒筋湯等此皆內傷痙病分別虛實補瀉而非外感六淫致痙之條也今余詳注仲景之痙病於前次述三公之論於後則外感六淫內傷致痙諸條皆全矣余讀傷寒論見仲景以冬月傷寒立論但榜及風濕風溫而不及三時之寒熱等病讀金匱痙病論見以中濕濕熱中暍等症次列於後余今著傷寒大白比例金匱痙病論先以傷寒寒熱溫熱病立論卷首兼以發癍夾食痙病次附於後則外感致病諸條皆全矣陰厥陽厥按厥逆厥冷四逆一也陰陽二病皆能發厥然陰厥易明惟陽厥有陽邪內傳陰經脈數沉細誤認陰寒者有陽邪內傳陽經冷汗時出誤認陰寒者有表邪內伏身冷無汗脈伏不出誤認陰寒者不知陰寒起病身不發熱口不作渴二便清利神氣清爽手足厥冷不能舉動六脈沉遲不數此陰經寒厥之症傷寒論以四逆湯乾薑甘草湯吳茱萸湯等治氣分火虛厥冷於惡寒門有當歸四逆湯治血分冒寒又立芍藥甘草附子湯治血分惡寒類於厥冷即可推此以治彼以上治陰經陰厥之法也若初起發熱惡寒熱久不涼漸至手足皆冷又或熱片時神昏不語或獨語譫妄身雖厥冷手足仍能舉動大便或閉或瀉小便赤澀甚至自遺不覺其脈沉細而數此陽熱傳入三陰乃陰經陽厥之症用寒藥則礙厥冷用熱藥則礙陽邪故仲景用四逆散疏通胃陽陽氣外達待厥愈足溫再清其熱若初起發熱自汗煩躁至八九日忽然四肢厥冷口燥唇焦煩渴引飲神昏不語揚手擲足身雖厥冷不欲衣被冷汗常出脈大沉數或數時一止此陽邪傳入三陽乃陽經陽厥之症宜河間涼膈散白虎湯黃連解毒湯清內伏之熱外發則手足溫暖然後看里有結熱者再清之有下症者二承氣湯選用若初起惡寒發熱六脈或浮大或沉伏煩躁呻吟忽爾手足皆冷此表汗不出表邪內伏之厥冷宜升陽散火湯羌獨敗毒散發散表邪則汗出厥愈以上三條治陽厥之法也另有夾痰夾食夾食氣填塞中脘升降不通胃陽不得四布亦令人手足厥冷宜用消導痰食導痰湯保和散再加開豁之藥升陽散火湯升麻葛根羌活獨活柴胡白芍藥防風甘草裡熱見厥用涼膈散等表邪內伏厥冷以此方升散羌獨敗毒散三陽表邪內伏用升陽散火湯太陽表邪內伏則用此方黃連解毒湯黃連黃芩黃柏山梔熱在上焦而厥用涼膈散熱在中焦用白虎湯若三焦皆熱則用此方大承氣湯見大便祕結甘草乾薑湯甘草乾薑此條本是陽症因表虛脈浮衛虛自汗又誤汗復亡其陽故使厥誤下復竭其陰故咽中干煩躁若用溫復陽則礙咽乾煩躁用寒則礙厥冷故此方以乾薑暖中甘草緩急待其胃陽敷布厥愈足溫然後作芍藥甘草湯調和陰血芍藥甘草湯芍藥甘草石膏荊芥此方妙法妙在石膏荊芥辛涼上焦潤其咽乾煩躁又藉其辛涼入血助芍藥甘草下緩肝急使其腳伸脫去乾薑辛熱以防胃熱譫語微露下文用調胃承氣湯復清胃熱調胃承氣湯大黃枳殼厚朴甘草復陽太過不耐辛溫胃熱譫語暫用此方四逆散柴胡白芍藥枳實甘草三陽表邪內伏四肢厥冷升陽散火湯等發之熱邪內傳四肢厥冷涼膈散等清之三陰臟寒而厥冷以四逆湯等溫之今本是陽症因熱邪內傳陰經而厥冷故以柴胡白芍藥疏通肝膽伸陽氣外達則肝主四末而四肢自暖又以枳實甘草疏通陽明裡氣伸胃陽外布則胃主手足而手足自溫此方分治陰經陽厥與陽經陽厥不同者涼膈散見發狂白虎湯見潮熱吳茱萸湯見惡寒白通豬膽湯厥冷有脈用四逆湯脈伏加蔥白以通陽氣陰極發躁加膽汁以監製家祕恐凝濁易川連少許宗連理湯法當歸四逆湯當歸白芍藥桂枝細辛通草甘草大棗此治血虛冒邪不能發汗外出例如氣虛冒邪而用人參敗毒散參蘇飲麻黃升麻湯麻黃升麻知母石膏當歸芍藥黃芩甘草此治誤下邪伏故用升散法從表發出以知母石膏黃芩清裡熱以歸芍引入血分至深之處家祕加羌活去麻黃以其咽喉不利吐膿血耳足冷傷寒論有先發熱後發厥之陽厥又有初起不發熱即見逆冷之陰厥此人人知之也至發熱之症表邪內伏上身熱而兩足獨冷癍痧內伏上身熱而嘔吐足冷即身熱多汗脈見沉數口舌生苔而兩足獨冷此前書未有不知寒邪初傷未曾發熱乃有足冷若上身發熱則一人之身豈有兩足獨冷之理且冬寒之時無病人常有足冷若傷寒已經發熱即冬月手足亦應溫熱若兩足尚冷即為表邪未伸熱邪未得發越況熱令之時人之手足皆暖豈有上身發熱兩足反見獨冷乎家祕用羌獨敗毒散解表以足冷之表邪惟獨活可解耳若失用獨活雖用發表下部之邪終不散重則變症輕則纏綿即令愈後恐防痿痹絶足故凡汗出而身熱不解者非裡熱即表邪若里有結熱而發熱不涼必是遍身時時有汗若身大熱而煩躁足冷斷非裡熱必是表邪未散或癍痧未出若是熱深厥深之裡熱症必然遍身皆冷今身熱而足獨冷必是表症未解故凡煩悶喘嘔身熱足冷便是發癍之候余治熱令之熱病無論有汗無汗脈浮脈沉一見身熱足冷乃改常之重症故從症不從脈者如是治法或有汗出而愈者或先有寒涼抑遏一汗不能全解連作三四次汗而愈者惟癍毒久遏凶多吉少然癍色鮮明亦有不死惟葷腥食重抑遏癍痧表汗者多不能生常見夏秋熱症之人內有積熱外冒表邪又被飲食寒涼抑遏胃陽陽明邪熱不得發越但頭汗遍身無汗又有癍痧疫毒抑遏胃陽亦不能宣揚外發余常以枳殼厚朴廣皮三味松發胃氣又以柴胡葛根防風三味宣散表邪有表邪者汗必出有癍毒者癍亦現因此悟得但頭有汗遍身無汗之症方書以水飲蓄血中焦不得宣通主治例如濕邪凝結用蒼朮厚朴葛根防風寒邪凝結用生薑羌活熱邪凝結用黃連枳殼食積凝結用麥芽豆蔻痰飲凝結用半夏石菖蒲要知枳殼豆蔻香附砂仁為胸前之總司葛根升麻乃宣揚胃氣手足溫暖遍身熱越汗出表解故宣揚胃氣乃發汗之妙法也按足冷與面赤皆系表邪然面赤色在上部人人知之足冷在下部人多忽之故余特補著然治足冷互參發癍夾食治法故升麻解表湯家祕通用者獨活湯獨活防風柴胡葛根廣皮甘草身痛加羌活胸滿加枳殼嘔惡加半夏厚朴白豆蔻川黃連和胃透肌湯厚朴枳殼廣皮柴胡葛根防風足冷皆系表邪但未明表汗癍痧故立一舉兩得之方升麻解表湯見夾食
