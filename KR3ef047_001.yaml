body:
  text: 卷一惡寒秦子曰惡寒惡風以一症而分輕重惡風者見風則惡無風即止惡寒者即無風亦惡寒惡寒惡風發熱皆是表邪雖里症悉具若有一些惡寒頭疼身痛手足冷即是表邪宜先解表不宜清裡攻下然惡寒有陰症陽症分別不發熱脈沉遲口不幹神清便清陰症惡寒治宜溫經發熱脈數頭痛心煩陽症惡寒治宜散表然溫經散表各有分別太陽症無汗惡寒發熱脈浮緊為表邪傷營宜發汗西北冬月用麻黃湯南方三時用加減羌活湯十味芎蘇散有汗惡風發熱脈浮緩為表邪傷衛宜解肌西北冬月桂枝湯南方三時加減防風湯陽明症目痛脈浮大無汗惡寒發熱宜發汗葛根湯有汗惡寒發熱宜解肌防風乾葛湯升麻葛根湯若口渴消水加知母石膏少陽寒熱無汗惡寒脈浮弦緊宜發汗柴胡防風湯有汗惡寒脈浮弦數宜小柴胡湯以上三陽表症惡寒也又有太陽病重發其汗不發熱而惡寒又有脈微人不應發汗誤汗之亦惡寒更有衛氣不足表氣虛誤汗之亦惡寒以上乃過汗亡陽而惡寒也治宜黃耆建中湯玉屏散例如熱病胃寒人多服寒涼反變裡寒而用溫里者也另有陰症惡寒治宜溫經又各不同此直中三陰中寒惡寒也仲景云太陽病脈浮頭項強痛而惡寒此分別太陽病必脈浮頭項強痛而惡寒者太陽病有發熱惡寒者發於陽也無熱惡寒者發於陰也此分別太陽病若初起惡寒時即發熱者為風傷衛氣發於陽也若起初惡寒未即發熱停一二日發熱者為傷營血發於陰也舊注發熱惡寒為陽症無熱惡寒為陰症誤也太陽病頭痛發熱汗出惡風者桂枝湯主之此分別頭痛惡風發熱汗出乃是風傷衛之中風症宜用解肌者太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽並竭無陽則陰獨復加燒針因胸煩面青黃膚瞤者難治色微黃手足溫者可治此重言太陽中風症不應用麻黃湯若誤汗之則發熱惡寒又復誤下心下痞滿陰陽兩傷而惡寒妄加燒針因胸滿煩面青黃肌肉瞤而難治惟面色微黃手足尚溫或可治之太陽病或已發熱或未發熱必惡寒體重嘔逆脈陰陽俱緊者名曰傷寒此申明發熱惡寒無熱惡寒之症一起病或即發熱未發熱若惡寒體重嘔逆六脈皆浮而緊急此名傷寒而非中風太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此申上章寒傷營之傷寒必頭痛發熱身疼腰痛骨節疼惡風無汗而喘當用發汗者發汗病不解反惡寒者虛也芍藥甘草附子湯主之未發汗而惡寒表邪也既發汗後反惡寒此誤汗亡血中之陽用芍藥甘草附子湯不比亡氣中之陽用四逆湯者傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之此申明傷寒不拘日數但以微惡寒骨節煩疼心下支結外症未去當以桂枝柴胡等散太陽少陽表邪不用桂枝柴胡湯用柴胡桂枝湯以少陽症多於太陽耳傷寒大下後復發汗心下痞惡寒者表未解也不當攻痞當先解表乃可攻裡解表桂枝湯攻痞宜大黃黃連瀉心湯此申明汗下後痞滿若惡寒為表邪未解故先用桂枝湯解表後用大黃黃連瀉心湯攻痞不比惡熱之痞氣即用瀉心湯攻裡者陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病汗出多本不惡寒陽明脈汗出多本不遲今本陽明病尚見浮遲浮緩之脈汗雖多仍微惡寒尚是太陽風傷衛表症故重申解肌散表之治也陽明病脈浮無汗而喘者發汗則愈宜麻黃湯陽明病脈本不浮陽明病本有汗今陽明病見浮緊太陽脈又見無汗而喘太陽寒傷營之症故重申發汗散表之治也本太陽病初得時發其汗汗先出不徹因轉屬陽明也若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可以小承氣湯微和胃氣勿令大泄此太陽病因發汗出不徹以致轉入陽明若汗雖多尚微發熱惡寒外邪未解且未見潮熱未可用承氣湯若腹大滿又見大便不通亦止可以小承氣湯略微和胃氣勿令其大泄以起初汗不透徹故耳陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也口苦咽乾腹滿陽明症也但微喘發熱惡寒又見浮緊太陽脈則不可下若誤下則表邪內陷腹滿而小便不利傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也可與小柴胡湯傷寒五六日少陽時也頭汗出微惡寒手足冷心下滿口不欲食少陽症也大便硬陽明結也但脈細此少陽微結非陽明實結故用小柴胡湯少陰病下利若利自止惡寒蜷臥手足溫者可治此條以下皆中寒陰症也少陰病惡寒而蜷時時自煩欲去衣被者可治少陰病惡寒身蜷而利手足逆冷者不治少陰病四逆惡寒而身蜷脈不至不煩而躁者死少陰病得之一二日口中和其背惡寒者當灸之附子湯同一背惡寒若口乾而渴以別陽明口中和而不渴以別少陰麻黃湯麻黃桂枝杏仁甘草仲景治北方冬令太陽經惡寒發熱頭痛脈浮無汗之症以麻黃桂枝發營衛之邪從皮毛外出又恐肺得風寒而閉郁故用杏仁潤肺以開泄皮毛然未可概治江浙溫熱之地三時溫熱之時故陶氏有加減法里有熱加石膏黃芩少陽見症加柴胡陽明見症加乾葛小便不利加木通車前子夏秋用羌活獨活易去麻黃桂枝加減羌活湯羌活獨活防風荊芥柴胡乾葛廣皮甘草北方長沙等地冬月允宜麻黃湯若南方溫熱之時則麻桂辛熱故家祕用此方臨症加減里有熱或火令加黃芩石膏知母胸前飽悶加枳殼厚朴桔梗脅肋刺痛加青皮山梔木通蘇梗嘔吐加半夏食滯加山楂麥芽萊蔔子頭痛加川芎十味芎蘇散川芎紫蘇乾葛柴胡枳殼桔梗半夏茯苓廣皮甘草少陽陽明惡寒發熱兼胸次不寬用此方散二經表邪解在裡凝滯惡寒無汗脈浮加羌活防風口渴消水加知母石膏里有積熱加梔連唇焦口燥去川芎半夏加天花粉知母桂枝湯桂枝白芍藥甘草生薑大棗傷寒無汗發熱惡寒仲景已立麻黃湯今有汗發熱惡風症立桂枝湯以症輕於前症方亦輕於前故不用麻黃杏仁開毛竅而用白芍藥斂津血薑棗調中氣惟以桂枝一味以治汗出邪不解之症然治南方熱令亦犯辛溫故立加減於後春加石膏黃芩熱令用防風易桂枝里有熱者不用此方惡寒身痛加羌活足冷加獨活時寒時熱加柴胡陽明有邪加乾葛加減防風湯防風荊芥羌活獨活白芍藥甘草生薑大棗北方冬令發熱有汗脈浮緩用桂枝湯若南方溫熱之時或內有積熱之人家祕化立此方代之因陶氏加減沖和湯未合仲景之旨耳症兼陽明加乾葛兼少陽加柴胡口渴消水加石膏知母里有積熱加梔連胸前飽滿加枳殼廣皮葛根湯葛根麻黃桂枝白芍藥甘草生薑大棗太陽無汗惡寒未鬱熱者北方冬月用麻黃湯陽明無汗惡寒北方用此方三時南方人或里有熱者以羌活獨活易麻桂無汗而喘脈浮而緊以杏仁易去芍藥口渴消水加知母石膏桂枝葛根湯葛根白芍藥桂枝甘草生薑大棗陽明無汗而惡寒用前方葛根湯若有汗惡寒用此方主治然此亦冬令治法南方人里有熱以防風羌活易去桂枝口渴消水加石膏知母積熱重者加梔連葛根解肌湯葛根白芷防風蒼朮蔥白前二方仲景一以治陽明無汗惡風寒一以治陽明有汗惡風寒但治冬令則可南方溫熱家祕用此方胸前飽悶加枳朴嘔吐加半夏口渴去蒼朮加栝蔞根升麻乾葛湯升麻乾葛白芍藥甘草生薑棗肉前方葛根解肌湯治陽明發熱無汗惡寒者此方治陽明有汗發熱惡寒者蓋汗出而熱不減不重在發汗此方妙在但散邪不發汗者防葛石膏湯防風葛根石膏知母廣皮甘草葛根解肌湯治陽明無汗發熱惡寒升麻乾葛湯治陽明有汗發熱惡寒若口渴消水表裡俱見立此方和解小柴胡湯柴胡黃芩廣皮人參半夏甘草太陽惡寒陽明惡寒前已分別各條治法今少陽寒熱通以小柴胡湯加減以應變化惡寒無汗加防風頭痛身痛加川芎羌活目痛額痛加乾葛白芷惡寒足冷腰痛腳痛加獨活惡寒發熱脅肋痛加青皮山梔枳殼木通蘇梗有汗加白芍藥助柴胡同止寒熱血不足而惡寒倍加當歸白芍藥胸前飽悶去人參加枳朴大便閉結小腹脹痛加大黃小便不利加木通喘咳加枳桔杏仁里有積熱加梔連嘔吐倍半夏加竹茹厚朴口燥痰多去半夏易栝蔞霜貝母口渴唇焦加石膏知母竹葉小柴胡湯有人參無大黃治中氣虛邪在半表半裡者大柴胡湯有大黃無人參治腸胃實熱大便祕結者柴胡飲子有人參有大黃治中氣虛大便結熱有潮熱者柴胡桂枝湯見發熱少陽症又見太陽惡寒以柴胡湯加羌獨散太陽表邪無汗惡寒加羌活防風見陽明症加葛根黃耆建中湯黃耆桂枝白芍藥甘草大棗中氣虛寒而惡寒以建中湯加入黃耆實營衛胸前凝滯加砂仁廣皮元氣虛加參術血虛加當歸真陽虛加桂附去桂枝玉屏散黃耆防風甘草中氣虛則用黃耆建中湯表氣虛而惡寒則用玉屏散本草云黃耆得防風其功愈大非言補氣之功言固表之功元氣虛加參朮陰血虛加歸芍吳茱萸湯吳茱萸生薑人參大棗以下皆陰症惡寒之方厥陰乾嘔吐涎沫惡寒故以此方主治痰多加半夏氣逆加廣皮藿香砂仁通脈四逆湯乾薑熟附子甘草蔥白不發熱而手足厥冷三陰經陰症寒厥惡寒也仲景以此方治之家祕加廣皮和中州助蔥白以行陽氣加黃耆協薑附而達表方書用黃耆同防風助黃耆實腠理此以用薑附加黃耆助薑附外固皮毛當歸四逆湯當歸白芍藥桂枝通草細辛大棗甘草此方治血虛傷寒發表者也傷寒氣血充足略一惡寒即發熱作汗若氣血虛不能發熱作汗故惡寒厥冷脈細欲絶宛似陰症仲景以當歸芍藥與桂枝細辛同用全在養血散表實非陰症溫經治法家祕加川芎蔥白助其通陽和陰作汗外解芍藥甘草附子湯白芍藥甘草附子未發汗而發熱惡寒宜發汗既發汗而表症仍在者尚宜再汗今因發汗後反惡寒此因汗而亡陽惡寒也然亡氣中之陽用四逆湯亡血中之陽用芍藥甘草附子湯附子湯附子白朮白芍藥人參茯苓此方即真武湯加人參仲景治少陰背惡寒口中和者因此悟得仲景用八味腎氣丸補水中之火補天一生水用真武湯補土中之火補地二成之也發熱發熱有翕翕發熱蒸蒸發熱翕翕發熱者身熱無汗惡寒拘緊如鳥羽之合而不發舒此邪傷於表鬱於肌膚表熱而里未熱治宜發散表邪蒸蒸發熱者手足遍身漐漐多汗熱而潤澤此表邪已散熱鬱於裡蒸汗時時外出也治宜清熱若便結腹脹有下症者下之此以表熱裡熱分兩大法也若發熱無汗脈浮緊此太陽傷營之表症也冬月西北人用麻黃湯餘三時用羌活沖和湯羌活敗毒散若發熱有汗脈浮緩此太陽風傷衛之表症也冬月西北人用桂枝湯餘三時用加減防風湯若脈浮外發熱內煩躁作渴飲水小便不利者此太陽熱結膀胱之裡症也仲景以五苓散清利膀胱余今廣推羌活木通湯雙解太陽表裡若頭痛額痛目痛鼻乾發汗無汗微惡寒脈浮而長此陽明表症也治以乾葛解肌湯若發熱有汗口渴引飲六脈洪數不惡寒反惡熱此陽明經症也白虎湯加葛根若發熱煩躁口渴唇焦小便閉結手足時時汗出六脈沉數此陽明裡症也宜三黃巨勝湯導赤各半湯涼膈散若口乾舌刺小腹硬滿欲大便而不得便脈沉數者此陽明之下症宜承氣湯下之若時寒時熱頭側作痛兩耳常聾嘔而口苦此少陽經症也脈弦而緊無汗者柴胡防風湯散表脈弦而數有汗者小柴胡湯和解若身雖寒熱大便閉結腹痛脹滿脈見沉數時時汗出者此少陽裡熱下症也宜大柴胡湯下之按三陽發熱之症要分別有汗無汗汗多汗少夫無汗發熱為表熱易知者也亦有汗出未多而發熱不減人多誤為裡熱矣汗出未多而熱不減猶易知其表熱也至汗出多而發熱不減尚是表邪則難分別矣例如太陽中風症自汗出而熱不愈此表熱症也若但以汗多妄用清裡則礙表邪矣又如風溫症自汗出而熱不退此三陽經表熱症也若誤以中風症用桂枝湯解肌是犯辛溫誤治風溫矣若以汗多身熱陽明裡熱治之是犯失散在表之風溫矣夫太陽自汗出發熱之中風極似風溫症不知太陽中風惡風寒風溫症則不惡風寒太陽症口不渴風溫症口多渴太陽症鼻不塞風溫症鼻塞多眠睡此症之各別者也太陽症脈浮緩風溫症脈浮數此脈之各別者也夫陽明裡熱自汗出熱不退之症又與太陽中風三時風溫症亦相似然中風風溫症必帶惡寒惡風身痛頭痛之表症若陽明裡熱自汗出熱不退則無惡寒身痛之表症反有惡熱口渴裡熱之症此症之分別者也中風風溫之症脈必浮數若陽明裡熱之症脈必洪大沉數夫發熱而分無汗脈浮以別表熱有汗脈沉以別裡熱此經之常理之正也然亦有有汗發熱脈沉而見表症但坐以汗出不徹仍用發汗退熱者夫無汗發熱脈浮人人知其表熱然有火閉無汗之症其脈亦浮數連服發表之藥汗不出後服清裡之藥汗出熱減而愈者又如三陽經有表復有里之症先服散表之藥汗不出熱不退復服和解藥而汗出熱退者總之發熱無汗表散不得外泄者宜發汗解表發熱有汗裡熱蒸汗自出者宜清裡退熱又汗出身熱微惡風寒脈見浮大者此汗出邪不出尚宜發表又發熱無汗時或汗出則熱暫退少頃汗乾或停一日半日又復發熱仲景但坐以汗出不徹宜再發汗更有發熱無汗不惡風寒脈見沉數者此裡熱火閉不能作汗外解清其裡熱則汗出身涼另有痰飲積熱鬱結腸胃外冒表邪而發熱用散表之藥汗出而發熱不減用清裡而裡熱不除此熱而有滯之症又宜消痰化滯疏散腸胃鬱熱則胃氣宣揚敷布裡熱從上而汗解太陽病有發熱惡寒者發於陽也無熱惡寒者發於陰也詳注前章太陽病頭痛發熱汗出惡風脈浮緩者名中風桂枝湯主之此條明風傷衛汗出惡風脈浮緩者用桂枝湯也桂枝本為解肌若人脈浮緊發熱汗不出者不可與也當須識此勿令誤也此申桂枝湯治不得寒傷營脈浮緊汗不出症太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯主之此申發熱汗出之症營血無邪而弱衛氣有邪而強故宜用桂枝湯病人臟無他病時發熱自汗出而不愈者此為衛氣不和也先其時發汗則愈宜桂枝湯主之按發熱自汗有三症有太陽風傷衛之症用桂枝湯以解肌有陽明發熱自汗之裡熱症用白虎湯以清裡有春三月發熱自汗之風溫症用防風石膏湯以和解前章無時發熱之句此章有時發熱之症故立先其未發熱之時服桂枝湯以發其汗推而廣之則時寒時熱之柴胡症發作有準之似瘧症皆宜先其時而服藥者中風發熱六七日不解而煩有表裡症渴欲飲水水入即吐者名曰水逆五苓散主之多服暖水汗出則愈言中風發熱至六七日有表裡症飲水不得消水而水逆上吐此膀胱熱結不通調水道下行以五苓散散太陽表邪利膀胱結熱多服暖水上潤皮毛助汗出下潤膀胱宣水道太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘麻黃湯主之此條辨太陽病如此症象乃寒傷營宜麻黃湯者傷寒五六日嘔而發熱者柴胡症具而以他藥下之柴胡症仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸大陷胸湯主之但滿而不痛者此為痞柴胡湯不中與之宜瀉心湯詳注結胸門傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外症未去者柴胡桂枝湯主之發熱惡寒肢節煩疼宜麻黃桂枝湯今因微嘔心下交結又兼少陽症故用柴胡桂枝湯傷寒身黃髮熱者梔子柏皮湯身黃髮熱有從表發散之治今裡熱蒸黃故用此方太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也以真武湯救之太陽中風又惡寒身痛汗不出而煩躁名營衛兩傷脈浮緊用大青龍湯若脈微而弱汗出惡風寒不可服大青龍湯若誤用則手足厥冷筋惕肉瞤故以真武湯救之太陽病得之八九日如瘧疾狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒此陰陽俱虛不可更發汗更下更吐也面色反有熱色者邪未解也以其不能得小汗出身必癢宜桂枝麻黃各半湯詳注似瘧太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗宜桂枝二越婢一湯發熱惡寒理宜發汗然脈微者陽津不足故不可發汗太陽病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜四逆湯此太陽症脈似少陰之條太陽症故發熱正氣衰微故脈沉今以四逆湯溫里逐邪以代麻黃湯非陰症溫經也傷寒發熱嗇嗇惡寒大渴飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門傷寒發熱本非肺病今灑灑惡寒大渴飲水此肺熱不能通調水道其腹必滿若自汗出小便利則肺病得解設汗不出小便不利此肝膽熱邪乘侮肺金急刺期門太陽病發熱汗出身仍灼熱脈浮汗出身重多眠鼻鼾者風溫也太陽病發熱汗出身仍灼熱脈浮汗多絶似桂枝湯症但無惡寒頭痛而有多眠鼻鼾此風溫也切不可用桂枝湯發熱汗出解半日許復煩躁脈浮大者可更發汗發熱汗出止解半日許復煩躁脈浮大則表邪仍在故更發汗發熱汗出不解心下痞硬嘔吐而利者大柴胡湯發熱汗出熱不解心下痞硬已是下症但嘔不宜下故用大柴胡湯瘥後更發熱脈浮數者以汗解之脈沉數者以下解此示人不論初病久病惟見症治症憑脈用藥發熱未有汗者不可與白虎湯若大渴引飲無表症者仍與白虎湯發熱未有汗表邪未解故不可用白虎湯大渴引飲無表症者故仍與白虎湯互相告戒有一定之理傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之心下素有水氣又得寒邪相搏故用小青龍湯外散表邪內散水飲傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之此申明上文服小青龍湯已渴者此水寒已去不可再服小青龍湯小青龍湯句當在發熱不渴句下看陽明病若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通可與小承氣湯微和胃氣勿令大泄言陽明病汗雖多仍見微發熱惡寒則表邪尚在況無潮熱故未可與承氣湯即腹大滿大便不通亦只用小承氣湯陽明中風若咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也陽明中風口苦咽乾腹滿似傳裡矣若發熱惡寒脈浮而緊尚是陽明太陽表症若反下之則邪從內陷而腹愈滿小便不利矣傷寒發熱無汗嘔而不能食而反汗出濈濈然者是轉屬陽明也傷寒發熱無汗本太陽表症今嘔而不能食反汗出濈濈然故為轉屬陽明也以其有嘔吐無下症故不立下法太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之較上章多蒸蒸有汗且無嘔吐故用調胃承氣湯陽明病發熱汗多者急下之宜大承氣湯汗多發熱津液有立盡之勢故急下之三章次第詳注後自汗門以為下法的訣傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸頭痛發熱本是太陽汗症但脈弦而細此是少陽也故誤用麻黃桂枝則譫語此症全賴胃氣衝和可愈若胃氣不和則煩而悸矣婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而泄之婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈兩條詳注熱入血室皆不立方但曰無犯胃氣此禁汗吐互詞少陰病始得之反發熱脈沉者麻黃附子細辛湯此即少陰症似太陽也少陰經表有寒邪理當散表但不同太陽方法故以麻黃附子溫經散邪少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯少陰變熱乃為回陽故曰不死然脈不至尚是危兆故灸少陰傷寒始發熱六日厥反九日而利凡厥利者本不能食今反能食者恐為除中食以素餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也此章言陰厥回陽太過必發癰膿詳注厥利傷寒先厥後發熱而利者必自止見厥復利先厥後熱即陰厥回陽故曰利必自止若後復見厥則必復利矣傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹此條詳注咽痛發熱無汗而利必自止若自止必便膿血便膿血者其喉不痹此條詳注便膿血傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者必便膿血此章重申厥少熱多熱不除必便膿血可見熱病回陰陰症回陽均怕過與不及麻黃湯見惡寒羌活沖和湯羌活防風白芷黃芩蒼朮生地川芎細辛廣皮甘草此和解太陽表裡之方燥熱令去蒼朮川芎細辛兩足冷加獨活少陽見症加柴胡夏秋加知母天花粉石膏乾葛胸前飽悶去生地加枳殼厚朴汗多加白芍藥如濕氣勝去生地羌活敗毒散羌活獨活柴胡前胡川芎防風荊芥廣皮甘草此方太陽經發汗解肌者余以此代仲景麻黃湯治四時太陽表症口渴去川芎胸前飽悶加枳殼厚朴陽明見症加乾葛里有熱加黃芩山梔石膏加減防風湯見身痛冬令北方有汗發熱用桂枝南方三時家祕用此方加減詳身痛五苓散見小便不利按太陽有汗發熱口渴小便不利此熱結膀胱之症故仲景以此方治之加減詳小便不利口渴門羌活木通湯羌活獨活木通車前子熱結膀胱脈數口渴症用五苓散者變立此方雙解太陽表裡乾葛解肌湯乾葛升麻防風荊芥此方散陽明表邪發陽明伏癍不出若惡寒頭痛加羌活時寒時熱加柴胡腰痛足冷加獨活乾葛白虎湯見口渴陽明表邪發熱用前方乾葛解肌若表裡皆熱用乾葛散表石膏清裡三黃巨勝湯見譫語導赤各半湯見腹痛表熱宜散表裡熱宜清裡此方以瀉心湯合導赤散清熱之力專利小便之功大涼膈散見發狂此方治熱結上焦肺胃發熱之症加減詳發狂大承氣湯見大便結小柴胡湯見寒熱柴胡桂枝湯柴胡桂枝黃芩半夏人參甘草生薑大棗此方即小柴胡加桂枝去陳皮易棗肉三時忌桂枝易羌活口渴去半夏生薑加天花粉症兼陽明加乾葛知母無汗加防風梔子柏皮湯見發黃先發熱後發黃此因熱而蒸黃故用此方不比食滯發黃而用消滯者大青龍湯見煩躁桂枝麻黃各半湯桂枝麻黃白芍藥杏仁甘草生薑大棗麻黃湯加石膏薑棗更名大青龍以石膏制辛熱加薑棗和中氣是變辛熱而為辛涼矣此方同加薑棗和中而加白芍藥養陰斂陰是變汗劑而為和劑矣桂枝二越婢一湯桂枝白芍藥麻黃甘草石膏大棗生薑麻黃湯原方加薑棗石膏名大青龍湯加白芍藥名曰各半湯今此方又以桂枝湯輕劑加石膏制辛溫白芍藥斂陰血此從輕化輕故曰越婢形容不跋扈大柴胡湯見寒熱白虎湯見口渴小青龍湯見咳逆此湯內散水氣外散表邪詳咳逆門小承氣湯見大便結麻黃附子細辛湯麻黃附子細辛此少陰外冒傷寒發熱不可用太陽治法故用此方溫經散寒邪從里出表寒熱寒熱者寒已又熱熱已又寒或一日二三度發若每日一發先寒後熱發作有定期者又名似瘧而非寒熱矣寒熱之症太陽經居多有時邪熱內伏則寒有時邪熱外發則熱表邪多則寒多熱少而無汗羌活柴胡湯散表裡熱多則熱多寒少而有汗以小柴胡湯和解若寒多脈浮大者倍用柴胡若手足常冷惡寒汗少再加發表之藥汗多脈沉數者方用黃芩若汗多口渴脈數再加清裡之藥表寒多用發散忌以清涼裡熱多用清涼兼發散若汗多有寒有熱之症不得不用發散清涼寒熱雜合之劑以和解表裡是以仲景小柴胡湯和解少陽經時寒時熱之症以柴胡一味升散在表之邪使惡寒自已以黃芩一味清解在裡之熱使發熱自除再加人參廣皮甘草以和胃氣使胃陽敷布得專和解之權推而比例則症之兼見太陽者羌活沖和湯症見陽明者乾葛石膏湯若三陽經俱見症者用羌活葛根柴胡三味散表以治惡寒黃芩石膏知母三味清涼以治裡熱廣皮甘草以和中氣則三陽寒熱汗多一和解而盡之矣準繩書以此治夏秋三陽寒熱之瘧深中此旨傷寒病至十餘日外熱結在裡復往來寒熱宜大柴胡湯十餘日外熱結在裡已為可下今因往來寒熱少陽症但可用柴胡湯散表邪略加大黃一味以去裡熱傷寒六七日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之此條詳注嘔吐門本太陽病不解轉入少陽脅滿乾嘔往來寒熱尚未吐下脈沉緊者小柴胡湯太陽病傳入少陽脅滿乾嘔往來寒熱症見沉緊弦脈症脈皆是少陽故用小柴胡湯傷寒五六日已汗下胸脅微結小便不利渴而不嘔但頭汗出往來寒熱心煩者未解也宜柴胡桂枝幹薑湯五六日已汗下胸脅微結小便不利渴而不嘔但頭汗往來寒熱又心煩此太陽表症未罷少陽諸症又急故用柴胡桂枝合治因汗下後略加乾薑和中小柴胡湯柴胡黃芩人參熟半夏廣皮甘草此仲景和解少陽表裡寒熱之方若太陽兼症加羌活若陽明兼症加葛根升麻無汗加防風口渴去半夏加天花粉大便祕結腹中脹痛下症急者加大黃小便不利加木通大便滑泄加赤茯苓名柴苓湯頭角痛加川芎羌活沖和湯見發熱此方和解太陽寒熱之症加減詳發熱門乾葛石膏湯乾葛柴胡黃芩石膏廣皮甘草此方以柴葛解肌湯乾葛石膏湯小柴胡湯三方合一雙解陽明少陽表裡者大柴胡湯柴胡黃芩廣皮甘草大黃此方小柴胡去人參加大黃名大柴胡湯治少陽表症未罷下症已急故以此湯雙解表裡柴胡桂枝幹薑湯柴胡桂枝黃芩廣皮甘草人參芍藥乾薑半夏此即小柴胡合桂枝湯治太陽中風兼少陽寒熱者廣而推之仲景治項強症有桂枝加葛根湯麻黃加葛根湯同此法也時寒時熱症世俗皆以小柴胡和解少陽然未見效余今進求精切因知發熱惡寒皆太陽表症時寒者表邪欲發未伸也時熱者邪熱暫時外現也時寒時熱者邪熱欲發未能邪正分爭表邪未越表汗未徹也豈小柴胡和解一法得以治之夫似瘧症每發必汗出身涼專務散邪主治忌用寒涼抑遏恐明日至其時尚有惡寒表症耳況寒熱不涼者乎理肺發表湯平胃發表湯治時寒時熱最效方見身痛身痛身痛之症六經皆有三陽身痛皆是表邪三陰身痛皆是裡寒太陽身痛發熱無汗手足冷脈浮緊宜發汗西北冬月麻黃湯南方三時羌活湯有汗脈浮緩西北冬月桂枝湯南方加減防風湯如發汗後身痛不減若脈仍浮緊可再發汗若汗後身痛不減而脈變遲者切不可再發汗宜桂枝人參芍藥湯若初起本不身痛因發汗後反見身痛此誤汗亡陽身痛也黃耆建中湯又有發熱面目黃遍身疼痛喜忘漱水在口不得咽下此上焦蓄血身痛犀角地黃湯加紅花赤芍藥若小腹硬滿大便或閉或黑此下焦蓄血痛也桃仁承氣湯主之夏秋中暑多汗身疼脈反虛而口渴人參白虎湯風在三陽惡風發熱支節煩疼脈浮無汗宜羌活防風湯風濕相搏身體煩疼不能轉側口不消水脈浮而濡北方冬令桂枝附子湯南方三時防風神術湯濕溫身痛汗多口渴不能轉側石膏神術湯同一身痛不能轉側上條言風濕口不消渴則里無濕熱故用防風神術溫散下條言濕溫汗多口渴則里有熱矣故用石膏神術清滲法大凡濕痛多身重風痛多身輕熱痛多身汗寒痛身多青飲痛多嘔惡暑痛多口渴虛痛多喜按氣痛多攻注風火則行走不定時作時止風寒則凝住一處長痛不休四肢常冷另有不發熱脈沉遲身痛者此三陰經陰寒身痛也重則四逆湯輕則理中湯頭痛身痛症悉系表邪頭痛條雖有痰飲火沖二症亦是內有痰火外冒表邪而痛至身痛皆是太陽表症家祕專以羌獨湯加蘇梗木通主治更有時行暴寒雨濕常發疫邪身痛亦以羌獨敗毒散主治如有胸滿嘔吐兼用平胃二陳湯宜散胃濕邪痰飲同發表之藥作汗外解又有身痛惡寒發熱嘔惡下痢血水亦用前方宣散溫毒之表邪則痢自愈誤用寒涼抑遏則表汗不出表邪內陷而不治太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此言太陽寒傷營之表症故發散表邪傷寒六七日發熱微惡寒肢節煩疼微嘔心下交結外症未去者柴胡湯桂枝湯主之太陽少陽之表邪未去故用柴胡桂枝二方合用詳注惡寒條傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛二便清調者急當救表救里宜四逆湯救表宜桂枝湯傷寒表症醫誤下之則下利不止故急當救里服後身疼痛表邪不解故急救表傷寒八九日風濕相持身體煩疼不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之身體煩疼不能轉側不嘔不渴寒濕之症也脈虛而澀寒澀之脈也故用桂枝附子湯風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯此承上章寒濕身痛而又化出近之痛劇汗出短氣小便不利惡風不欲去衣等症故用甘草附子湯溫經散濕若用防風神術湯則非矣太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服也此條詳注煩躁太陽病脈浮緊無汗發熱身疼痛八九日不解表症仍在此當發其汗服藥已微除其人發煩熱目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之此章千古錯解麻黃湯主之一句在當發其汗下看詳注衄血陽明病初欲食小便反不利大便自調其人骨節疼翕然如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈此言能食之陽明病見小便不利水必內停其人骨節疼有翕翕發熱之表症又有奄然發狂之裡症此即水穀之寒熱故必得濈然汗出則內停水穀之邪與汗共並而解然必得脈緊急有力則能作汗自愈太陰中風四肢煩疼陽微陰澀而長者為欲愈太陰病脈浮者可發汗宜桂枝湯三陰經亦有傷寒中風陽症脈長有外傳陽明之診故欲愈若太陰病脈浮則外傳太陽故可發汗宜桂枝湯少陰病身體痛手足寒骨節痛脈沉者附子湯此少陰經陰症身痛也故用附子湯下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯此條厥陰經里有寒而下利表有邪而身痛也裡氣虛寒風寒得入而身疼痛故先溫其里後攻其表麻黃湯羌活湯桂枝湯三方見惡寒加減法俱詳惡寒加減防風湯防風荊芥羌活獨活川芎甘草生薑芍藥大棗此方家祕治三時太陽經身痛頭痛風濕等症桂枝人參芍藥湯桂枝人參白芍藥生薑甘草大棗此方治裡氣虛寒發汗後身仍痛邪仍在脈沉遲不可再發汗故以小建中湯加人參扶元氣以逐表邪黃耆建中湯白芍藥甘草桂枝黃耆此方治表虛身痛誤汗亡陽者也前以裡氣虛不能逐邪外解而痛故用建中湯加人參此以表氣虛不能衛外而痛故用建中湯加黃耆一以人參桂枝同建功於內逐邪於外一以黃耆桂枝同實表於外固密衛陽四逆湯附子乾薑廣皮甘草陰症身痛四肢厥冷以此方溫里加廣皮則陽氣愈和理中湯見漱水不咽陰症身痛皆由中氣虛寒用理中湯則陽氣周流表裡通達犀角地黃湯生犀角山梔生地赤芍藥當歸尾澤蘭葉荊芥楂肉牡丹皮紅花熱邪不得外發瘀熱伏結血分故發熱面目皆黃遍身疼痛用此方清上焦之熱消上焦之血也桃仁承氣湯見蓄血人參白虎湯見潮熱羌活防風湯見發黃防風神術湯見頭痛石膏神術湯石膏熟蒼朮甘草此濕溫身痛之方上部痛加防風荊芥白芷川芎下部痛加防己秦艽黃柏大青龍湯見煩躁平胃發表湯家祕治寒熱胸滿無汗症羌活柴胡乾葛枳朴半夏廣皮理肺發表湯家祕治寒熱喘咳無汗症羌活柴胡乾葛枳殼桔梗桑皮上二方家祕一以治胃主肌肉胃家凝結胃陽不得敷布作汗散邪一以治肺主皮毛肺受外邪皮毛閉塞不得作汗此二條不獨治身痛凡系散邪妙訣足冷腰痛加獨活夜間熱加升麻汗少加防風頭痛傷寒頭痛常痛不休不比內傷頭痛時作時止故傷寒頭痛發熱三陽經者多然三陽中惟太陽經更多故頭痛身痛惡寒發熱兩足常冷皆太陽表症也無汗脈浮緊北方冬月麻黃湯南方羌活敗毒散有汗脈浮緩北方冬月桂枝湯南方加減防風湯合川芎湯少陽經頭角痛痛引耳前後發熱無汗脈浮緊柴胡防風湯脈弦而數寒熱往來合目自汗嘔而口苦小柴胡湯通加川芎入膽上行頭角陽明經額前痛痛連眼眶脈洪而長發熱無汗者葛根湯加蔥白白芷升麻有汗發熱脈洪而數煩渴引水白虎湯加葛根白芷若手足濈濈多汗大便不行臍腹脹滿雖有頭痛之表症亦用大幹葛湯下之又有頭痛鼻塞咳嗽喘急每夜寒熱此風寒入肺即傷風頭痛也宜芎蘇瀉白散若無汗惡寒脈浮緊加羌活又有風溫頭痛宜防風散加石膏乾葛濕溫頭痛宜防風神術湯又有時常頭風痛者羌活選奇湯頑痰頭痛胸滿噁心者二陳湯加南星海石飲家頭痛胸脅脹滿噁心嘔吐平胃二陳湯導痰湯甚者控涎丹不愈再加瓜蒂散搐鼻出黃水又火痰頭痛梔連二陳湯加膽星又有陰火頭痛四物湯加黃柏知母另有陰症頭痛此直中陰經之寒症北方人有之江浙則少又有冒寒頭痛遇冷頭痛似陰症頭痛實非陰症寒痛皆是內有痰飲積熱外遇寒冷搏擊而痛也太陽之病脈浮頭項強痛而惡寒此合論太陽經表症必脈浮頭項強痛而惡寒宜發汗者太陽病頭痛發熱汗出惡風者桂枝湯主之太陽病頭痛發熱身疼腰痛骨節疼痛無汗而喘者麻黃湯主之此分論太陽病中風傷寒二症各立方以主治也太陽病頭痛至七日以上自愈者以行其經盡故也若欲再傳經者針足陽明使經不傳針陽明刺腕骨余骨合谷三穴也言太陽病頭痛發熱之症若七日以上行其經盡自愈者則已若不愈針此三穴使不傳經傷寒不大便六七日頭痛有熱者與小承氣湯其小便清者知不在裡仍在表也須當發汗若頭痛者必衄宜桂枝湯不大便六七日有裡熱即頭痛亦宜小承氣湯下之但驗其小便若不赤邪熱未入里須當發汗故宜用桂枝湯若服後頭仍痛者此熱邪得桂枝之熱侵入陽明必迫血從鼻而衄矣宜桂枝湯句應在須當發汗句之下太陽中風下利嘔逆表散者乃可攻之其人漐漐汗出發作有時頭痛心下硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之此條詳注嘔吐門陽明病表裡大熱煩渴引飲頭痛如破者宜竹葉石膏湯陽明表裡之症當用乾葛石膏湯今因煩渴引飲頭痛如破此火熱上衝猛烈故用竹葉石膏湯陽明頭痛不惡寒反惡熱大便實宜調胃承氣湯不惡寒反惡熱大便實陽明裡熱症也不用大承氣者微示頭痛症不可大下也傷寒脈弦細頭痛發熱者屬少陽不可發汗汗之則譫語此屬胃胃和則愈不和則煩而悸頭痛發熱是太陽症今脈弦而細屬少陽之脈故不可用麻黃湯誤汗厥陰頭痛乾嘔吐涎沫吳茱萸湯主之此厥陰經陰症頭痛也麻黃湯見惡寒羌活沖和湯見發熱桂枝湯見惡寒加減防風湯見身痛川芎湯川芎蒼朮羌活防風荊芥甘草此治太陽經風濕頭痛方也兼寒者加細辛陽明見症加白芷少陽見症加柴胡有火者加黃芩即合選奇湯柴胡防風湯即小柴胡湯加防風此治少陽風邪頭痛之方小柴胡湯加減詳寒熱門二白乾葛湯蔥白白芷乾葛升麻此陽明表邪頭痛之方症兼太陽者加羌活防風川芎症兼少陽者加柴胡川芎胸前嘔惡合二陳平胃散有火者加梔連白虎葛根湯知母石膏葛根白芷此陽明裡熱頭痛之方若帶太陽表邪加羌活防風症兼少陽加柴胡川芎小便黃赤加木通滑石大便不通有下症者加酒煮大黃大葛根湯乾葛石膏枳殼大黃廣皮甘草知母此治陽明表邪未盡大便祕結積熱上衝頭痛之方若帶惡寒表熱症兼太陽者即不可用芎蘇瀉白散川芎紫蘇防風桑白皮地骨皮荊芥甘草此治風傷肺氣咳嗽寒熱頭痛之方若症兼太陽加羌活兼陽明加乾葛白芷兼少陽加柴胡防風散防風桔梗厚朴甘草石膏乾葛此治肺胃二經風熱上衝頭痛之方防風散風石膏清熱與桔梗同用清肺也與乾葛同用清胃也厚朴甘草和胃氣以升降浮沉也兼少陽者加柴胡川芎薄荷荊芥防風神術湯防風蒼朮甘草石膏此治風濕熱三氣頭痛之方風氣勝者倍防風加羌活濕氣勝者倍蒼朮加白芷熱氣勝者倍石膏加黃柏太陽見症加藁本陽明見症加升麻少陽見症加柴胡通加川芎少許上行頭角羌活選奇湯羌活防風黃芩甘草此治太陽風熱頭痛之方若少陽見症加柴胡川芎陽明見症加升麻白芷風熱甚加薄荷荊芥藁本里有積熱加梔連若時常痛發俗名頭風痛者加蔓荊子藁本冒寒即痛加細辛川芎星石二陳湯即二陳湯加膽星石菖蒲此治痰飲凝結中脘上衝頭額時常作痛之方兼風者加防風荊芥兼火者加梔連兼寒者加細辛川芎發熱惡寒加羌活頭額作痛痛連於目加乾葛白芷升麻往來寒熱痛連頭角下連耳之前後加柴胡川芎平胃二陳湯即二陳湯和平胃散時常頭痛俗名頭風痛本於內伏痰積外冒風寒是以頭痛之症若兼噁心飽悶者必痰積作患余嘗以此方合保和散重加豆蔻石菖蒲萊蔔子除去在胃之病根則痛不發導痰湯見似瘧頭痛症兼嘔吐噁心者則以此方治痰飲若外冒寒者加羌活細辛蔓荊子川芎藁本冒風者加防風荊芥冒暑熱者加黃連滑石冒風濕者加防風蒼朮白芷石菖蒲控涎丹甘遂大戟白芥子痰飲伏於脅下作痛名懸飲支飲用十棗湯痰伏胃家上攻頭額作痛則用控涎丹同用甘遂大戟彼以芫花易白芥子此以白芥子易芫花同一痰飲病一痛於脅一痛於頭故有上散下行之不同二陳梔連膽星湯即二陳湯加梔連膽星上條皆是痰飲此乃痰火上衝若外有感冒加散表之藥先去外邪四物知柏湯即四物湯加知母黃柏此方本治內傷陰火內沖頭痛立此互考相得益彰十棗湯見脅痛竹葉石膏湯見口渴調胃承氣湯見大便結外感頭痛禁用下行今以陽明頭痛不惡寒反惡熱大便實故以此方微下之項強項強症有傷寒痙病之別欲論傷寒項強必以痙病項強互相發明始得詳悉如傷寒總論項強曰太陽之為病脈浮頭項強痛而惡寒其分論項強曰太陽病發熱項強汗出脈緩者為中風太陽病頭痛項強發熱身疼腰痛惡寒無汗脈浮緊為傷寒金匱痙病總論項強曰太陽病身體強𠘧𠘧然脈反沉遲身雖熱手足冷頸項強急獨搖頭卒口噤背反張名痙病其分論痙病曰太陽病發熱無汗頭項強反惡寒名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙詳其經絡傷寒項強屬三陽表症痙病項強則有三陽三陰表裡各條此症之分別也詳其脈象傷寒門則曰脈浮而緊脈浮而緩痙病門則曰脈沉細脈沉遲此脈之分別也詳其治法傷寒門仲景以太陽病項背強𠘧𠘧無汗惡寒脈浮緊冬月麻黃加乾葛湯餘三時陶氏推廣防風羌活湯今余改用羌活加干根湯以表藥而治無汗之傷寒項強若太陽病項背強𠘧𠘧反汗出惡風脈浮緩冬月桂枝加乾葛湯陶氏推廣加減沖和湯今余改用防風加葛根湯以風藥而治有汗之中風項強其在陽明目痛鼻乾不眠調脈乾葛湯主之其在少陽身熱惡風寒頭項強胸脅滿羌活防風柴胡湯主之風溫項強防風石膏湯風濕項強蒼防湯濕溫項強神術湯以上言傷寒項強各條治法之分別也至論痙病項強金匱則曰病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也若發其汗者寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇傷寒項強身熱足寒又見惡寒者用麻黃湯主治今痙病項強目赤口噤背反張血液干竭筋失所養脈細之症又不可誤用麻黃湯故下文云太陽病其症備身體強𠘧𠘧然確似太陽傷寒症若脈不浮緊急大即非傷寒而不可用麻黃若脈反沉遲此是痙病當用栝蔞桂枝湯主之下文又云太陽病若無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之夫太陽無汗之項強本是麻黃湯發汗症以其氣上衝胸口噤不得語又是陽明之症故以葛根湯雙解太陽陽明兩經之邪若失用葛根清解陽明表邪即用寒涼清裡則口噤不語之後又變介齒是此可見痙病無汗亦有可汗者但因其脈沉遲難用麻黃髮汗耳然痙病項強亦有當下者故下文又云痙為病胸滿口噤臥不著席腳攣急必介齒可以大承氣湯此言痙病若表邪盡解惟存胸滿口噤臥不著席腳攣急介齒一派裡熱內結亦可與大承氣按此則金匱一立栝蔞桂枝湯和營衛清痰滌熱而為解肌和解之方一立葛根湯散陽明太陽在表之邪而為無汗剛痙發表之方一立承氣湯以清陽明表解裡熱有汗柔痙攻下之方如是則汗下和解三法全矣此言痙病項強各條治法之分別也余以痙病項強參以傷寒項強則明項強症應從太陽表邪主治而有發汗法門今以傷寒項強參以痙病項強則明項強症亦有陽明裡邪主治而有承氣下行法門考之雜症門頸項強痛不能回顧右脈數大有用二陳湯加羌活黃芩而治者今余推廣項強而兼胸滿口噤介齒不語等症亦有痰凝食滯脈滑有力可用二陳導痰湯平胃保和散而治者以口噤介齒中焦凝滯寒涼抑遏者不少再考內經分十二經俞穴立刺法主治則知各經皆有項強之症原非太陽陽明表邪裡熱二條可盡者太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯曰太陽不曰陽明然加葛根兼陽明不待言矣不曰風傷衛然用桂枝葛根湯則風傷衛之症明矣太陽病項背強𠘧𠘧無汗惡寒者麻黃加葛根湯不曰寒傷營然用麻黃葛根湯其為寒傷營亦明矣服桂枝湯後或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白朮湯頭項強痛翕翕發熱服桂枝湯當汗出熱減今仍頭項強痛發熱無汗心下滿痛小便不利乃是水飲內結故以此方治之傷寒四五日身熱惡風頭項強脅下滿手足溫而渴者小柴胡湯傷寒四五日少陽時也身熱項強脅下滿少陽症也手足溫而渴故以此方清少陽之表裡結胸者項亦強如柔痙之狀下之則和大陷胸丸言結胸者項亦強是結胸又兼項強等症言如柔痙之狀則有汗出而無表邪故用大陷胸丸太陽與少陽並病頭項強痛或弦冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞不可汗汗則譫語脈弦五六日譫語不止刺期門頭項強痛太陽症也眩冒如結胸心下痞硬少陽支結症也故曰太陽與少陽並病刺肺俞則泄太陽之病刺肝俞則泄少陽之邪太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞慎不可下之上條少陽症多故刺肺俞肝俞此條太陽症多故但刺肺俞以泄太陽上條少陽症多故禁汗此條太陽症多故禁下麻黃加葛根湯葛根麻黃桂枝甘草芍藥生薑大棗此仲景治太陽症項背強𠘧𠘧無汗之方加葛根者以頸項三陽交會陽明亦所主者然辛溫太過三時熱令化立辛涼解表方法桂枝加葛根湯桂枝葛根芍藥甘草生薑大棗此仲景治太陽病項背強𠘧𠘧有汗之方按二方俱加葛根則項背強太陽與陽明症矣若熱令南方用羌防易桂枝防風羌活湯羌活防風荊芥柴胡乾葛甘草陶氏以此方代仲景太陽病項背強𠘧𠘧無汗惡寒之麻黃乾葛湯者冬令加生薑夏令加石膏里有積熱加川連胸前飽悶加枳殼厚朴羌活加葛根湯羌活葛根防風荊芥柴胡前胡川芎廣皮甘草太陽項背強𠘧𠘧無汗惡寒仲景用麻黃葛根湯陶氏用防風羌活湯今余以此湯治南方熱令積熱之人外冒表邪之症加減沖和湯防風羌活黃芩石膏廣皮甘草此方陶氏治太陽項背強𠘧𠘧汗出反惡風者前條以無汗惡寒故不加涼藥此條因有汗項強故用黃芩石膏然再加葛根不失仲景本意防風加葛根湯防風乾葛甘草黃芩山梔廣皮仲景有汗項強以桂枝加葛根湯治之今余以防風易去桂枝加入葛根更名防風葛根湯惡寒身痛者加羌活獨活時寒時熱加柴胡頭痛加川芎濕勝身重者加蒼朮白芷汗多者加白芍藥羌活防風柴胡湯羌活防風柴胡黃芩甘草廣皮半夏此方即以柴胡湯加羌活防風治太陽少陽兩經表邪項強者也然熱令宜加知母石膏寒令宜加生薑蘇葉防風石膏湯防風石膏乾葛白芷風溫之症多有項強故以防風散風石膏治溫然此治陽明者症兼太陽加羌活兼少陽加柴胡蒼防湯蒼朮防風白芷川芎項強症風濕居多故用燥濕散風若兼熱者加石膏黃芩兼太陽表症加羌活少陽寒熱加柴胡神術湯蒼朮石膏防風乾葛濕熱見風則發項強故以蒼朮防葛散風勝濕然此皆治陽明若症兼太陽少陽加羌活柴胡栝蔞桂枝湯栝蔞根桂枝甘草白芍藥生薑大棗痰結中脘亦發項強之症此即小建中湯加栝蔞根助中州化痰涎痰多嘔逆加半夏廣皮胸前凝滯加砂仁以中氣虛不能運化必宜建中滌痰耳調脈葛根湯葛根前胡防風甘草此治陽明表邪項強之症若太陽見症加羌活少陽見症加柴胡里有積熱唇焦口渴加知母石膏大承氣湯見大便結二陳導痰湯即二陳湯導痰湯同煎項背強直之症多以痰飲主治蓋中焦凝滯則心胸頭背頸項強直以陽明主乎項故此方滌痰化滯清理陽明之裡平胃保和散即平胃散保和丸同研中焦食滯每多項背強直不得臥下之症故用此方二陳羌芩湯即二陳湯加羌活黃芩內有痰飲熱結外冒風熱以致項背強直用此方咽痛傷寒論太陽陽明咽痛各一症悉屬陽症也少陰咽痛者六陽熱者四陰寒者二少陰陽熱者四治以豬膚湯甘草湯桔梗湯半夏散少陰陰寒者二治以桂枝幹薑湯真武湯四逆湯另厥陰咽痛者一亦陽症也治以桔梗湯夫咽痛皆是陽熱今少陰經內有二症屬寒者何也其一以汗多亡陽其一以陰盛格陽成氏云甘草湯主少陰熱壅咽痛者桔梗湯主少陰寒熱相搏咽痛者半夏散主少陰客寒挾痰咽痛者活人云以半夏桂枝甘草湯治伏氣之病謂非時之暴寒伏於少陰日久乃發先見咽痛惡寒宛似傷寒但脈不緊盛反微弱且見下利俗名腎傷寒治以半夏桂枝甘草湯次用四逆湯吳氏云凡陰症咽喉不利故用以上諸法若陽症咽喉痛用甘露飲玄參湯戴人云有初得病無陽毒陰毒等症而咽喉自痛此因感冒後頓用厚衣擁蓋或食生薑熱酒即臥致是此名因寒傷熱咽痛宜用涼膈散甘露飲治之又有先傷於熱欲取涼快乃為外寒所束此名因熱冒寒咽痛切不可驟用寒涼宜用甘桔湯雙解散等按三陽里症有咽痛表症咽痛者少以里未鬱熱故耳然太陽症有表寒外束裡熱亦有咽痛若少陽里有鬱熱外冒表邪亦有咽痛者更有陽明胃有積熱太陰肺有積熱外冒表邪皆有咽痛者故三陽表症亦有咽痛之症以法論之若無汗惡寒脈浮緊者太陽表症為重宜先散表羌活沖和湯重加甘桔俟汗出表解然後清熱切不可早用寒涼抑遏表邪陽明裡熱者有用清胃湯加甘桔少陽裡熱者方可用柴胡清肝飲太陰肺素有熱涼膈散若帶表邪仍用散表之藥咽痛甚者刺少商穴稍見血出即愈咽痛喉邊腫起一塊以針刺腫處出血則愈如喉一片皆腫難以遍刺者以冰硼爐甘石研細吹痛處時以薄荷湯漱口家祕荊防甘桔湯荊芥防風甘草桔梗薄荷大力子惡寒身痛加羌活腰痛足冷加獨活潮熱加升麻柴胡古方升麻玄參湯和解陽明咽痛者加羌柴兼太陽少陽治之矣三陽咽痛皆熱邪然用寒涼反劇以其舊有故熱在裡新受暴寒外束家祕多衝蘿蔔汁取其甘寒善散耳太陽病下之脈緊者必咽喉痛半夏湯太陽病應散表反誤下不成結胸但見脈緊此太陽表寒未散內薄咽喉而必痛故用半夏桂枝湯散太陽表寒此因誤用寒下抑遏故用辛散非陽經咽痛概可慢用陽明病但頭眩不惡寒能食而咳其人必咽痛若不咳則咽不痛此申明陽經咽痛多因火熱上衝不同寒邪抑遏妄用辛溫從治少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之其脈即出者愈此申明裡真寒外假熱咽中痛虛陽上浮也少陰病下利咽痛胸滿心煩者豬膚湯主之少陰下利陰寒者多今咽痛胸滿心煩則是陽火故用豬膚潤燥少陰病二三日咽痛者可與甘草湯不瘥與桔梗湯此少陰熱邪咽痛也以甘草湯設不瘥再與桔梗湯以開提肺邪少陰病咽中痛半夏散及湯主之少陰病咽中生瘡不能語言聲不出者苦酒湯咽痛之症可用半夏散及湯治之若咽中痛而生瘡直至聲音不出則桂枝有礙熱邪故以苦酒半夏雞子白潤燥溫散所伏之寒邪傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者喉不痹傷寒先厥後發熱下利必自止反汗出則是裡熱太過故咽中痛喉中痹發熱無汗而利必自止仍不止則邪熱內攻腸胃故便膿血既便膿血熱邪不上衝而喉不痹半夏湯半夏桂枝甘草此方本為太陽表有寒邪應散表誤下寒邪伏於咽喉結聚痰涎而作痛故用辛溫散解非概治陽經咽痛也通脈四逆湯乾薑附子甘草蔥白咽中作痛要分三條表邪不散宜散表積熱上衝而痛宜辛涼虛陽上浮家祕用此方加涼藥少許恐有拒格之患耳豬膚湯豬皮一斤去毛去肉水煎去渣加白粉白蜜少許煎服少陰咽痛以腎水不足水中火發土刑肺金豬膚系北方水畜水能制火皮能潤肺後人宗此化黑驢皮用阿井水煎膏以治咳嗽嗽血家祕用龜版性同豬皮刮淨煎膏補腎水潤肺燥取補北方制南方則西方不受火制甘草湯甘草二兩水煎千金方治肺癰傷寒論治咽痛同用甘草一味以咽痛肺癰肺受火刑耳仲景心下痞滿以甘草黃連同用取其直折心火後以甘草生地木通同用導去心經之火後人又以二方合用而瀉火全矣然不用於咽痛不可驟用苦寒耳前方用豬膚湯壯北方腎水以制龍雷之火克肺也此方用甘草一味者瀉南方之心火克肺也桔梗湯桔梗一兩甘草一兩原文云少陰病二三日咽痛者可與甘草湯若不瘥與桔梗湯按甘草瀉心火服之痛不愈此火邪結住肺中不得外解故以桔梗開發肺氣同甘草瀉出肺中伏火因此悟得欲清肺中邪結必要開肺清肺二味同用則肺中之邪始出余化此方法加防風於瀉白散中以解肺風加石膏於瀉白散中以瀉肺火本宗於此半夏散即半夏桂枝甘草湯半夏桂枝甘草前條客寒傷於太陽失汗誤下寒邪內結咽喉而痛者以半夏湯蕩之今以客寒伏於少陰伏氣腎傷寒咽痛又以此湯更為半夏散以散之可知太陽之邪結在淺少陰之邪伏於深矣苦酒湯苦酒半夏雞子白仲景以半夏湯治太陽表邪內伏作痛咽喉又以半夏散治少陰伏氣咽痛今以少陰咽中生瘡不能語言者又以苦酒湯治之夫寒邪挾痰伏於咽喉而痛可用半夏以散痰桂枝以散邪若熱痰攻咽成瘡而聲音不出則不可妄用辛溫故去桂枝易以苦酒雞子白溫散潤燥治之甘露飲知母麥冬連翹薄荷桔梗黃芩玄參滑石石膏甘草咽喉之症客寒內伏仲景立辛散之方以戒苦寒直折余今又不得不補贅苦寒之方以治三陽熱毒上衝非違背前賢實相需互備也玄參湯玄參山梔麥冬天花粉桔梗知母薄荷甘草黃芩此方清肺潤燥治實火咽痛陽明有熱加升麻石膏即合玄參升麻湯少陽有熱加柴胡膽星外冒風邪加防風荊芥涼膈散連翹桔梗山梔黃芩天花粉知母薄荷甘草玄參此通治三陽上焦咽痛之方症兼陽明加升麻乾葛兼少陽加柴胡若外感風寒發熱加防風荊芥甘桔湯詳前雙解散柴胡乾葛荊芥薄荷黃芩玄參石膏知母甘草桔梗防風此治陽明少陽先傷積熱又冒表邪鬱於上焦咽喉作痛羌活沖和湯羌活防風荊芥白芷黃芩蒼朮生地廣皮甘草此治太陽發熱咽痛無汗脈浮者症有燥熱去白芷蒼朮加入玄參升麻清胃湯升麻生地丹皮山梔甘草黃連陽明有熱肺受火制故以此湯清胃治本家祕治咽喉作痛各有分別語言即痛清肺為急咽物即痛清胃為先柴胡清肝飲柴胡黃芩山梔青皮荊芥甘草內經云一陰一陽結為喉痹少陽之火恆結喉旁故家祕治咽喉腫痛多有兼治少陽者
