body:
  text: 總論傷寒熱病總論黃帝曰今夫熱病者皆傷寒之類也岐伯曰人之傷於寒也則為熱病巨陽受之頭項痛腰背強陽明受之身熱目疼鼻乾不得臥少陽受之胸痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已此言三陽經表症未入於裡故可發汗而已者又曰太陰受之腹滿而咽乾少陰受之口燥舌乾而渴厥陰受之煩滿而囊縮三陰三陽五臟六腑皆受病營衛不行臟腑不通則死矣此言陽邪傳入三陰經而不愈者又曰未滿三日可汗之其滿三日者可泄之言未滿三日者非拘日數言表症在前也言滿三日者亦不拘日數言里症在後也按此乃是傷寒傳經之陽症非言寒中三陰不發熱之純陰症也仲景於是補內經之缺作傷寒論闡發寒邪能傷陽經而為傳經熱病豈寒邪反不能傷陰經而為直中陰經之陰症乎於是詳列六經其各條下注明證形脈治分別某者為表某者為里某者為傳經之熱病某者為直中陰經之寒病而同以傷寒論命名故將冬月及令之正傷寒立論而主發表用麻黃湯桂枝湯攻裡用三乙承氣湯其表裡兼見之症用小柴胡湯雙解和解惟有冬月正傷寒治法而不及春夏秋三時之症然其中默示據寒悟熱據冬悟夏據長沙之地以悟南方其發表攻裡各因其症寒熱溫涼各隨其時察老少辨強弱分別方宜比例推詳以冬月傷寒未始不可廣推春溫夏熱之症不明此旨者因見傷寒論以陰症陽症同卷遂以陰症陽症混而施治即明識陰陽者又以仲景冬月北方之麻黃桂枝湯妄治春夏秋三時南方之人以致熱病誤用溫熱變症百出或以表邪不散邪汗未出煩躁不寧誤認裡熱煩躁反用寒涼遂至表邪不出幸陶節庵王宇泰發明仲景陰症陽症各是一條然於傷寒論原注中差誤諸條尚未改注明白又於麻黃桂枝湯下不詳注此方乃是治河北長沙等處者江浙地方即冬月亦宜詳審又不注明直中陰經之寒症惟北方冬月有之江浙東南患此絶少今東南所患之病皆是早晚感冒風露鬱而發熱無汗惡寒此乃是非時暴感之傷寒從外而得未有裡熱之寒熱病也故用敗毒散羌活防風湯辛溫散表不宜驟用苦寒另有積熱在內外被寒邪所束新寒而凝故熱遂發有表復有里之症是以外見發熱汗出內兼喘嘔作渴者在春謂之風溫夏秋謂之暑熱此乃是熱令時靜而得之有表邪之中暑寒熱病也宜用雙解散羌活沖和湯等散表清熱兼有食滯中焦用保和平胃散消食和胃又有積熱在內不冒寒邪外束並無惡寒身痛頭痛腰痛足冷拘緊不能轉側之表症但見唇焦口渴煩躁引飲多汗惡熱譫語便閉裡熱之證此乃是熱令時動而得之無表邪之中熱疸熱病也宜用白虎湯涼膈散三黃巨勝湯導赤各半湯有下症者三乙承氣湯明此三條則治表邪之熱病治里邪之熱病治有表邪復有里邪之熱病井井不亂矣驗舌色論傷寒表裡輕重驗舌色亦得大半杜青碧有三十六法反覺太繁今余分立白苔黑苔黃苔燥苔滑苔五者以為要舌色如常身雖大熱是表熱里未有熱也但治其表如見白苔而滑邪在半表半裡未入於裡也但宜和解若見黃苔者熱在胃家苔黃而乾裂者熱已入里宜清裡熱若有下症者可以下之若見黑苔者有二條分別黑而焦裂硬刺者裡熱已極火極似炭之苔也黑而有水軟潤而滑者裡寒已甚水來剋火之寒苔也以上五者驗舌之大節目也然仍要看症切脈以參定之如舌上黑苔燥裂有刺此裡熱無疑矣然或身痛或足冷或無汗或脈浮或脈伏仍從表症治之雖不可用辛溫之藥必宜辛涼散表然後清裡若過用清熱則表汗不出表邪不解又如舌上生苔口渴不能消水脈浮大不數服清熱之藥反加譫妄神昏此症多見不治以舌苔主裡熱渴宜消水脈宜沉數數症脈相反故耳然余以渴不消水脈滑不數擬以食滯用消導治之亦有生者自此則知表邪夾食之症亦有舌苔生刺者也大凡察病人之舌沿邊缺陷如鋸齒口者此不治之症也驗口唇論傷寒驗口中乾濕可以定其症之表裡輕重然驗口更當驗唇口唇關手足陽明腸胃二經又關手足太陰脾肺二臟故驗唇色紅潤里未有熱但宜辛溫散表唇色乾枯里已有熱宜清裡唇色焦黑煩渴消水裡熱已極當用涼膈散等又有譫語發狂唇色乾焦服寒涼而熱不減此食滯中焦胃中蘊蓄發黃發熱是以用涼藥則食滯不消用辛散則礙裡熱宜以保和散沖竹瀝蘆卜汁或梔子豆豉湯加陳枳實治之上唇屬肺與大腸上唇焦而消渴飲水熱在上主肺上唇焦而不消渴飲水熱在下主大腸有燥糞下唇屬脾與胃下唇焦而消渴飲水熱在陽明胃下唇焦而不消渴飲水熱在太陰脾余今發明裡熱唇焦食滯唇焦積熱伏於血分而唇焦惟以渴不渴消水不消水分別然食滯唇焦又有食滯已久蒸釀發熱亦能作渴消水又當參脈象若何脈若滑大不數食未蒸熱口亦不渴若滑大沉數食已發熱口亦作渴故凡譫語發狂脈滑不數渴不消水者亦以食滯治之若以寒涼抑遏則譫語發狂愈甚甚則口噤不語也驗二便論醫者欲知病人臟腑必要問其從內走出者故凡病當驗二便仲景以小便不利小便赤定傷寒裡熱以小便利小便白定里無熱以大便不通大便硬定其裡熱自下利下利厥冷定其裡寒故治病以二便定人寒熱以二便定人燥濕以二便定人虛實再無差誤然論二便亦宜細詳例如大便乾結知其熱矣然大便滑泄黃色為熱人多忽之矣小便黃赤知其熱矣然小便色白而混濁亦為熱人多忽之矣又如大便乾結知其熱矣亦有血枯津竭用不得苦寒者又如小便黃赤知其熱矣亦有食滯中焦黃赤混濁用寒涼反不清用香燥辛溫而清利者辨脈論傷寒症有表裡陰陽四大關節脈有浮沉遲數四大分別夫浮則為表沉則為里遲則為寒數則為熱此以浮沉分表裡遲數分寒熱者也夫傷寒熱病也其脈必數中寒陰症也其脈必遲若見數脈即症在陰經亦是陽邪傳入之熱病若見數脈即手足厥冷亦是熱深厥深陽症似陰之假像故治傷寒一見浮數此是表有邪熱當照三陽發表治之若一見沉數此是里有熱邪即表症急者雖先治表然亦禁辛溫而用辛涼雙解之法苟表症一解即當清裡此以脈之發現二條而論也若沉伏之脈有三條分別有陽症脈沉伏非陰症裡寒也陽邪內伏不得作汗外出禁用寒涼只宜升散表邪則汗出而脈亦出又有陽症脈微此正氣虛微不得作汗用發表之藥以散陽邪加人參少許助正氣虛微則散表之藥得人參愈能散表雖陽症陰脈之死症如此治之亦有得生者又有臟氣虛寒脈見沉遲此陰症中寒也急宜溫經救里此以沉脈中別出伏邪正虛陰寒三條者也夫陰症脈沉者沉而遲漫分明者也伏邪脈沉者沉而伏匿急數模糊者也正虛脈微者不拘浮沉脈來衰微按久無力者也故凡遲漫分明者裡寒也沉伏不出者表邪不得發越也陽症脈微者邪盛正虛也今有陽邪之症而見沉伏之脈誤認陰症而用溫熱陽邪內發死不旋踵若見煩躁不寧誤用寒涼則表汗抑遏故切脈之道先分症是何症然後以脈消息者也夫脈沉當下若表症急者仍先散表脈浮當汗若里有熱者又不得不和解表裡下症急者又不得不雙解表裡南北方宜發表不同論仲景以太陽冬月司令之傷寒酌以麻黃湯治寒邪傷營無汗發熱之表症以桂枝湯治風邪傷衛有汗發熱之表症然此按北方方宜分經絡立規矩為後世指南者也施治三時施之江浙則不合賴陶氏發明仲景麻黃桂枝二湯此治冬月正傷寒之方非治春夏秋三時之熱病易以羌活沖和湯實為至當但失注麻桂二湯乃是北方治法江浙東南即冬月亦不宜用即或內無積熱偶冒暴寒未經鬱熱者暫亦用之然不可為常法如此分別後人判然不以仲景麻黃桂枝藉口然羌活沖和湯解表清裡和解三陽之方但可治三時表裡兼見之症若純是表邪外束則生地黃芩原非發散寒邪之藥今余以羌活敗毒散發散三時太陽純表之症以羌活沖和湯和解太陽表裡俱見之症次以葛根湯以治陽明純表之症以乾葛石膏湯為陽明和解之方再以柴葛解肌湯治少陽陽明表裡居多之症又以小柴胡湯為少陽和解之方如此雖變仲景之方以合江浙方宜實遵仲景之旨也南北方宜清裡相同論仲景清裡方法以里有結熱即當清裡故立五苓散以清太陽裡熱立白虎湯以清陽明裡熱立黃芩湯以清少陽裡熱若熱結大腸下症悉具者有承氣湯以下之又有三黃湯涼膈散導赤各半湯黃連瀉心湯通治三焦裡熱之症蓋因裡熱煎熬津液有立盡之勢故清之以存津液然則清裡之法不特南方應如此夏秋應如此即冬月即北方亦如此者陶氏云發表之藥三時不得與冬月正傷寒同治為清裡可與冬月正傷寒同治陶氏分別時令今余更分南北方宜夫北方寒涼之地又加之冬月傷寒時令方宜皆宜辛溫散表故立桂枝麻黃主治若南離已午之地發表之藥不與北方同治惟清裡之藥南北可同者三陰經熱病論三陽經有陽症無陰症三陰經有陰症有虛症人多知之三陰經陽症則有不知者仲景深恐後人惑此故詳注從陽經先發熱後傳至三陰者乃是傳經之熱病名曰傷寒此即內經所謂熱病之條若初起不發熱乃是直中陰經之寒病名曰陰症後人因見陰症陽症同在篇中認誤熱病傳入三陰亦是陰症又誤認初起雖有熱病今日久手足皆冷六脈沉細已變陰病不知初起發熱已是熱病根源或失於散表而表邪內陷或失於清裡而裡熱內伏傳入陰經而手足反冷經雖屬陰症則陽症此乃是陰經熱病非變陰症例如太陰病手足自溫當發身黃者少陰病但厥無汗少陰病心中煩不得臥者少陰病下利咽痛心煩者少陰病下利六七日心煩不得眠者少陰病自利清水心下必痛者厥陰病下利脈數而渴者厥陰下利脈數有微熱者厥陰下利欲飲水者厥陰嘔而發熱下利譫語者凡此乃是陰經之熱病多用承氣湯主治者夫熱既傳於陰經則熱深厥亦深身反無熱脈反沉細不知手足厥冷原能舉動不比陰寒厥冷手足冷而不得動移者身雖不熱唇口必乾而焦不比陰症之口中和而有水者脈沉細重按必細而帶數不比陰寒之脈沉細而遲者更有大分別者三陰寒病神志清爽三陰熱病神識昏迷三陰寒病即口乾不能飲水三陰熱病口乾必然消水三陰寒病二便清利三陰熱病二便赤澀一陰一陽天壞各別者也三陰經寒病論仲景深慮三陰經有傷寒傳入之熱病有直中三陰之寒病二條關係甚大故作傷寒論注明如是者乃傳經之熱病如是者乃直中陰經之寒病並立篇中互相發明相得益彰奈後人見同在篇中不究何者為陰何者為陽不知傷寒熱症不獨北方南方亦有中寒之症惟北方有之南方甚少故仲景以不發熱神氣清小便白六脈遲口中和不消水定為三陰寒症再無差誤也例如自利不渴者屬太陰以其臟有寒故也當溫之宜四逆湯輩少陰病下利脈微與白通湯者下利清穀裡寒外熱手足厥逆者厥陰病手足厥寒脈細欲絶者下利手足厥冷無脈者俱用四逆湯凡此皆三陰寒症也陰症似陽論陰症者不從陽經傳入寒邪直中三陰之症也夫陰症而見陰象人人知之設陰症而反見陽熱之象人則惑之矣例如少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其面赤色或咽痛者厥陰傷寒六七日不下利便發熱而利者大汗出熱不去內拘急四肢疼者與夫陰極發燥欲坐泥水井中者凡此皆是陰症似陽之症然究其實則大有分別者也按下利清穀手足厥逆已是陰症且得脈微欲絶則陰症更有確據此之不惡寒面赤色乃是真陽外脫此之咽痛乃是虛陽上浮又按三陽合病下利初起即發熱而利今不發熱不下利即初起不發熱之互詞直至六七日後發熱下利則發熱乃真陽外越下利乃是真陰下竭矣再按陽邪之症若大汗出熱必去若大汗出不拘急四肢不疼今大汗出熱反不去反拘急四肢反痛則此之大汗出非表邪之汗乃是亡陽之汗此之熱不去非陽邪之熱乃是虛陽外脫之熱此之拘急身痛非表症之候乃是亡陽身痛之候矣陽症似陰論陽症者即內經傷寒之熱病也使陽症而見熱象人所易知陽症而反見陰寒之象則人惑之矣例如太陰病下利日十餘行必自止以脾家實穢腐當去故也少陰病四逆其人或咳或悸四逆散主之少陰病自利清水色純青而用大承氣湯者厥陰病手足厥冷用吐之者厥陰先發熱而發厥冷用四逆散者凡此皆是陽症似陰之症又如原病式云陰厥者元病脈候皆為陰症身涼不渴神志清爽脈遲而微未嘗見一些陽症者也陽厥者元病脈候皆為陽症忽爾厥冷煩渴昏沉脈雖細而沉數此是陽症似陰也宜發表論宜發表者邪在肌表鬱而發熱故用發汗散邪之法症在太陽者羌獨敗毒散煎湯連飲里有熱者羌活沖和湯此二方即以麻黃桂枝辛溫湯中化立辛涼散表以治南方傷寒發汗解肌之法症見陽明則從乾葛湯中去麻黃桂枝更名升麻乾葛湯平淡輕清之味惟少陽一症仍照小柴胡湯但以寒多者倍加羌活防風減黃芩治之若三陽俱見症者三經合參用藥故曰惡寒身痛者宜發表支節煩疼者宜發表頭痛項強者宜發表四肢常冷者宜發表四肢拘緊不能轉側者宜發表面赤身熱兩足常冷或脈沉伏者宜發表時刻呻吟語言不足無汗煩躁者宜發表身體乍輕乍重轉側或難或易宜發表身痛乍在四肢乍在胸背到底無定者宜發表灑灑惡風皮膚大熱宜發表以上三陽經表邪之症故用發表之法忌發表論忌發表者表邪已解身汗已多無表症不必再用升提發散故曰手足多汗惡熱不惡寒者忌發表口渴唇焦熱而消水者忌發表口燥咽乾脈沉而數忌發表潮熱譫語舌赤生刺忌發表心腹脹滿二便赤澀忌發表又有汗出太過後反惡寒身痛脈大而空此是陽虛亡陽之症宜溫補真陽更忌發表若汗出太多津液消耗時或惡寒時或身痛脈細而數似表症實非表症此是陰虛生內熱宜養陰生津液亦忌發表又惡寒身痛頭痛項強脈沉而細此痙病血虛也忌發表宜清裡論表邪已解表汗已多熱邪傳裡里有結熱宜清裡故心煩多汗不得臥者宜用黃連阿膠湯惡熱多汗唇焦消水者宜人參白虎湯神志不清脈沉數大者宜陶氏導赤各半湯口渴舌刺潮熱便閉者宜涼膈散赤癍已透多汗煩熱者宜化癍湯腸胃熱結大便不通宜調胃承氣湯欲便而不得便時轉臭氣小腹脹滿下症悉具宜三乙承氣湯忌清裡論清裡之藥但能解裡熱不能解表熱故凡身熱無汗頭痛身痛忌清裡手足逆冷身熱脈伏忌清裡脈浮身熱忌清裡癍痧未透忌清裡口乾不渴渴不消水忌清裡二便清利里無熱結忌清裡舌苔而滑身熱足冷忌清裡身熱面赤表汗未徹忌清裡譫語狂言渴不消水嘔吐噁心脈滑不數痰食滯於中焦者忌清裡癍紫不化口反不渴脈反不數者陽明濕毒非血熱也忌清裡血蓄上焦漱水不咽者忌清裡脅痛乾嘔口反不渴水飲內停者忌清裡陰極發燥不能消水脈遲下利面赤戴陽者陰症也忌清裡宜和解論病在表則發汗病在裡則清下病在半表半裡則宜和解病有表復有里則宜和解和解之法視某經有某邪用某經發表藥一二味以散邪視某經有裡熱者用某經退熱之藥一二味以清裡和解表裡內外分消而病愈矣仲景以桂枝五苓散和解太陽里多表少之症越婢湯和解太陽表多里少之症乾葛湯和解陽明表多里少之症乾葛石膏湯和解陽明裡多表少之症小柴胡湯和解少陽半表半裡之症推而廣之二陽合病有表復有里者二味表藥以解表二味涼藥以清裡三陽合病有表復有里者三味以解表三味以清裡大凡和解之法散表清裡又加和中之藥助其胃氣和其表裡例如小柴胡湯和解少陽症以柴胡散表邪而治惡寒以黃芩清裡熱而治發熱再加人參甘草廣皮以和中氣而和解之義始彰和解之名始稱耳忌和解論忌和解者以和解之藥發表清裡雜合互用者也若表邪未散誤用和解內有一半寒藥恐表汗不出若熱邪在裡誤用和解內有一半辛散之藥裡熱不宜即遇一半表一半里之症仲景未嘗概以和解施治故曰表症急者先發其表後攻其里與夫里症悉具若有一些惡寒頭痛之症即當從太陽施治故仲景於太陽症中雖立和解之方而不明言和解惟少陽症中乃明言和解治法深恐太陽表症居多難於和解耳少陽經絡已具半表半裡故宜和解然亦必始太陽而後傳少陽乃可若初起即見少陽又兼太陽惡寒者即為太陽少陽症尚從太陽施治亦不從少陽和解方中惟加柴胡耳宜吐法論宜吐法者邪結中脘食填太倉痰飲內伏胸前作痛右關脈大或反沉或下部有脈上部無脈皆宜吐法故曰病在膈上病在胸中宜吐之食在上脘胸滿多痰宜吐之華他云傷寒三四日邪在胸中宜吐之凡吐用瓜蒂散或淡鹽湯或溫茶湯弱者用人參蘆然終不若家祕吐法欲散風只用防風一味欲散結只用枳殼一味欲解煩用山梔一味身痛用羌活一味頭痛用川芎一味煎湯溫服少頃即以鳥羽探吐不傷胃氣忌吐法論忌吐法者病不在上胸無凝滯不必吐之仲景云關上脈細以醫吐之過也太陽病吐之反不惡寒不欲近食者此醫吐之內煩也少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下故凡老弱虛人忌吐法久病虛弱忌吐法內傷本元忌吐法六脈空大忌吐法脈細無神忌吐法胃虛食少忌吐法時時眩冒忌吐法胎前産後忌吐法癰疽潰後金瘡失血忌吐法古人雖以汗吐下三法以治外感然吐下二法亦要小心者也宜溫經論仲景於三陰篇詳注溫經救里之法曰太陰自利不渴以其臟有寒故也當溫之少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之少陰病下利脈微者少陰病下利清穀裡寒外熱者通脈四逆湯少陰病脈沉者急溫之宜四逆湯少陰病飲食入口即吐若膈上有寒飲乾嘔者不可吐急溫之少陰病下利脈微澀嘔而汗出必數更衣反少者當溫之厥陰病手足厥寒脈細欲絶者當歸四逆湯主之又傷寒脈促手足厥逆者可灸之以上皆是三陰經中寒之陰症故宜溫經救里忌溫經論溫經一法但治直中陰經之中寒症仲景同論傷寒論者原以陰陽並立互相查考故同列一論正所以分別傷寒陽症中寒陰症也後人不達本意見同在傷寒論中將謂傷寒中亦有中寒者則誤甚矣故傷寒表邪發熱多惡寒絶似中寒忌溫經傷寒協熱下利洞泄水穀絶似寒利忌溫經傷寒熱深厥深四肢厥冷絶似陰症忌溫經傷寒陽邪脈伏絶似陰症脈伏忌溫經夏秋暑瀉身冷脈伏絶似裡寒忌溫經宜攻下論宜攻下者表汗已出表邪已解熱結在裡而有諸般下症者故仲景立諸承氣湯以下燥糞抵當湯桃仁湯以下瘀血大小陷胸湯以攻結胸諸瀉湯以攻痞滿然原分急下可下宜下微和胃氣俟之導法緩急輕重故曰身無大熱腹脹滿大便不通者宜攻下潮熱多汗大便硬欲大便不得大便時下臭氣者宜攻下口燥咽乾而渴大便不通手足濈濈汗出舌上微黃者宜攻下以上下燥糞者也小腹硬滿小便自利者宜攻下心下脹滿漱水在口不得下咽者宜攻下此下淤血者也誤下後身無熱脈不浮心下硬痛有下症者宜攻下此下結胸者也按仲景攻下之法不詳於大便祕結條中反詳於自汗條內良以攻下一法最怕表邪未散表汗未出今自汗則表邪散者多矣忌攻下論忌攻下者有表邪未解未可攻下者有裡氣虛寒不可攻下者有津竭血燥忌攻下者有陽明不實不必攻下者有無一下症不犯攻下者有雖熱無結本非攻下者有身熱脈大禁攻下者有癍痧未透攻下則內伏者有邪汗未透攻下則邪伏者有手足不溫攻下則脈伏不出者故曰惡寒身痛太陽症未罷不可下結胸症脈浮大不可下陽明病面赤色表症也不可下服小承氣湯不失臭氣者無燥屎也不可攻下脈浮數者表脈也不可攻下脈虛細者正氣虛也不可攻下傷寒熱久津液乾枯自汗復發其汗津液重傷不可攻下與厥冷虛家久病新産脈微並不可攻下也是以仲景攻下真訣惟以表症之解與不解腹中氣之轉失與不轉失臍腹之痛與不痛脈之浮與不浮實與不實汗之多與不多小便之利與不利裡熱之甚與不甚津液之干與不幹屎之硬與不硬溏與不溏以消悉大下微下和之俟之導之之法示後人臨症斟酌庶無早下誤下之患宜消導論消導一法傷寒未有條目然細玩之有云胸中邪氣胃中有燥糞五六枚又以川連瀉心湯消痞滿以梔子豆豉加枳殼治食復比例而推則傷寒夾食者亦可擬以消導之治矣余嘗治外感兼有食滯者用發表之藥汗不出表不解後用消導之法而汗出病愈者又嘗用清裡之藥而裡熱不除後用消導而熱退者又嘗治譫妄用清熱之味不效後用消導而熱退譫妄止者更有癍痧內伏連用升提而不出用消導而癍現邪解者癍痧不化服化癍涼解之藥愈見昏沉用消導而癍化神清者如是則外感門汗下和解溫清之外余又不得不補消導一法仲景有下法治下部大腸之實余今補消導法治上部胃家之實夫大腸之實在下部行之即是消之胃家之實在上部消之即是行之也總之發熱不解胸前飽悶右關脈滑宜消導譫妄口不乾渴不消水脈大不數者此食滯中焦也宜消導發狂奔走強壯有力者宜消導口噤不語如醉如癡脈滑不數口不乾渴此痰飲食滯也宜消導然消導之法必要詳明所傷何物如穀食則用神麯麥芽肉食則用楂肉三稜麵食用萊蔔子氣食相凝多加枳實甘寒停食平胃保和散加白豆蔻等辛溫以散之忌消導論消導一法原為內傷飲食而設若外雖感冒內不傷食又何必消導況有中氣虛弱不能運化虛痰停結症形似實其實因虛致是此實中有虛之症原用不得消導者故胸不飽悶忌消導右脈空大胃脈雙弦忌消導口燥消渴久病不食忌消導時時泄瀉胃素有病忌消導曾服克伐在前後乃停滯不化者忌消導宜補虛論邪之所湊其正必虛故凡外感症必因元氣虛然後外邪入之是以仲景一百一十三方用人參者居半蓋以元氣虛弱之人患外感必用人參三五分或入表藥之中扶元氣助藥力逐出表邪或入和解藥中扶助胃氣敷布藥力和解邪氣內外分消或入清裡藥中退邪熱津液得以自還例如治太陽表邪不解脈弱不能作汗而用人參敗毒散者少陽半表半裡用和解方中加人參於柴胡湯者陽明口乾舌燥用白虎而加人參者夫曰補虛不過以人參少許加入發表和解清裡藥中同建祛邪去病之功原非以人參加於補氣養榮四君八物湯中同行溫補之例忌補虛論傷寒用補必得邪散病除然後補其正氣若邪氣方盛不用祛邪先用補藥則邪得補愈甚方書云留而不去反成其實是以傷寒初起未經汗吐下者忌補虛陽明胃實燥實痞滿忌補虛胸膈飽悶身痛無汗忌補虛熱結在裡脈數沉實忌補虛煩躁悶亂六脈潛伏忌補虛陽症似陰小便赤澀忌補虛癍痧未出忌補虛大便結硬忌補虛舌刺唇焦忌補虛神昏悶亂忌補虛熱瘀發黃忌補虛蓄血發狂忌補虛誤下不宜再下論太陽症反下之太陽表症已解心下滿按之大痛者為大結胸用大陷胸湯丸下之若不大痛為小結胸症用小陷胸湯以和解不用下法若但心下痞滿而不痛者為痞氣用瀉心湯和解心下要知下後若下症仍急者不得已而用大陷胸湯以再下若下後不見下症豈有再行之理今因誤下再下之說不論有下症無下症悉用再下甚至誤下太早表邪內陷內亂神明亦執誤下再下之法不知惡寒拘緊身痛發熱皆是皮毛經絡之病未入腸胃臟腑者也切不可下故外感之邪從毛竅而入必使之仍從毛竅而出若不從表散反用下行不死不休夫下之一法原為內有燥屎腹滿脹實不得出而用者苟外邪得解大便自順何苦推腸刮腹傷津竭液乎不知身發寒熱其病在外見症治症發散為捷故內經云因於暑體若燔炭汗出則散此言因於暑熱若外冒表邪者尚要汗出況因於風寒者乎世之治外感發熱不用升發胃氣敷布胃汁作汗外解良由不識外感發熱症必要從毛竅而出耳
