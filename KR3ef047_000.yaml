front:
  text: 序粵稽上古未有儒先有醫蓋天生蒸民未生后稷教稼周公孔子教學先生黃帝神農岐伯嘗百草療疾病良以人免夭折始得衆庶既庶矣然後教稼以富之講學以教之則知醫者救生之本耕者養生之源教者人倫之道也若是則保民莫先調養民病然後富之教之者也於是留心醫學時切探討余原籍奉天先大夫參政京華遂居輦轂下四方醫士雲集京邸因聞天下明醫出在松江然多高隱未得來京未獲親逢考究自辛卯春遷任吳閶得見云間秦子皇士之書名曰症因脈治施子宇瞻昆季所刻也症分外感內傷治分經絡表裡就症以審因就因以審脈審治因嘆向聞松郡多明醫是書果為壽世但因遠署虞山先生又杜門卻軌不得相朝夕癸巳歲開濬東江未得告竣各工官會詳申憲奉此按松而著書之秦子世居河上遂講論旬日公餘稍暇怡息其家見架頭有傷寒大白女科切要詞句分明治法中病果然大白也切要也此先生格致之餘晚年之悟加以不二之心不已之功始得如此越明年會新安陳子敬敷昆季捐資壽梓囑余為序余念秦先生著作真大功也實能生死人免夭折者也陳君捐金付梓非細德也實與施昆季保民生濟衆庶者也余故樂為之敘時康熙歲次甲午夏現任蘇州府督理蘇松水師船政海防同知年通家弟高鉁重南氏序序醫仁術也亦危機也精其道可以活人不精而嘗試之盛盛虛虛致人夭折者多矣古之聖人竭耳目心思之用著書立說以詔後世憂之至深而慮之至遠也然六氣皆足以傷人而寒之入人為最毒人之受之者為最酷仲景以一人之智闡千載不傳之祕亦既方法並存常變兼舉矣後之學者不能致察於精微形症弗辨經絡不分冥心膠固執成法以施之無能為功反以得咎而仲景之旨亦因以晦皇士秦先生云間奇士早負宿慧學儒者之學貫通百家有心濟世不以醫名而業日以精迎浮雲窺深淵怡神消息瞭然心手之間辨乎陰陽分乎內外驗氣運之推遷因時度宜以不失乎人情故其所至癃罷以起夭傷以愈求治於門者屢常滿而先生閉戶謝客以數十年經歷神合百世之上潛心考證筆之於書癸巳秋余以痰得交先生因盡讀枕中祕微言寓論追蹤往哲症因脈治而外尚有傷寒大白一書未經行世亟請先生付梓以傳庶幾仲景之學復明而先生之道日及於遠是亦生民之大幸也時康熙五十三年歲次甲午夏月新安陳懋寬書於珠溪別業序天時有寒暑地氣有燥濕人生其間服食起居一不得其中不能無病病思醫醫則欲其必生雖然余謂醫能生人亦能傷人何則蓋醫與孺一理也儒理未明則拘掌陳跡無論未讀古人之書即取諸名家書而盡讀之不能融洽其理輒昧昧焉虛實未審攻補亂投雖耆苓參術不善用之亦為鴆毒夫醫之為道理甚微旨甚奧非殫其精思搜其體要不可以嘗試也云間向多明醫余幼時即知有秦景明先生為一代神手年來余以胸膈之證久未能痊每思安得若人與之同時必有善治之法今秋得與其從侄皇士之交接膝而談言言探本聞其論議便覺躍躍欲起因知皇士先於儒理精通故合之於醫洞若觀火真非俗下所能窺見一斑者也夫秦子挾活人之技而四方交書走幣迎謁者踵相接使遨遊南北之間晉接王公之第聲價可與良相等乃閉門謝客立意著書焚膏繼晷徒自苦何為者秦子曰醫濟人者也濟人而不能療一時之病余心歉然濟人而不能療天下後世人之病余心亦歉然寧以求名寧以市利哉於是彙集群書闡發症因診治施子宇瞻昆季鐫刻公世今又融貫外感之原委神明其用藥之精微補先輩所未足辨前注所偶訛名曰傷寒大白復得敬敷陳子付之剞劂此真不朽之盛事矣余遂歷覽諸刻不特景明先生有其真傳並岐軒以下諸名家無不賴以大白矣是書行雖天有寒暑地有燥濕人或為戾氣所感亦可以調和而無恙醫必若是而始能生人能生世世之人豈儒理不明拘牽陳跡可以嘗試乎然而秦子之心苦矣秦子之功大矣樂而為之序時康熙五十三年歲次甲午秋九月望賜進士出身年家眷弟程珣白山氏序
